<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JUKEN CAMP | 沖縄県立高校入試 英語特訓</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FF6B9D;--pink-l:#FFD1E0;--pink-bg:#FFF2F6;
  --purple:#A07CE8;--purple-l:#DDD0FF;--purple-bg:#F5F0FF;
  --mint:#4ECDA5;--mint-l:#C5F5E3;--mint-bg:#EDFFF7;
  --orange:#FFA15C;--orange-l:#FFD9B8;--orange-bg:#FFF5EC;
  --sky:#5CB8FF;--sky-l:#BDE3FF;--sky-bg:#EDF6FF;
  --yellow:#FFD644;--yellow-l:#FFF0B8;--yellow-bg:#FFFCF0;
  --bg:#FFF8FC;--card:#FFFFFF;--surface:#F5F0FA;
  --text:#3D2E50;--dim:#7A6F8A;--muted:#B0A8C0;
  --ok:#3CC88F;--ok-bg:#E2FBEF;--ng:#FF5A7E;--ng-bg:#FFE8EE;
  --border:#E0D8F0;--accent:#A07CE8;
  --r:18px;--rs:12px;
  --sh:0 2px 10px rgba(160,124,232,.1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#DDD0FF;border-radius:3px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(255,248,252,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(160,124,232,.08);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{font-size:22px}
.logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-stats{display:flex;gap:6px}
.badge{display:flex;align-items:center;gap:4px;background:var(--surface);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;color:var(--dim)}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,248,252,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(160,124,232,.08);display:flex;padding:4px 8px;padding-bottom:max(4px,env(safe-area-inset-bottom));touch-action:manipulation}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border-radius:14px;border:none;background:none;color:var(--muted);font-size:10px;font-family:'Noto Sans JP';font-weight:600;cursor:pointer;transition:.2s}
.nav-i.on{color:var(--pink);background:var(--pink-bg)}
.nav-i svg{width:22px;height:22px}

/* PAGES */
.pg{display:none;padding:16px;padding-bottom:100px;max-width:480px;margin:0 auto}.pg.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
.hero{background:linear-gradient(135deg,#FFD1E0 0%,#DDD0FF 50%,#BDE3FF 100%);border-radius:var(--r);padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,.7),transparent 70%);border-radius:50%}
.hero-badge{display:inline-block;background:var(--pink);color:#fff;font-weight:700;font-size:11px;padding:3px 12px;border-radius:20px;margin-bottom:10px;position:relative}
.hero h2{font-family:'Outfit',sans-serif;font-weight:900;font-size:22px;line-height:1.3;margin-bottom:6px;position:relative}
.hero p{font-size:13px;color:var(--dim);position:relative}
.stitle{font-weight:700;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.mcard{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:16px 14px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;box-shadow:var(--sh)}
.mcard:active{transform:scale(.97)}
.mcard:nth-child(1){border-color:var(--pink-l)}.mcard:nth-child(2){border-color:var(--mint-l)}.mcard:nth-child(3){border-color:var(--purple-l)}.mcard:nth-child(4){border-color:var(--sky-l)}
.mcard .ico{font-size:28px;margin-bottom:8px}.mcard .nm{font-weight:700;font-size:14px;margin-bottom:3px}.mcard .ds{font-size:11px;color:var(--dim);line-height:1.4}
.mcard .cnt{position:absolute;top:10px;right:10px;background:var(--surface);padding:2px 8px;border-radius:10px;font-size:10px;color:var(--dim);font-weight:600}

.ggrid{display:grid;gap:8px;margin-bottom:24px}
.gchip{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1.5px solid var(--surface);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.gchip:active{transform:scale(.98)}
.gchip-l{display:flex;align-items:center;gap:10px}
.gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gchip-n{font-weight:600;font-size:13px}
.gchip-c{font-size:11px;color:var(--dim);font-weight:500}

/* QUIZ */
.qhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.qback{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--dim);font-size:13px;font-family:'Noto Sans JP';cursor:pointer;padding:8px 0}
.qbar{width:100%;height:6px;background:var(--surface);border-radius:3px;margin-bottom:18px;overflow:hidden}
.qfill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:3px;transition:width .4s}
.qcnt{font-size:12px;color:var(--dim);font-weight:700}

.qcard{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.qtag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.qtag-g{background:var(--purple-bg);color:var(--purple)}
.qtag-t{background:var(--orange-bg);color:var(--orange);margin-left:6px}
.qtxt{font-size:15px;line-height:1.8;white-space:pre-wrap}

/* CHOICES */
.choices{display:grid;gap:8px;margin-bottom:16px}
.cbtn{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--surface);border-radius:var(--rs);padding:14px 16px;cursor:pointer;font-family:'Noto Sans JP';font-size:15px;color:var(--text);text-align:left;transition:.2s;width:100%;box-shadow:var(--sh)}
.cbtn:active:not(.dis){transform:scale(.98)}
.clbl{width:30px;height:30px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:var(--dim);transition:.2s}
.cbtn.ok{background:var(--ok-bg);border-color:var(--ok)}.cbtn.ok .clbl{background:var(--ok);color:#fff}
.cbtn.ng{background:var(--ng-bg);border-color:var(--ng)}.cbtn.ng .clbl{background:var(--ng);color:#fff}
.cbtn.dis{cursor:default;opacity:.4}.cbtn.dis.ok,.cbtn.dis.ng{opacity:1}

/* EXPLANATION */
.ebox{background:linear-gradient(135deg,#FFF8F0,#FFF0F6,#F0F0FF);border:1.5px solid #F0E0F0;border-radius:var(--r);padding:18px;margin-top:12px;margin-bottom:16px;display:none;animation:su .3s ease}
.result-banner{text-align:center;padding:12px;border-radius:var(--r);margin-top:12px;margin-bottom:12px;font-weight:900;font-size:18px;display:none;animation:su .3s ease}
.result-banner.show{display:block}
.result-banner.ok-banner{background:#E8F8EE;border:2px solid #48BB78;color:#22543D}
.result-banner.ng-banner{background:#FFF0F0;border:2px solid #F56565;color:#C53030}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ebox.show{display:block}
.ebox-h{font-size:13px;font-weight:800;color:var(--pink);margin-bottom:10px}
.ebox-t{font-size:13px;line-height:2;color:var(--text);white-space:pre-wrap}
.ebox-t b,.ebox-t strong{color:var(--pink)}
.ebox-t .tip{display:block;background:var(--purple-bg);border-left:3px solid var(--purple);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:12px;line-height:1.7;color:#6B54B8}
.ebox-t .related{display:block;background:var(--mint-bg);border-left:3px solid var(--mint);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:12px;line-height:1.7;color:#2E8A6A}

.nbtn{width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:var(--rs);padding:16px;color:#fff;font-family:'Noto Sans JP';font-size:15px;font-weight:700;cursor:pointer;display:none;margin-top:8px;box-shadow:0 4px 16px rgba(255,107,157,.2)}
.nbtn.show{display:block}.nbtn:active{transform:scale(.98)}
.peekbtn{width:100%;background:none;border:1.5px solid var(--border);border-radius:var(--rs);padding:14px;color:var(--dim);font-family:'Noto Sans JP';font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;margin-bottom:8px;transition:.2s}
.peekbtn:active{background:var(--surface);transform:scale(.98)}
.peekbtn.hide{display:none}

/* ORDER */
.oslots{display:flex;flex-wrap:wrap;gap:8px;min-height:50px;padding:14px;background:var(--card);border-radius:var(--rs);margin-bottom:12px;border:2.5px dashed #D8D0E8;box-shadow:var(--sh)}
.ochoices{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.ochip{padding:10px 16px;background:var(--card);border:1.5px solid #D8D0E8;border-radius:10px;font-size:14px;cursor:pointer;transition:.2s;user-select:none;font-family:'Noto Sans JP';color:var(--text);box-shadow:var(--sh)}
.ochip:active{transform:scale(.95)}.ochip.placed{opacity:.2;pointer-events:none}
.ochip.ins{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 2px 8px rgba(160,124,232,.3)}
.oslots.ok{border-color:var(--ok);background:var(--ok-bg)}.oslots.ng{border-color:var(--ng);background:var(--ng-bg)}
.chkbtn{width:100%;background:var(--purple);border:none;border-radius:var(--rs);padding:14px;color:#fff;font-family:'Noto Sans JP';font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 12px rgba(160,124,232,.2)}
.chkbtn:disabled{opacity:.3}

/* CONV */
.cslots{display:grid;gap:8px;margin-bottom:16px}
.cslot{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--card);border-radius:var(--rs);min-height:48px;border:2px solid var(--surface);cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.cslot.act{border-color:var(--pink);background:var(--pink-bg)}
.csnum{width:24px;height:24px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--dim)}
.cstxt{font-size:13px;color:var(--muted);line-height:1.5}
.cslot.filled .cstxt{color:var(--text)}.cslot.filled .csnum{background:var(--pink);color:#fff}
.cchoices{display:grid;gap:6px;margin-bottom:16px}
.ccbtn{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1.5px solid var(--surface);border-radius:var(--rs);padding:12px 14px;cursor:pointer;font-family:'Noto Sans JP';font-size:13px;color:var(--text);text-align:left;transition:.2s;width:100%;line-height:1.5;box-shadow:var(--sh)}
.ccbtn.used{opacity:.2;pointer-events:none}

/* RESULTS */
.rcard{background:linear-gradient(135deg,#FFD1E0,#DDD0FF,#BDE3FF);border-radius:var(--r);padding:32px 20px;text-align:center;margin-bottom:20px}
.rscore{font-family:'Outfit';font-size:64px;font-weight:900;color:var(--text);line-height:1;margin-bottom:4px}
.rlbl{font-size:14px;color:var(--dim);margin-bottom:20px}
.rbd{display:flex;justify-content:center;gap:24px}
.rst{text-align:center}.rst-n{font-family:'Outfit';font-size:24px;font-weight:800}.rst-l{font-size:11px;color:var(--dim)}
.rst-n.g{color:var(--ok)}.rst-n.r{color:var(--ng)}
.retbtn{width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:var(--rs);padding:16px;color:#fff;font-family:'Noto Sans JP';font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.hmbtn{width:100%;background:var(--surface);border:none;border-radius:var(--rs);padding:16px;color:var(--text);font-family:'Noto Sans JP';font-size:15px;font-weight:600;cursor:pointer}

/* GRAMMAR REF */
.gref{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
.gref-t{font-weight:700;font-size:14px;margin-bottom:8px;color:var(--purple)}
.gref-d{font-size:13px;line-height:1.8;color:var(--dim);margin-bottom:10px}
.gref-e{background:var(--purple-bg);border-radius:10px;padding:12px;font-size:13px;line-height:1.7;border-left:3px solid var(--purple)}
.gref-grade{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;margin-right:6px}
.gref-grade.g1{background:#FFE0EC;color:#D4507A}
.gref-grade.g2{background:#D9E8FF;color:#4A7FD4}
.gref-grade.g3{background:#DCF5E8;color:#2E8A5A}
.gref-tbl{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.gref-tbl th,.gref-tbl td{border:1px solid #ddd;padding:4px 6px;text-align:center}
.gref-tbl th{background:#f0f4ff;font-weight:700;color:#4a5568}
.gref-tbl td:first-child{background:#f7f8fc;font-weight:600;text-align:left}
.gref-tbl b{color:#e53e3e}
.speak-btn{background:none;border:1px solid #cbd5e0;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;transition:all .15s}
.speak-btn:active{background:#edf2f7;transform:scale(0.9)}
.gref-tip{display:block;background:var(--orange-bg);border-left:3px solid var(--orange);padding:8px 12px;border-radius:0 8px 8px 0;margin:4px 0 0;font-size:12px;line-height:1.7;color:#B07030}
.gref-rel{display:block;background:var(--mint-bg);border-left:3px solid var(--mint);padding:8px 12px;border-radius:0 8px 8px 0;margin:4px 0 0;font-size:12px;line-height:1.7;color:#2E8A6A}
.gref-warn{display:block;background:var(--pink-bg);border-left:3px solid var(--pink);padding:8px 12px;border-radius:0 8px 8px 0;margin:4px 0 0;font-size:12px;line-height:1.7;color:#C04060}

/* VOCAB */
.vcard{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.vcard:active{transform:scale(.98)}
.vw{font-weight:700;font-size:15px}
.vcard>div:first-child{display:flex;align-items:center;gap:8px;width:100%}
.vm{font-size:14px;color:var(--accent);margin-top:6px;opacity:0;transition:opacity .3s}
.vcard.rev .vm{opacity:1}
.vcat{font-weight:700;font-size:14px;color:var(--pink);margin:16px 0 10px;padding-left:4px}
.vcat-item{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s;box-shadow:var(--sh)}
.vcat-item:active{transform:scale(.98)}
.vcat-item .vci-name{font-weight:700;font-size:14px}
.vcat-item .vci-count{font-size:12px;color:var(--dim);background:var(--surface);padding:2px 10px;border-radius:12px}
.vcat-group{font-weight:700;font-size:13px;color:var(--dim);margin:18px 0 8px;padding-left:2px}
.vback-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-family:'Noto Sans JP';color:var(--dim);cursor:pointer;margin-bottom:12px}
.vback-btn:active{background:var(--surface)}

/* SEARCH */
.sbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--surface);border-radius:var(--rs);padding:10px 14px;margin-bottom:16px;box-shadow:var(--sh)}
.sbar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Noto Sans JP';font-size:14px}
.sbar input::placeholder{color:var(--muted)}
.sbar svg{color:var(--muted);flex-shrink:0;width:18px;height:18px}

.ftabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:12px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:7px 14px;border-radius:20px;background:var(--surface);border:none;color:var(--dim);font-family:'Noto Sans JP';font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.ftab.on{background:var(--pink);color:#fff}

/* GOKEI INPUT */
.wbl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.wbank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--purple-bg);border-radius:var(--rs);margin-bottom:12px}
.wchip{padding:6px 14px;background:var(--card);border:1.5px solid var(--purple-l);border-radius:8px;font-size:14px;color:var(--purple);font-weight:600}
.ainput{width:100%;background:var(--card);border:2px solid var(--surface);border-radius:var(--rs);padding:14px 16px;font-family:'Noto Sans JP';font-size:16px;color:var(--text);outline:none;transition:border-color .2s}
.ainput:focus{border-color:var(--pink)}.ainput.ok{border-color:var(--ok);background:var(--ok-bg)}.ainput.ng{border-color:var(--ng);background:var(--ng-bg)}
.subbtn{width:100%;background:var(--purple);border:none;border-radius:var(--rs);padding:14px;color:#fff;font-family:'Noto Sans JP';font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;margin-bottom:4px}
.subbtn:disabled{opacity:.3}
.corr{padding:10px 14px;background:var(--ok-bg);border:1.5px solid var(--ok);border-radius:var(--rs);font-size:14px;color:var(--ok);font-weight:700;margin-top:12px;margin-bottom:12px;display:none}
.corr.show{display:block}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo" onclick="goHome()" style="cursor:pointer"><span class="logo-icon"></span><span class="logo-text">JUKEN CAMP</span></div>
  <div class="hdr-stats"><div class="badge">🔥<span id="streakCount">0</span></div><div class="badge">⭐<span id="totalCorrect">0</span></div></div>
</header>

<div class="pg on" id="homePage">
  <div class="hero">
    <div class="hero-badge">沖縄県立高校入試</div>
    <h2>英文法トレーニング</h2>
    <p>過去問135問 ＋ 文法47項目 ＋ 単語・熟語571語</p>
  </div>
  <div class="stitle">📝 英文法トレーニング</div>
  <div class="mgrid">
    <div class="mcard" onclick="startQuiz('tekigo')"><div class="cnt" id="tc">--問</div><div class="ico">🎯</div><div class="nm">適語選択</div><div class="ds">4択から正解を選ぼう</div></div>
    <div class="mcard" onclick="startQuiz('gokei')"><div class="cnt" id="gc">--問</div><div class="ico">✏️</div><div class="nm">語形変化</div><div class="ds">正しい形に変えよう</div></div>
    <div class="mcard" onclick="startQuiz('seijoEisaku')"><div class="cnt" id="sc">--問</div><div class="ico">🧩</div><div class="nm">整序英作文</div><div class="ds">正しい順に並べよう</div></div>
    <div class="mcard" onclick="startQuiz('kaiwa')"><div class="cnt" id="kc">--問</div><div class="ico">💬</div><div class="nm">会話文の完成</div><div class="ds">会話を自然につなげよう</div></div>
  </div>
  <div class="stitle">🏷️ 文法別トレーニング</div>
  <div class="ggrid" id="grammarList"></div>
</div>

<div class="pg" id="quizPage">
  <div class="qhdr"><button class="qback" onclick="goHome()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>戻る</button><div class="qcnt" id="quizCounter"></div></div>
  <div class="qbar"><div class="qfill" id="qfill" style="width:0%"></div></div>
  <div id="quizContent"></div>
</div>

<script>
// ============================================================
// SOUND ENGINE (Web Audio API - no external files needed)
// ============================================================
var SFX=(function(){
  var ctx=null;
  function init(){if(!ctx)try{ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  function play(type){
    init();if(!ctx)return;
    if(ctx.state==='suspended')ctx.resume();
    var now=ctx.currentTime;
    if(type==='correct'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='sine';o1.frequency.setValueAtTime(523,now);o1.frequency.setValueAtTime(659,now+0.08);
      o1.frequency.setValueAtTime(784,now+0.16);
      g1.gain.setValueAtTime(0.25,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.4);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.4);
      var o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.type='sine';o2.frequency.setValueAtTime(1047,now+0.1);
      g2.gain.setValueAtTime(0.12,now+0.1);g2.gain.exponentialRampToValueAtTime(0.01,now+0.35);
      o2.connect(g2);g2.connect(ctx.destination);o2.start(now+0.1);o2.stop(now+0.35);
    }
    else if(type==='wrong'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='square';o1.frequency.setValueAtTime(300,now);o1.frequency.setValueAtTime(200,now+0.15);
      g1.gain.setValueAtTime(0.15,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.3);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.3);
    }
    else if(type==='click'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='sine';o1.frequency.setValueAtTime(880,now);
      g1.gain.setValueAtTime(0.08,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.06);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.06);
    }
    else if(type==='perfect'){
      [523,659,784,1047].forEach(function(f,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.setValueAtTime(f,now+i*0.12);
        g.gain.setValueAtTime(0.2,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.4);
        o.connect(g);g.connect(ctx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.4);
      });
    }
    else if(type==='done'){
      [440,523,659].forEach(function(f,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.setValueAtTime(f,now+i*0.15);
        g.gain.setValueAtTime(0.18,now+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.15+0.35);
        o.connect(g);g.connect(ctx.destination);o.start(now+i*0.15);o.stop(now+i*0.15+0.35);
      });
    }
    else if(type==='flip'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='triangle';o1.frequency.setValueAtTime(600,now);o1.frequency.setValueAtTime(900,now+0.05);
      g1.gain.setValueAtTime(0.1,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.1);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.1);
    }
  }
  return{play:play,init:init};
})();
// Speech synthesis for vocab pronunciation
function speakEn(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  // Clean text for speech: replace symbols with speakable equivalents
  var clean=text
    .replace(/→/g,', ')           // arrows become pauses
    .replace(/\//g,' or ')         // slash becomes "or"
    .replace(/～ing/g,'ing')       // ～ing → just "ing"
    .replace(/〜ing/g,'ing')
    .replace(/～/g,'')             // remaining tilde → remove
    .replace(/〜/g,'')
    .replace(/（[^）]*）/g,'')     // remove Japanese parenthetical
    .replace(/[＝※]/g,'')
    .replace(/[^\x00-\x7F,.'!? -]/g,'')  // remove remaining non-ASCII
    .replace(/\s+/g,' ').trim();
  if(!clean)return;
  var u=new SpeechSynthesisUtterance(clean);
  u.lang='en-US';u.rate=0.85;u.pitch=1.1;
  // Try to pick a female English voice
  var voices=window.speechSynthesis.getVoices();
  var female=voices.find(v=>v.lang.startsWith('en')&&/female|samantha|karen|victoria|zira|google.*us/i.test(v.name));
  if(!female)female=voices.find(v=>v.lang.startsWith('en'));
  if(female)u.voice=female;
  window.speechSynthesis.speak(u);
}
// Preload voices
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices()}}

const tekigoQ = [
 {id:200,q:`A: ( ) bag is this?
B: It's mine.`,ch:["Which", "Where", "When", "Whose"],a:`Whose`,g:`疑問詞`,
 ex:`<b>正解：エ（Whose）</b>

✏️ <b>問題文と日本語訳</b>
A: ( ) bag is this?（これは( )カバンですか？）
B: It's mine.（私のものです。）

📌 <b>解き方</b>
Bが「<b>mine</b>（私のもの）」と<b>持ち主</b>を答えています。
→ 持ち主をたずねる疑問詞 ＝ <b>Whose</b>（誰の）

<span class="tip">💡 <b>Whoseの公式</b>
<b>Whose + 名詞 + is this?</b>＝「これは誰の○○ですか？」
答え方：It's mine. / It's Yuki's. など
⚠️ 答えに「mine / yours / his / hers」があったら → Whose で聞いている！</span>

🔍 <b>まちがい選択肢を確認</b>
・Which（どちらの）→ 答えが「AかBか」になるはず
・Where（どこ）→ 場所をたずねる
・When（いつ）→ 時間をたずねる`}
,{id:201,q:`A: I don't know ( ) to buy for Michiko's birthday present.
B: Why don't you buy some flowers?`,ch:["who", "what", "when", "where"],a:`what`,g:`不定詞・動名詞`,
 ex:`<b>正解：イ（what）</b>

✏️ <b>問題文と日本語訳</b>
A: I don't know ( ) to buy for Michiko's birthday present.
（ミチコの誕生日プレゼントに( )買えばいいかわからない。）
B: Why don't you buy some flowers?（花を買ったらどう？）

📌 <b>解き方</b>
Bが「花を買ったら？」と<b>モノ</b>を提案 → Aは「<b>何を</b>買えばいいか」わからない
→ <b>what to buy</b>（何を買うべきか）が正解！

<span class="tip">💡 <b>疑問詞 + to + 動詞の原形 ＝ 超頻出パターン！</b>
・<b>what to ～</b>（何を～すべきか）
・<b>how to ～</b>（～のしかた）
・<b>where to ～</b>（どこで～すべきか）
・<b>when to ～</b>（いつ～すべきか）
⚠️ <b>why to ～ は存在しない</b>ので注意！</span>

🔍 <b>まちがい選択肢を確認</b>
・who → 「誰を買う」は意味が変
・when / where → Bが「花」と物を答えているので、時間や場所の話ではない`}
,{id:202,q:`A: I have so many bags to carry!
B: ( ) I help you?`,ch:["Does", "Have", "Shall", "Did"],a:`Shall`,g:`助動詞`,
 ex:`<b>正解：ウ（Shall）</b>

✏️ <b>問題文と日本語訳</b>
A: I have so many bags to carry!（運ぶカバンがこんなにたくさん！）
B: ( ) I help you?（( )手伝いましょうか？）

📌 <b>解き方</b>
Aが困っている → Bが「手伝おうか？」と<b>申し出</b>ている場面
→ 「～しましょうか？」＝ <b>Shall I ～?</b>

<span class="tip">💡 <b>Shall の2パターン丸暗記！</b>
① <b>Shall I ～?</b>＝「私が～しましょうか？」→ 自分からの<b>申し出</b>
② <b>Shall we ～?</b>＝「一緒に～しましょうか？」→ <b>誘い</b>（= Let's ～）</span>

🔍 <b>まちがい選択肢を確認</b>
・Does I → 文法的にアウト（Does + 三人称単数だけ）
・Have I → 「私は～したことがあるか」で意味が変
・Did I → 過去の話になってしまう`}
,{id:203,q:`A: Nancy, ( ) your music class start at ten?
B: No, at eleven.`,ch:["do", "does", "is", "are"],a:`does`,g:`代名詞・語彙・熟語`,
 ex:`<b>正解：イ（does）</b>

✏️ <b>問題文と日本語訳</b>
A: Nancy, ( ) your music class start at ten?
（ナンシー、音楽の授業は10時に始まりますか？）
B: No, at eleven.（いいえ、11時です。）

📌 <b>解き方</b>
① 主語「your music class」→ <b>三人称単数</b>（it と同じ扱い）
② 動詞「start」→ <b>一般動詞</b>
③ 一般動詞の疑問文＋三人称単数 → <b>Does</b>

<span class="tip">💡 <b>Do と Does の使い分け</b>
・I / you / 複数 → <b>Do</b>
・he / she / it / 1人・1つのもの → <b>Does</b>
⚠️ Does があったら動詞は<b>原形</b>に戻す！（starts ✕ → start ○）</span>

🔍 <b>まちがい選択肢を確認</b>
・do → 主語が三人称単数なので使えない
・is / are → be動詞。startは一般動詞なので混ぜてはダメ`}
,{id:204,q:`A: There ( ) a lot of children in the park. Why?
B: They have a summer festival today.`,ch:["be", "am", "are", "is"],a:`are`,g:`be動詞・一般動詞`,
 ex:`<b>正解：ウ（are）</b>

✏️ <b>問題文と日本語訳</b>
A: There ( ) a lot of children in the park. Why?
（公園にたくさんの子どもがいます。なぜ？）
B: They have a summer festival today.（今日は夏祭りがあるんです。）

📌 <b>解き方</b>
<b>There is / are ～</b> の構文 → 後ろの名詞が単数か複数かで決まる！
→ 「a lot of <b>children</b>」＝ たくさんの子ども ＝ <b>複数</b>
→ <b>are</b>

<span class="tip">💡 <b>There is / are の見分け方</b>
・There <b>is</b> + 単数（a book / a dog / one student）
・There <b>are</b> + 複数（many books / children / two cats）
⚠️ 「a lot of ～」＝ たくさんの → <b>複数扱い</b>！</span>`}
,{id:205,q:`A: Look at the cookies on the table! Can I eat them?
B: They are for Nancy's birthday. They are not ( ).`,ch:["you and me", "you", "your", "yours"],a:`yours`,g:`代名詞・語彙・熟語`,
 ex:`<b>正解：エ（yours）</b>

✏️ <b>問題文と日本語訳</b>
A: Look at the cookies on the table! Can I eat them?
（テーブルの上のクッキー見て！食べていい？）
B: They are for Nancy's birthday. They are not ( ).
（ナンシーの誕生日用だよ。あなたの<b>もの</b>じゃないよ。）

📌 <b>解き方</b>
「They are not ＿.」→ 後ろに名詞がない → <b>所有代名詞</b>（～のもの）が必要
you の所有代名詞 ＝ <b>yours</b>（あなたのもの）

<span class="tip">💡 <b>所有格 vs 所有代名詞の見分け方</b>
・<b>your</b> cookies（あなた<b>の</b> + 名詞）→ 後ろに名詞が<b>ある</b>
・<b>yours</b>（あなたのもの）→ 後ろに名詞が<b>ない</b>
⚠️ 空欄の後に名詞があるか？ないか？で判断！</span>

<span class="related">📝 <b>所有代名詞まとめ</b>
I→mine / you→yours / he→his / she→hers / we→ours / they→theirs</span>`}
,{id:206,q:`A: I think young people should eat more vegetables.
B: ( ). Having fruits is also good for them.`,ch:["Thank you", "I agree", "I'm sorry", "Let's go"],a:`I agree`,g:`会話表現`,
 ex:`<b>正解：イ（I agree）</b>

✏️ <b>問題文と日本語訳</b>
A: I think young people should eat more vegetables.
（若い人はもっと野菜を食べるべきだと思います。）
B: ( ). Having fruits is also good for them.
（( )。果物を食べるのも体にいいですよね。）

📌 <b>解き方</b>
Bは「果物もいい」と<b>追加</b>している → Aの意見に<b>賛成</b>
→ <b>I agree</b>（賛成です/そう思います）

<span class="tip">💡 <b>会話表現：賛成・反対</b>
・<b>I agree.</b>（賛成です）
・<b>I think so, too.</b>（私もそう思います）
・<b>I don't think so.</b>（そうは思いません）
・<b>I disagree.</b>（反対です）</span>`}
,{id:207,q:`A: Do you know the new students from America?
B: Yes. Sam and Andy ( ) in my class.`,ch:["be", "am", "is", "are"],a:`are`,g:`be動詞・一般動詞`,
 ex:`<b>正解：エ（are）</b>

✏️ <b>問題文と日本語訳</b>
A: Do you know the new students from America?
（アメリカからの新しい生徒を知ってる？）
B: Yes. Sam and Andy ( ) in my class.
（うん。サムとアンディは私のクラスにいます。）

主語「Sam <b>and</b> Andy」→ 2人 ＝ <b>複数</b> → be動詞は <b>are</b>

<span class="tip">💡 <b>「A and B」は必ず複数扱い！</b>
Sam and Andy <b>are</b> ～（2人だからare）
⚠️ 名前が1つなら is、2つ以上なら are！</span>`}
,{id:208,q:`A: This is a great picture!
B: I ( ) this picture.
A: Did you? I like it very much.`,ch:["heard", "wrote", "drew", "understood"],a:`drew`,g:`時制（過去・進行・未来）`,
 ex:`<b>正解：ウ（drew）</b>

✏️ <b>問題文と日本語訳</b>
A: This is a great picture!（すばらしい絵だね！）
B: I ( ) this picture.（私がこの絵を描きました。）
A: Did you? I like it very much.（本当に？とても気に入ったよ。）

📌 <b>解き方</b>
① Aが「<b>Did</b> you?」と<b>過去形</b>で聞き返している → 過去の話
② 「picture（絵）」を作った → 「<b>描いた</b>」
→ draw（描く）の過去形 ＝ <b>drew</b>

<span class="tip">💡 <b>draw の変化（不規則！）</b>
draw → <b>drew</b> → drawn（描く→描いた→描かれた）
⚠️ 「drawed」は間違い！</span>

🔍 <b>まちがい選択肢を確認</b>
・heard（聞いた）→ 絵を「聞く」のは変
・wrote（書いた）→ 文章を書くときに使う語。絵にはdrawを使う
・understood（理解した）→ 絵を「理解した」は不自然`}
,{id:209,q:`A: Whose pencil is this?
B: It's not mine but I think it's ( ).`,ch:["he", "his", "she", "her"],a:`her`,g:`代名詞・語彙・熟語`,
 ex:`<b>正解：エ（her）</b>

✏️ <b>問題文と日本語訳</b>
A: Whose pencil is this?（これは誰の鉛筆？）
B: It's not mine but I think it's ( ).
（私のじゃないけど、<b>彼女のもの</b>だと思う。）

📌 <b>解き方</b>
選択肢を整理すると…
・<b>he</b>（彼は）→ 主語の位置でしか使えない
・<b>his</b>（彼のもの）→「～のもの」として使えるが、<b>男性</b>
・<b>she</b>（彼女は）→ 主語の位置でしか使えない
・<b>her</b>（彼女のもの）→ ここでは「彼女のもの」として使える

この問題では選択肢に <b>hers</b>（she の所有代名詞）がなく、代わりに <b>her</b> が「彼女のもの」を表す答えとして使われています。

<span class="tip">💡 <b>her の2つの使い方</b>
① <b>所有格</b>：her pen（彼女<b>の</b>ペン）→ 後ろに名詞あり
② <b>目的格・所有代名詞的用法</b>：It's her.（彼女のもの）→ 後ろに名詞なし

⚠️ 入試では「hers」が選択肢にある場合はそちらを選びます。
この問題は hers がなく her しかないため、her が正解！</span>`}
,{id:210,q:`A: Do you know that tall boy?
B: Yes. He ( ) my friend, Ken.`,ch:["be", "am", "is", "are"],a:`is`,g:`be動詞・一般動詞`,
 ex:`<b>正解：ウ（is）</b>

✏️ <b>問題文と日本語訳</b>
A: Do you know that tall boy?（あの背の高い男の子を知ってる？）
B: Yes. He ( ) my friend, Ken.（うん。彼は私の友達のケンです。）

📌 <b>解き方</b>
主語「He」→ <b>三人称単数</b> → be動詞は <b>is</b>

<span class="tip">💡 <b>be動詞の使い分け</b>
I → <b>am</b> / He, She, It, 1人・1つ → <b>is</b> / You, We, They, 2つ以上 → <b>are</b></span>`}
,{id:211,q:`A: What did you do after school?
B: I ( ) school and went home.`,ch:["will leave", "leave", "leaves", "left"],a:`left`,g:`時制（過去・進行・未来）`,
 ex:`<b>正解：エ（left）</b>

✏️ <b>問題文と日本語訳</b>
A: What did you do after school?（放課後何をしたの？）
B: I ( ) school and went home.（学校を出て、家に帰りました。）

📌 <b>解き方</b>
① 「did you do」→ <b>過去</b>の話
② 「<b>and went</b>」→ wentは過去形 → andの前の( )も<b>過去形</b>にする
③ 「学校を出た」→ leave の過去形 ＝ <b>left</b>

<span class="tip">💡 <b>leave の変化（不規則！）</b>
leave → <b>left</b> → left（出発する/去る）

,{id:213,q:`A: Thank you for your help.

,{id:217,q:`A: Did you see Mike at school yesterday?

,{id:219,q:`A: Excuse me. ( ) can I go to Midori City Park?

,{id:222,q:`Emma: What did you do yesterday?
Ryota: I went to a bookstore ( ① ) opened near the station last month. I bought some comic books there.
Emma: Comic books? You ( ② ) study more. We will have an English test next week.
Ryota: Don't worry. They are written in English.
Emma: You study English with comic books? ( ③ ) a good idea!`,ch:["ア what","イ mustn't","ウ have to","エ which","オ how","カ who"],a:["エ","ウ","オ"],g:`関係代名詞・助動詞・感嘆`,
 ex:`<b>正解：① エ（which）　② ウ（have to）　③ オ（How）</b>

✏️ <b>問題文と日本語訳</b>
Emma: What did you do yesterday?（昨日は何をしたの？）
Ryota: I went to a bookstore ( which ) opened near the station last month. I bought some comic books there.
（先月駅の近くにオープンした本屋に行ったよ。マンガを買ってきた。）
Emma: Comic books? You ( have to ) study more. We will have an English test next week.
（マンガ？もっと勉強しないといけないよ。来週英語のテストがあるんだから。）
Ryota: Don't worry. They are written in English.（大丈夫だよ。英語で書かれてるんだ。）
Emma: You study English with comic books? ( How ) a good idea!（マンガで英語を勉強するの？なんていい考えなんでしょう！）

📌 <b>解き方</b>
① a bookstore ( ) opened near the station → 先行詞「物」＋後ろに動詞 → <b>関係代名詞 which</b>
② You ( ) study more.「もっと勉強しないといけない」→ <b>have to ～</b>（義務・必要）
　※mustn't（～してはいけない）は「禁止」なので文脈に合わない
③ ( ) a good idea! → 「なんていい考えなんでしょう！」→ <b>How ＋ 形容詞</b>の感嘆文！

<span class="tip">💡 <b>感嘆文 How vs What</b>
<b>How ＋ 形容詞/副詞</b> ＋（主語＋動詞）！→ How good it is!
<b>What ＋ 名詞句</b> ＋（主語＋動詞）！→ What a good idea it is!
"How a good idea!" → <b>How</b> が正解！</span>

<span class="tip">💡 <b>have to vs mustn't</b>
have to ～ → 「～しなければならない」（義務）
mustn't → 「～してはいけない」（禁止）
「もっと勉強しないといけない」＝ <b>have to study more</b></span>`}

③ He ( ) English ... when he was little → 「子どもの頃」という過去のサイン → <b>過去形 studied</b>
　「has studied」（現在完了）は「when + 過去時点」とは一緒に使えない！

<span class="tip">💡 <b>現在完了 vs 過去形</b>
when + 過去時点（when he was little） → <b>過去形（studied）</b>
現在完了（has studied）は過去の特定時点を示す when と一緒には使えない。
How was ～? ＝「～はどうだった？」（感想・評価を聞く定番フレーズ）</span>`}];

,{id:207,q:`A: Can you say that again? You speak too fast.

,{id:209,q:`A: Oh, you are not late for the soccer practice today!

,{id:210,q:`A: What are you doing, Dad?

,{id:211,q:`A: Where did you go today?

<b>Have you + 過去分詞 ～?</b>（～したの？）

,{id:212,q:`A: I want to go to the U.S.

,{id:213,q:`A: Look at this picture. What do you think about it?

,{id:214,q:`A: Who ( want ) to play tennis this afternoon?

,{id:215,q:`A: Hi, this is Miki speaking. Are you all OK? I heard a big typhoon is coming to Okinawa.

,{id:218,q:`A: Welcome to our party, Ryo!

,{id:224,q:`A: This castle looks very old.

,{id:233,q:`A: It was very hot yesterday.

,{id:109,ctx:``,ch:["ア How about going to see it together next Sunday?", "イ That sounds good. See you then.", "ウ No, but I want to.", "エ Have you seen that movie yet?"],a:["エ", "ウ", "ア", "イ"],s:4,g:`会話表現`,
 ex:`<b>正解の順番：エ・ウ・ア・イ</b>

✏️ <b>完成した会話と日本語訳</b>

<span class="tip">💡 <b>質問 → 答え → 提案 → 同意</b>

「That sounds good.」（いいね）＝ 誘いを受ける表現</span>`}
,{id:110,ctx:``,ch:["ア Shall we go there?", "イ Me, too. There is a good restaurant near here.", "ウ Yes, let's go!", "エ It's almost noon. I'm hungry."],a:["エ", "イ", "ア", "ウ"],s:4,g:`会話表現`,
 ex:`<b>正解の順番：エ・イ・ア・ウ</b>

✏️ <b>完成した会話と日本語訳</b>
<b>エ</b> It's almost noon. I'm hungry.（もうすぐお昼。おなか空いた。）

・No, let's not.（やめておこう）</span>`}
,{id:111,ctx:``,ch:["ア Oh, I found it. Thank you.", "イ I'm looking for my pen, Dad.", "ウ I saw it under the desk.", "エ What are you doing, Mary?"],a:["エ", "イ", "ウ", "ア"],s:4,g:`会話表現`,

,{id:112,ctx:``,ch:["ア It's math. Help me, please. Could you answer all the questions for me?", "イ Oh really? What subject is it?", "ウ Dad, I have a lot of homework today.", "エ No. You must do it by yourself."],a:["ウ", "イ", "ア", "エ"],s:4,g:`会話表現`,
 ex:`<b>正解の順番：ウ・イ・ア・エ</b>

✏️ <b>完成した会話と日本語訳（父と娘）</b>
<b>ウ</b> Dad, I have a lot of homework today.（パパ、今日宿題がたくさんあるの。）
<b>イ</b> Oh really? What subject is it?（本当？何の教科？）
<b>ア</b> It's math. Help me, please. Could you answer all the questions for me?
（数学。手伝って。全部の問題を解いてくれない？）

<span class="tip">💡 <b>相談 → 質問 → お願い → 断り</b>
「by yourself」＝「自分自身で」
「Could you ～?」＝「～してくれますか？」（丁寧なお願い）</span>`}
,{id:113,ctx:``,ch:["ア You should see a doctor.", "イ You don't look well, Amy. What's wrong?", "ウ I have a fever and a headache.", "エ OK. I will."],a:["イ", "ウ", "ア", "エ"],s:4,g:`会話表現`,
 ex:`<b>正解の順番：イ・ウ・ア・エ</b>

✏️ <b>完成した会話と日本語訳（体調をたずねる）</b>
<b>イ</b> You don't look well, Amy. What's wrong?（調子悪そうだね、エイミー。どうしたの？）
<b>ウ</b> I have a fever and a headache.（熱があって頭が痛いんです。）
<b>ア</b> You should see a doctor.（病院に行った方がいいよ。）
<b>エ</b> OK. I will.（わかりました。そうします。）

<span class="tip">💡 <b>体調の会話パターン</b>
What's wrong? → 症状を答える → アドバイス → 受け入れ
📝 <b>have a fever</b>（熱がある）/ <b>have a headache</b>（頭痛）/ <b>see a doctor</b>（医者に診てもらう）</span>`}
,{id:114,ctx:``,ch:["ア No problem. Here you are.", "イ Can I borrow your Pokémon GO guide book?", "ウ Sure. What is it?", "エ Hi Ken, can I ask you a favor?"],a:["エ", "ウ", "イ", "ア"],s:4,g:`会話表現`,

✏️ <b>完成した会話と日本語訳（本を借りる）</b>
<b>エ</b> Hi Ken, can I ask you a favor?（ケン、お願いがあるんだけど。）
<b>ウ</b> Sure. What is it?（もちろん。何？）

,{id:115,ctx:``,ch:["ア I said Leonard. We always call him Leo.", "イ That's Leonard.", "ウ Sorry?", "エ Who's that boy in your class?"],a:["エ", "イ", "ウ", "ア"],s:4,g:`会話表現`,

✏️ <b>完成した会話と日本語訳</b>
<b>エ</b> Who's that boy in your class?（あのクラスの男の子は誰？）

,{id:116,ctx:``,ch:["ア Please tell him to call me this afternoon.", "イ He's out now. Can I take a message?", "ウ May I speak to Mr. Jones?", "エ Good morning. This is ABC Language School."],a:["エ", "ウ", "イ", "ア"],s:4,g:`会話表現`,
 ex:`<b>正解の順番：エ・ウ・イ・ア</b>

✏️ <b>完成した会話と日本語訳（電話）</b>
<b>エ</b> Good morning. This is ABC Language School.（おはようございます。ABC語学学校です。）
<b>ウ</b> May I speak to Mr. Jones?（ジョーンズ先生とお話しできますか？）

・This is ～ speaking.（こちらは～です）

,{id:117,ctx:``,ch:["ア Well, I have been sick since this morning.", "イ OK. I will.", "ウ Really? You can go home right now.", "エ You look very tired."],a:["エ", "ア", "ウ", "イ"],s:4,g:`会話表現`,

,{id:118,ctx:`次の会話の①〜④に入る文を、ア〜エから選んで正しい順に並べなさい。

 ex:`<b>正解の順番：ア・イ・ウ・エ</b>

✏️ <b>完成した会話と日本語訳</b>
Kaori: <b>①ア You look very happy.</b>（すごくうれしそうだね。）<b>②イ What's up?</b>（どうしたの？）

James: Thank you. I got a new guitar from my father. Look! <b>③ウ This is a picture of it.</b>（ありがとう。父から新しいギターをもらったんだ。ほら、これがその写真。）

<span class="tip">💡 <b>How long have you ～?（どのくらい～していますか？）への答え方</b>

「Since ＋ 時点」→ Since I was ten.（10歳の時から）</span>`}

 ex:`<b>正解の順番：ア・イ・ウ・エ</b>

✏️ <b>完成した会話と日本語訳</b>
A: <b>①ア May I help you?</b>（いらっしゃいませ。）
B: <b>②イ Yes, I want to get a T-shirt for Father's Day.</b>（はい、父の日のためにTシャツを買いたいんです。）

Mr.Brown: That's a great goal! Can you tell me the reason?
Saki: （ ② ） When I was a child, I was saved by a kind doctor.
Mr.Brown: I think that's a wonderful reason. （ ③ ）
Saki: I will study hard to go to college.`,ch:["ア What do you want to be in the future?","イ I want to help sick people, especially children.","ウ What will you do to make your dream come true?"],a:["ア","イ","ウ"],s:3,g:`会話表現`,
 ex:`<b>正解：① ア　② イ　③ ウ</b>

✏️ <b>完成した会話と日本語訳</b>
Mr.Brown: <b>①ア What do you want to be in the future?</b>（将来、何になりたいですか？）
Saki: I want to be a doctor.（医者になりたいです。）
Mr.Brown: That's a great goal! Can you tell me the reason?（それは素晴らしい目標ですね！理由を教えてもらえますか？）
Saki: <b>②イ I want to help sick people, especially children.</b> When I was a child, I was saved by a kind doctor.（病気の人、特に子どもたちを助けたいんです。子どもの頃、優しい先生に助けてもらったので。）
Mr.Brown: I think that's a wonderful reason. <b>③ウ What will you do to make your dream come true?</b>（それは素晴らしい理由だと思います。夢を叶えるためにどうしますか？）
Saki: I will study hard to go to college.（大学に行くために一生懸命勉強します。）

<span class="tip">💡 <b>make your dream come true ＝ 夢を叶える</b>
make ＋ 目的語 ＋ 動詞の原形（使役動詞）
「make your dream come true」→「あなたの夢を実現させる」
save ＝「救う」（医療文脈では「命を救う」）</span>`}];

   ex:`<b>正解：busiest</b><br><br>✏️ He is the <b>busiest</b> man in our office.<br>📝 「彼はオフィスで一番<b>忙しい</b>人だ」<br>👀 <b>何を問われてる？</b><br>→ 最上級への変換。<b>子音+y</b>で終わる語の変化！<br><br>🔍 <b>どこを見る？</b><br><b>the</b> (　) man <b>in</b> our office → theとin→<b>最上級</b>！<br>busy→busier→<b>busiest</b><br><br>📌 <b>子音+yの変化ルール</b><br><span class="tip">busy→busi<b>est</b> / easy→easi<b>est</b> / happy→happi<b>est</b><br>（<b>yをiに変えて</b>er/est！）</span><br><br>⚡ <b>母音+yはそのまま！</b>play→player（yそのまま）≠ busy→busiest（yをiに）`},
  {id:33,q:"I (    ) this computer at that shop yesterday.", bank:["soon","buy","think","busy","leave","be","listen","large"], a:"bought", g:"一般動詞の過去形",
   ex:`<b>正解：bought</b><br><br>✏️ I <b>bought</b> this computer at that shop yesterday.<br>📝 「昨日あの店でパソコンを<b>買った</b>」<br>👀 <b>何を問われてる？</b><br>→ 動詞の時制＋不規則変化。<b>過去のサイン</b>を探せ！<br><br>🔍 <b>どこを見る？</b><br><b>yesterday</b>→<b>過去</b>！→ buy→<b>bought</b><br><br>📌 <b>-ought型を丸暗記！</b><br><span class="tip">buy→<b>bought</b> / bring→brought / think→thought / teach→taught<br>全部<b>-ought</b>で終わる！セットで覚えろ！</span>`},
  {id:34,q:"They (    ) watching TV when we visited them.", bank:["soon","buy","think","busy","leave","be","listen","large"], a:"were", g:"過去進行形",
   ex:`<b>正解：were</b><br><br>✏️ They <b>were</b> watching TV when we visited them.<br>📝 「私たちが訪ねた時、彼らはテレビを<b>見ていた</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>過去進行形</b>。be動詞＋～ingの形！<br><br>🔍 <b>どこを見る？</b><br>They (　) <b>watching</b> TV → (　)+ing→<b>進行形</b>！<br>① when we visited→<b>過去</b>→was/were<br>② They→<b>複数</b>→were<br><br>📌 <b>過去進行形の公式</b><br><span class="tip"><b>was/were + ～ing</b>＝「～していた」</span><br><br>⚡ <b>when+過去形</b>と一緒に使われることが超多い！`},
  {id:35,q:"Oh, no! The bus has just (    ). Now I must wait 40 minutes.", bank:["soon","buy","think","busy","leave","be","listen","large"], a:"left", g:"現在完了（完了）",
   ex:`<b>正解：left</b><br><br>✏️ Oh, no! The bus has just <b>left</b>. Now I must wait 40 minutes.<br>📝 「バスがちょうど<b>出発した</b>！40分待たなきゃ」<br>👀 <b>何を問われてる？</b><br>→ 現在完了の<b>完了</b>用法。<b>just</b>がキーワード！<br><br>🔍 <b>どこを見る？</b><br>has <b>just</b> (　) → justは<b>完了用法のキーワード</b>！<br>leave→<b>left</b>→left（ABB型）<br><br>📌 <b>完了用法のキーワード</b><br><span class="tip">just（ちょうど）/ already（もう）/ yet（まだ・もう）<br>→ どれが出ても<b>have + 過去分詞</b>の形！</span>`},
  {id:36,q:"We had a party yesterday. So there (    ) many children in this room.", bank:["run","know","become","like","interest","be","give","begin"], a:"were", g:"There is/are構文",
   ex:`<b>正解：were</b><br><br>✏️ We had a party yesterday. So there <b>were</b> many children in this room.<br>📝 「昨日パーティーがあった。子どもがたくさん<b>いた</b>」<br>👀 <b>何を問われてる？</b><br>→ There is/are構文の<b>過去形</b>。<b>2つの判断</b>が必要！<br><br>🔍 <b>どこを見る？</b><br>① <b>yesterday</b>→<b>過去</b>！→was/were<br>② many <b>children</b>→<b>複数</b>！→were<br>→ 過去＋複数＝There <b>were</b>！<br><br>📌 <b>There is/areの使い分け</b><br><span class="tip">There <b>is</b>(単数・現在) / <b>are</b>(複数・現在)<br>There <b>was</b>(単数・過去) / <b>were</b>(複数・過去)</span><br><br>⚡ be動詞は<b>後ろの名詞</b>の数で決める！`},
  {id:37,q:"I'm (    ) in Japanese manga.", bank:["run","know","become","like","interest","be","give","begin"], a:"interested", g:"受動態",
   ex:`<b>正解：interested</b><br><br>✏️ I'm <b>interested</b> in Japanese manga.<br>📝 「私は漫画に興味がある」<br>👀 <b>何を問われてる？</b><br>→ <b>-edと-ingの使い分け</b>。超頻出！<br><br>📌 <b>公式</b><br><span class="tip"><b>人の気持ち</b>→ -<b>ed</b>（interested/excited/surprised）<br><b>モノの性質</b>→ -<b>ing</b>（interesting/exciting/surprising）</span><br><br>🔍 I am (　) in manga → <b>「私」の気持ち</b>→<b>interested</b><br>Manga is (　) → <b>漫画の性質</b>→interesting`},
  {id:38,q:"The girl (    ) in the park is my sister.", bank:["run","know","become","like","interest","be","give","begin"], a:"running", g:"分詞の後置修飾",
   ex:`<b>正解：running</b><br><br>✏️ The girl <b>running</b> in the park is my sister.<br>📝 「公園で<b>走っている</b>女の子は私の妹です」<br>👀 <b>何を問われてる？</b><br>→ <b>現在分詞の後置修飾</b>。名詞の後から説明する形！<br><br>🔍 <b>どこを見る？</b><br>The girl (　) in the park → girlの<b>後</b>に(　)<br>「<b>走っている</b>女の子」→ <b>～ing</b>！→<b>running</b>（nを重ねる！）<br><br>📌 <b>nを重ねる理由</b><br><span class="tip">短母音＋子音→子音を重ねる！<br>run→runn<b>ing</b> / sit→sitting / swim→swimming</span><br><br>⚡ <b>後置修飾 vs 進行形</b><br>The girl <b>running</b>…<b>is</b>…（後置修飾）≠ The girl <b>is running</b>…（進行形）`},
  {id:39,q:"My mother (    ) me this watch as a birthday present last year.", bank:["run","know","become","like","interest","be","give","begin"], a:"gave", g:"一般動詞の過去形",
   ex:`<b>正解：gave</b><br><br>✏️ My mother <b>gave</b> me this watch as a birthday present last year.<br>📝 「母が去年、誕生日にこの時計を<b>くれた</b>」<br>👀 <b>何を問われてる？</b><br>→ 動詞の時制＋<b>giveの不規則変化</b>！<br><br>🔍 <b>どこを見る？</b><br><b>last year</b>→<b>過去</b>！→ give→<b>gave</b>→given<br><br>📌 <b>giveの文型（超重要！）</b><br><span class="tip"><b>give + 人 + モノ</b>＝「人にモノをあげる」（第4文型）<br>gave <b>me</b> this watch（私にこの時計をくれた）</span><br><br>⚡ <b>同じ文型の仲間</b>：give/tell/show/teach/send + 人 + モノ`},

,{id:40,q:"A: How was your baseball game yesterday?\nB: Our team (\u3000)! Everyone said it was a great game.",bank:["win","lose","play","run"],a:"won",g:"一般動詞の過去形",ex:`<b>正解：won</b><br><br>✏️ A: How was your baseball game yesterday?<br>B: Our team (\u3000)! Everyone said it was a great game.<br>📝 「昨日の野球の試合はどうだった？」「<b>勝った</b>よ！みんないい試合だって言ってた」<br>👀 <b>何を問われてる？</b><br>→ 動詞の<b>時制</b>と<b>不規則変化</b>。過去のサインを探せ！<br><br>🔍 <b>どこを見る？</b><br><b>yesterday</b>→ 昨日＝<b>過去</b>の話！→ win→<b>won</b><br><br>📌 <b>winの変化（丸暗記！）</b><br><span class="tip">win（勝つ）→ <b>won</b>（過去形）→ <b>won</b>（過去分詞）<br>※ 発音は「ワン」！</span><br><br>⚡ <b>スポーツ関連の動詞もセットで！</b><br>win→won（勝つ）/ lose→lost（負ける）/ beat→beat（打ち負かす）`}
,{id:41,q:"A: Did you take these beautiful pictures?\nB: No, I didn't. They (\u3000) by my sister last year.",bank:["take","make","give","see"],a:"were taken",g:"受動態",ex:`<b>正解：were taken</b><br><br>✏️ A: Did you take these beautiful pictures?<br>B: No, I didn't. They (\u3000) by my sister last year.<br>📝 「この写真撮ったの？」「ううん、姉が去年<b>撮った</b>んだ」<br>👀 <b>何を問われてる？</b><br>→ <b>受動態</b>。<b>by～</b>があったら受動態のサイン！<br><br>🔍 <b>3つの情報を拾え！</b><br>① <b>by</b> my sister → <b>受動態</b>確定！<br>② They(pictures) → <b>複数</b>→were<br>③ <b>last year</b> → <b>過去</b>→were<br>→ <b>were taken</b>！<br><br>📌 受動態＝<b>be動詞+過去分詞</b>。take→took→<b>taken</b><br>⚡ 主語の数(単数/複数)と時制(現在/過去)でbe動詞を決める！`}
,{id:42,q:"A: What is your favorite sport?\nB: Soccer! For me, it is the (\u3000) of all sports!",bank:["exciting","popular","important","beautiful"],a:"most exciting",g:"比較（最上級）",ex:`<b>正解：most exciting</b><br><br>✏️ A: What is your favorite sport?<br>B: Soccer! For me, it is the (\u3000) of all sports!<br>📝 「一番好きなスポーツは？」「サッカー！全スポーツの中で一番<b>ワクワクする</b>」<br>👀 <b>何を問われてる？</b><br>→ 比較級/最上級の判定！<b>theとof/inを探せ！</b><br><br>🔍 <b>the</b> (　) <b>of all</b> sports → theとof→<b>最上級</b>確定！<br>excitingは長い語→<b>most exciting</b><br><br>📌 <span class="tip">短い語→-est(tallest) / <b>長い語→most</b>(most exciting)<br>⚡ exciting/interesting/important/beautiful→全部<b>more/most型</b>！</span>`}
,{id:43,q:"A: You speak English very well!\nB: Thank you. I go to English class every week.\nA: Really? When (\u3000) going there?\nB: Three years ago. My teacher is very friendly.",bank:["start","begin","go","come"],a:"did you start",g:"一般動詞の過去形",ex:`<b>正解：did you start</b><br><br>✏️ A: You speak English very well!<br>B: Thank you. I go to English class every week.<br>A: Really? When (\u3000) going there?<br>B: Three years ago. My teacher is very friendly.<br>📝 「いつ英語教室に通い始めたの？」「3年前だよ」<br>👀 <b>何を問われてる？</b><br>→ <b>疑問文の作り方</b>＋<b>時制の判定</b>！<br><br>🔍 <b>どこを見る？</b><br>① When (　) → <b>疑問文</b>！<br>② 答えが「Three years <b>ago</b>」→ agoは<b>過去</b>のサイン！<br>③ startは<b>一般動詞</b>→過去の疑問文＝<b>Did+主語+原形</b><br>→ <b>did you start</b><br><br>⚡ <b>語形変化で「2語以上書く」パターン</b>に注意！<br>この問題は did you start と<b>3語</b>書く必要がある！`}
];

const seijoQ = [
  {id:0,q:"B: He (    ).",p:[{l:"ア",t:"is"},{l:"イ",t:"very"},{l:"ウ",t:"math"},{l:"エ",t:"at"},{l:"オ",t:"good"}],a:["ア","イ","オ","エ","ウ"],g:"熟語・連語",ex:`<b>正解：ア→イ→オ→エ→ウ</b><br>He <b>is very good at math</b>.<br><br>📝 「彼は数学がとても<b>得意です</b>」<br>👀 <b>何を問われてる？</b><br>→ 熟語の語順。まず<b>熟語のかたまり</b>を見つけろ！<br><br>🔍 <b>解き方</b><br>選択肢に good と at がある→ <b>be good at ～</b>（得意）という熟語！<br>→ is + very + good + at + math の順！<br><br>⚡ <b>整序の鉄則①</b>：まず<b>熟語・定型表現を発見</b>→それを軸に組み立てる！`},
  {id:1,q:"A: It's (    ) to write English messages.",p:[{l:"ア",t:"for"},{l:"イ",t:"to"},{l:"ウ",t:"write"},{l:"エ",t:"difficult"},{l:"オ",t:"me"}],a:["エ","ア","オ","イ","ウ"],g:"It is for to構文",ex:`<b>正解：エ→ア→オ→イ→ウ</b><br>It's <b>difficult for me to write</b>.<br><br>📝 「英語のメッセージを書くのは私には<b>難しい</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>It is…for人to～</b>構文。整序の超頻出パターン！<br><br>🔍 forとtoが選択肢にある→このパターン確定！<br>📌 語順丸暗記：<b>形容詞→for→人→to→動詞</b><br>difficult → for → me → to → write<br><br>⚡ この構文は<b>沖縄入試で毎年のように出る</b>！語順を体に染み込ませろ！`},
  {id:2,q:"B: I think she (    ).",p:[{l:"ア",t:"because"},{l:"イ",t:"come"},{l:"ウ",t:"it's"},{l:"エ",t:"won't"},{l:"オ",t:"raining"}],a:["エ","イ","ア","ウ","オ"],g:"接続詞",ex:`<b>正解：エ→イ→ア→ウ→オ</b><br>she <b>won't come because it's raining</b>.<br><br>📝 「雨が降っているから彼女は<b>来ないだろう</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>接続詞because</b>の使い方！<br><br>🔍 <b>解き方</b><br>becauseを見つけたら→<b>前に結論、後に理由</b>！<br>結論：won't come（来ないだろう）<br>理由：because it's raining（雨だから）<br><br>📌 <b>becauseの公式</b><br><span class="tip"><b>結論 + because + 理由</b><br>I was late <b>because</b> I missed the bus.</span><br><br>⚡ <b>won't = will not</b>（～しないだろう）も覚えよう！`},
  {id:3,q:"A: Do you remember (    ) last year?",p:[{l:"ア",t:"school festival"},{l:"イ",t:"held"},{l:"ウ",t:"when"},{l:"エ",t:"our"},{l:"オ",t:"was"}],a:["ウ","エ","ア","オ","イ"],g:"接続詞",ex:`<b>正解：ウ→エ→ア→オ→イ</b><br><b>when our school festival was held</b>.<br><br>📝 「去年学園祭が<b>いつ開かれたか</b>覚えてる？」<br>👀 <b>何を問われてる？</b><br>→ <b>間接疑問文</b>の語順。ここが整序の最大の引っかけ！<br><br>📌 <b>間接疑問文＝疑問詞+主語+動詞</b>（普通の語順に戻す！）<br>when + our school festival(主語) + was held(動詞)<br><br>⚡ <b>普通の疑問文</b>：When <b>was</b> it held?<br><b>間接疑問文</b>：when it <b>was</b> held → 語順ひっくり返る！`},
  {id:4,q:"B: My mother (    ) by 6 p.m.",p:[{l:"ア",t:"me"},{l:"イ",t:"come"},{l:"ウ",t:"to"},{l:"エ",t:"back"},{l:"オ",t:"told"}],a:["オ","ア","ウ","イ","エ"],g:"tell/ask/want＋人＋to",ex:`<b>正解：オ→ア→ウ→イ→エ</b><br>My mother <b>told me to come back</b>.<br><br>📝 「母は6時までに<b>帰って来いと言った</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>tell+人+to～</b>構文。<br><br>🔍 toldとtoがある→tell 人 to ～確定！<br>📌 <b>told → 人(me) → to → 動詞(come back)</b><br><br>⚡ <b>3兄弟を丸暗記！</b>tell/ask/want + 人 + to + 動詞<br>この3つは整序問題に<b>毎年出る</b>！`},
  {id:5,q:"B: This (    ) on my birthday.",p:[{l:"ア",t:"the camera"},{l:"イ",t:"gave"},{l:"ウ",t:"is"},{l:"エ",t:"me"},{l:"オ",t:"my father"}],a:["ウ","ア","オ","イ","エ"],g:"関係代名詞（目的格）",ex:`<b>正解：ウ→ア→オ→イ→エ</b><br>This <b>is the camera my father gave me</b>.<br><br>📝 「これが誕生日に父がくれたカメラです」<br>👀 <b>何を問われてる？</b><br>→ <b>目的格の関係代名詞の省略</b>！実は「which」が消えている！<br><br>🔍 <b>解き方</b><br>① the camera（名詞）の後に→my father gave(主語+動詞)→<b>関係代名詞が省略</b>されてる！<br>② the camera [which] my father gave me<br>→「父が私にくれたカメラ」<br><br>📌 <b>省略パターンの見分け方</b><br><span class="tip"><b>名詞のすぐ後に「主語+動詞」</b>が来たら→関係代名詞の省略！<br>the camera <b>my father gave me</b>（父がくれたカメラ）<br>the book <b>I read</b>（私が読んだ本）<br>the cake <b>she made</b>（彼女が作ったケーキ）</span><br><br>⚡ <b>目的格は省略できる！</b>（主格のwhoやwhichは省略できない）<br>名詞+[省略]=主語+動詞 → 整序では最頻出！`},
  {id:6,q:"B: (    ) our classroom in America.",p:[{l:"ア",t:"we"},{l:"イ",t:"to"},{l:"ウ",t:"don't"},{l:"エ",t:"clean"},{l:"オ",t:"have"}],a:["ア","ウ","オ","イ","エ"],g:"助動詞",ex:`<b>正解：ア→ウ→オ→イ→エ</b><br><b>We don't have to clean</b>.<br><br>📝 「私たちは掃除する<b>必要がない</b>」<br>👀 <b>何を問われてる？</b><br>→ don't have to と must notの違い。<br><br>📌 <b>超重要！意味が全然違う！</b><br><span class="tip"><b>don't have to</b>＝する<b>必要ない</b>（やらなくてもOK）<br><b>must not</b>＝してはいけない（<b>禁止！</b>）</span>`},
  {id:7,q:"B: Oh, how (    ) here?",p:[{l:"ア",t:"you"},{l:"イ",t:"long"},{l:"ウ",t:"going to"},{l:"エ",t:"stay"},{l:"オ",t:"are"}],a:["イ","オ","ア","ウ","エ"],g:"疑問詞",ex:`<b>正解：イ→オ→ア→ウ→エ</b><br><b>how long are you going to stay</b> here?<br><br>📝 「ここに<b>どのくらい</b>滞在する予定？」<br>👀 <b>何を問われてる？</b><br>→ <b>How long</b>の疑問文の語順！<br><br>🔍 <b>解き方</b><br>① How longで「期間」を質問<br>② 疑問文の語順：<b>are you</b> going to stay<br><br>📌 <b>How＋αの疑問文を丸暗記！</b><br><span class="tip"><b>How long</b>～?（期間）/ <b>How many</b>～?（数）<br><b>How much</b>～?（値段）/ <b>How often</b>～?（頻度）<br><b>How old</b>～?（年齢）/ <b>How far</b>～?（距離）</span>`},
  {id:8,q:"A: Did you know that English (    ) in Canada?",p:[{l:"ア",t:"and"},{l:"イ",t:"French"},{l:"ウ",t:"are"},{l:"エ",t:"spoken"}],a:["ア","イ","ウ","エ"],g:"受動態",ex:`<b>正解：ア→イ→ウ→エ</b><br>Did you know that English <b>and French are spoken</b> in Canada?<br><br>📝 「英語とフランス語がカナダで<b>話されている</b>って知ってた？」<br>👀 <b>何を問われてる？</b><br>→ <b>受動態</b>の語順。<b>be動詞+過去分詞</b>がカギ！<br><br>🔍 <b>どこを見る？</b><br>English (　) in Canada → 英語は「話<b>される</b>」側→<b>受動態</b>！<br>→ <b>are spoken</b><br><br>📌 <b>公式</b><br><span class="tip"><b>受動態</b>＝be動詞＋過去分詞<br>speak→spoke→<b>spoken</b></span><br><br>⚡ <b>「言語＋is/are spoken in＋国」</b>は入試頻出パターン！`},
  {id:9,q:"A: Excuse me, (    ) borrow here?",p:[{l:"ア",t:"I"},{l:"イ",t:"can"},{l:"ウ",t:"many"},{l:"エ",t:"books"},{l:"オ",t:"how"}],a:["オ","ウ","エ","イ","ア"],g:"疑問詞",ex:`<b>正解：オ→ウ→エ→イ→ア</b><br><b>how many books can I</b> borrow here?<br><br>📝 「ここで<b>何冊</b>借りられますか？」<br>👀 <b>何を問われてる？</b><br>→ <b>How many</b>の疑問文の語順！<br><br>🔍 <b>解き方</b><br>① <b>How many + 複数名詞</b>を1セットに→how many books<br>② 疑問文の語順→can I borrow<br><br>📌 <b>How manyの公式</b><br><span class="tip"><b>How many + 複数名詞 + 疑問文の語順？</b><br>How many books do you have?<br>How many students are there?</span><br><br>⚡ How manyの後は必ず<b>複数名詞</b>！<br>✕ How many <b>book</b> → ○ How many <b>books</b>`},
  {id:10,q:"B: They gave me (    ).",p:[{l:"ア",t:"a"},{l:"イ",t:"watch"},{l:"ウ",t:"in"},{l:"エ",t:"France"},{l:"オ",t:"made"}],a:["ア","イ","オ","ウ","エ"],g:"分詞の後置修飾",ex:`<b>正解：ア→イ→オ→ウ→エ</b><br>a <b>watch made in France</b>.<br><br>📝 「フランス<b>製の</b>時計をプレゼントにもらった」<br>👀 <b>何を問われてる？</b><br>→ <b>過去分詞の後置修飾</b>！名詞の後から「～された」と説明する！<br><br>🔍 <b>解き方</b><br>① a watch（名詞）の後に<b>made</b>（過去分詞）→後置修飾！<br>② made in France＝「フランスで<b>作られた</b>」→「フランス製の」<br><br>📌 <b>made in～は超頻出！</b><br><span class="tip">a watch <b>made in France</b>（フランス製の時計）<br>products <b>made in Japan</b>（日本製の製品）<br>food <b>made in Okinawa</b>（沖縄産の食べ物）</span><br><br>⚡ <b>超頻出パターンまとめ</b><br><span class="tip"><b>made in</b>～（～製）/ <b>written in</b>～（～語で書かれた）<br><b>taken by</b>～（～に撮られた）/ <b>spoken in</b>～（～で話されている）</span><br><br>⚡ makeの変化：make→made→<b>made</b>（ABB型）`},
  {id:11,q:"B: It was (    ) all the questions.",p:[{l:"ア",t:"easy"},{l:"イ",t:"for"},{l:"ウ",t:"me"},{l:"エ",t:"to"},{l:"オ",t:"answer"}],a:["ア","イ","ウ","エ","オ"],g:"It is for to構文",ex:`<b>正解：ア→イ→ウ→エ→オ</b><br>It was <b>easy for me to answer</b> all the questions.<br><br>📝 「全問<b>答えるのは簡単</b>だった」<br>👀 <b>何を問われてる？</b><br>→ <b>It is…for人to～</b>構文の語順！<br><br>🔍 <b>解き方</b><br>forとtoが選択肢にある→<b>It is for人to～構文</b>確定！<br>語順：<b>形容詞→for→人→to→動詞</b><br><br>📌 <b>語順を丸暗記！</b><br><span class="tip"><b>It is + 形容詞 + for + 人 + to + 動詞</b><br>It is <b>difficult for me to</b> speak English.<br>It is <b>easy for him to</b> solve this problem.</span><br><br>⚡ 沖縄入試で<b>毎年出る</b>！語順を体に染み込ませろ！`},
  {id:12,q:"A: The (    ) over there.",p:[{l:"ア",t:"care"},{l:"イ",t:"man"},{l:"ウ",t:"is"},{l:"エ",t:"who"},{l:"オ",t:"taking"}],a:["イ","エ","ウ","オ","ア"],g:"関係代名詞（主格）",ex:`<b>正解：イ→エ→ウ→オ→ア</b><br>The <b>man who is taking care of</b>… over there.<br><br>📝 「向こうで犬の世話をしている男の人は…」<br>👀 <b>何を問われてる？</b><br>→ <b>関係代名詞who</b>の語順！<br><br>🔍 <b>解き方</b><br>① man(人)の後に<b>who</b>→関係代名詞！<br>② who + <b>is taking care of</b>＝「世話をしている」<br><br>📌 <b>関係代名詞の語順</b><br><span class="tip"><b>名詞(人) + who + 動詞</b>（主格）<br>the man <b>who is</b> taking care of～</span><br><br>⚡ <b>take care of～</b>＝「～の世話をする」（= look after～）`},
  {id:13,q:"B: He (    ) as fast as Keisuke.",p:[{l:"ア",t:"run"},{l:"イ",t:"fast"},{l:"ウ",t:"not"},{l:"エ",t:"can"},{l:"オ",t:"as"}],a:["エ","ウ","ア","オ","イ"],g:"比較（原級）",ex:`<b>正解：エ→ウ→ア→オ→イ</b><br>He <b>can not run as fast</b> as Keisuke.<br><br>📝 「彼はケイスケほど速く走れない」<br>👀 <b>何を問われてる？</b><br>→ <b>as～as…の否定形（原級比較の否定）</b>。<br><br>🔍 <b>解き方</b><br>not / as / as が3つある！→<b>not as～as…</b>のパターン！<br>can + not → run → as + fast（原級）→ as Keisuke<br><br>📌 <b>as～as…の3パターン</b><br><span class="tip"><b>as + 原級 + as</b>＝「～と同じくらい」<br><b>not as + 原級 + as</b>＝「～ほど…ない」<br>He runs <b>as fast as</b> Keisuke.（同じくらい速い）<br>He <b>can't run as fast as</b> Keisuke.（ほど速くない）</span><br><br>⚡ <b>書き換えパターン（入試頻出！）</b><br><span class="tip">not as fast as Keisuke<br>= Keisuke runs <b>faster than</b> him.（比較級に書き換え）</span>`},
  {id:14,q:"A: Do you (    ) something hot to drink?",p:[{l:"ア",t:"hot"},{l:"イ",t:"drink"},{l:"ウ",t:"something"},{l:"エ",t:"want"},{l:"オ",t:"to"}],a:["エ","ウ","ア","オ","イ"],g:"不定詞の名詞的用法",ex:`<b>正解：エ→ウ→ア→オ→イ</b><br>Do you <b>want something hot to drink</b>?<br><br>📝 「何か温かい飲み物はいかがですか？」<br>👀 <b>何を問われてる？</b><br>→ <b>somethingの後の語順</b>。<br><br>📌 <b>something/anything/nothing + 形容詞</b>（形容詞が後ろ！）<br>普通は「hot something」と言いたくなるけど逆！<br>something <b>hot</b> / anything <b>new</b> / nothing <b>special</b>`},
  {id:15,q:"Do you know (    ) well?",p:[{l:"ア",t:"who"},{l:"イ",t:"the guitar"},{l:"ウ",t:"plays"},{l:"エ",t:"anyone"}],a:["エ","ア","ウ","イ"],g:"関係代名詞（主格）",ex:`<b>正解：エ→ア→ウ→イ</b><br><b>anyone who plays the guitar</b> well?<br><br>📝 「ギターを上手に<b>弾く人</b>を誰か知ってる？」<br>👀 <b>何を問われてる？</b><br>→ <b>関係代名詞who</b>の語順！<br><br>🔍 <b>解き方</b><br>① anyone(人)→次に<b>who</b>！<br>② who＋plays(動詞)→<b>主格</b>の関係代名詞！<br><br>📌 <b>主格の関係代名詞</b><br><span class="tip"><b>先行詞(人) + who + 動詞</b><br>a friend <b>who speaks</b> English<br><b>anyone who plays</b> the guitar</span><br><br>⚡ anyone/someone/everyoneの後のwhoは<b>超頻出</b>！`},
  {id:16,q:"We (    ) school on Sunday.",p:[{l:"ア",t:"have"},{l:"イ",t:"go to"},{l:"ウ",t:"don't"},{l:"エ",t:"to"}],a:["ウ","ア","エ","イ"],g:"have to / must",ex:`<b>正解：ウ→ア→エ→イ</b><br>We <b>don't have to go to</b> school on Sunday.<br><br>📝 「日曜は学校に行く<b>必要がない</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>don't have to</b>の語順！<br><br>🔍 don'tとhaveとtoがある→<b>don't have to</b>確定！<br><br>📌 <b>超重要！意味の違い！</b><br><span class="tip"><b>don't have to</b>＝する<b>必要がない</b>（やらなくてもOK）<br><b>must not</b>＝しては<b>いけない</b>（禁止！）</span><br><br>⚡ この2つの違いは<b>入試で毎年出る</b>！`},
  {id:17,q:"This is (    ) in 1835.",p:[{l:"ア",t:"by"},{l:"イ",t:"the castle"},{l:"ウ",t:"the king"},{l:"エ",t:"built"}],a:["イ","エ","ア","ウ"],g:"分詞の後置修飾",ex:`<b>正解：イ→エ→ア→ウ</b><br>This is <b>the castle built by the king</b> in 1835.<br><br>📝 「これは王によって<b>建てられた</b>城です」<br>👀 <b>何を問われてる？</b><br>→ <b>過去分詞の後置修飾</b>！<br><br>🔍 <b>解き方</b><br>① the castle（名詞）＋built（過去分詞）＋by the king<br>→「王に<b>建てられた</b>城」<br><br>📌 <b>後置修飾＋byの超頻出パターン</b><br><span class="tip">名詞 + 過去分詞 + by～<br>a picture <b>taken by</b> him / a song <b>sung by</b> her<br>the castle <b>built by</b> the king</span><br><br>⚡ <b>built</b>=build(建てる)の過去分詞！build→built→built`},
  {id:18,q:"My mother (    ) my smartphone at dinner.",p:[{l:"ア",t:"using"},{l:"イ",t:"told"},{l:"ウ",t:"to"},{l:"エ",t:"me"},{l:"オ",t:"stop"}],a:["イ","エ","ウ","オ","ア"],g:"tell/ask/want＋人＋to",ex:`<b>正解：イ→エ→ウ→オ→ア</b><br>Mother <b>told me to stop using</b> my smartphone.<br><br>📝 「母は夕食時にスマホを<b>使うのをやめろと言った</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>2つの公式が合体</b>した問題！<br><br>📌 ① <b>tell+人+to～</b>（～しろと言う）<br>② <b>stop+～ing</b>（～するのをやめる）<br>→ told me <b>to stop using</b><br><br>⚡ 整序で公式が2つ組み合わさるパターンは難問！<b>先に公式を2つ見抜く</b>のがコツ！`},
  {id:19,q:"The (    ) delicious.",p:[{l:"ア",t:"cake"},{l:"イ",t:"made"},{l:"ウ",t:"is"},{l:"エ",t:"your mother"},{l:"オ",t:"that"}],a:["ア","オ","エ","イ","ウ"],g:"関係代名詞（目的格）",ex:`<b>正解：ア→オ→エ→イ→ウ</b><br>The <b>cake that your mother made is</b> delicious.<br><br>📝 「お母さんが作ったケーキは<b>おいしい</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>目的格の関係代名詞</b>の語順！整序の最大の難所！<br><br>🔍 <b>解き方</b><br>① the cake（名詞）の後に<b>that</b>→関係代名詞！<br>② that + your mother(主語) + made(動詞)→<b>目的格</b>！<br>③ 関係代名詞節が終わったら→<b>is</b>（本文の動詞）に戻る！<br><br>📌 <b>目的格の語順</b><br><span class="tip"><b>名詞 + that/which + 主語 + 動詞</b><br>the cake <b>that your mother made</b></span><br><br>⚡ <b>整序で一番難しいのは「どこで関係代名詞節が終わるか」</b>！<br>the cake [that your mother made] / <b>is</b> delicious<br>→ 主語が長くても動詞は<b>is</b>！`},
  {id:20,q:"Do (    )?",p:[{l:"ア",t:"the hamburger"},{l:"イ",t:"know"},{l:"ウ",t:"ate"},{l:"エ",t:"you"},{l:"オ",t:"who"}],a:["エ","イ","オ","ウ","ア"],g:"間接疑問文",ex:`<b>正解：エ→イ→オ→ウ→ア</b><br><b>Do you know who ate the hamburger</b>?<br><br>📝 「誰がハンバーガーを<b>食べたか</b>知ってる？」<br>👀 <b>何を問われてる？</b><br>→ <b>間接疑問文</b>の語順！<br><br>🔍 <b>解き方</b><br>① Do you know（知ってる？）<br>② who ate the hamburger（誰が食べたか）<br>→ whoが<b>主語を兼ねてる</b>からそのまま！<br><br>📌 <b>間接疑問文の公式</b><br><span class="tip"><b>疑問詞 + 主語 + 動詞</b>（普通の語順に戻す！）<br>Do you know <b>where he lives</b>?</span><br><br>⚡ <b>whoが主語の時は特別！</b>語順変わらない！<br>Who ate it? → Do you know <b>who ate</b> it?`},
  {id:21,q:"(    ) better, Korean or Chinese?",p:[{l:"ア",t:"speak"},{l:"イ",t:"language"},{l:"ウ",t:"you"},{l:"エ",t:"do"},{l:"オ",t:"which"}],a:["オ","イ","エ","ウ","ア"],g:"疑問詞",ex:`<b>正解：オ→イ→エ→ウ→ア</b><br><b>Which language do you speak</b> better?<br><br>📝 「韓国語と中国語、どちらを上手に<b>話せる</b>？」<br>👀 <b>何を問われてる？</b><br>→ <b>Which＋名詞</b>の疑問文の語順！<br><br>🔍 <b>解き方</b><br>① <b>Which + 名詞</b>を1セット→Which language<br>② 疑問文の語順→do you speak<br><br>📌 <b>Whichの公式</b><br><span class="tip"><b>Which + 名詞 + 疑問文の語順?</b><br>Which <b>color</b> do you like?</span><br><br>⚡ <b>Which vs What</b>：Which＝選択肢あり / What＝自由回答`},
  {id:22,q:"B: My sister (    ) together.",p:[{l:"ア",t:"to"},{l:"イ",t:"go"},{l:"ウ",t:"me"},{l:"エ",t:"shopping"},{l:"オ",t:"asked"}],a:["オ","ウ","ア","イ","エ"],g:"tell/ask/want＋人＋to",ex:`<b>正解：オ→ウ→ア→イ→エ</b><br>My sister <b>asked me to go shopping</b> together.<br><br>📝 「姉に買い物に<b>行くよう頼まれた</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>ask+人+to～</b>構文の語順！<br><br>🔍 askedとtoがある→<b>ask 人 to ～</b>確定！<br>→ asked→me(人)→to→go shopping<br><br>📌 <b>3兄弟を丸暗記！</b><br><span class="tip"><b>tell</b>+人+to～＝「<b>しろと言う</b>」<br><b>ask</b>+人+to～＝「<b>するよう頼む</b>」<br><b>want</b>+人+to～＝「<b>してほしい</b>」</span><br><br>⚡ この3つは整序問題に<b>毎年出る</b>！`},
  {id:23,q:"The book (    ) very popular.",p:[{l:"ア",t:"is"},{l:"イ",t:"she"},{l:"ウ",t:"last year"},{l:"エ",t:"which"},{l:"オ",t:"wrote"}],a:["エ","イ","オ","ウ","ア"],g:"関係代名詞（目的格）",ex:`<b>正解：エ→イ→オ→ウ→ア</b><br>The book <b>which she wrote last year is</b> very popular.<br><br>📝 「彼女が去年書いた本はとても<b>人気がある</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>関係代名詞の目的格</b>＋本文の動詞の位置！<br><br>🔍 <b>解き方</b><br>① book(モノ)→<b>which</b>→she wrote(主語+動詞)→<b>目的格</b>！<br>② 関係代名詞節が終わったら→<b>is</b>(本文の動詞)へ！<br><br>📌 <b>目的格の関係代名詞</b><br><span class="tip"><b>名詞 + which + 主語 + 動詞</b><br>the book <b>which she wrote</b></span><br><br>⚡ 関係代名詞節と本文の動詞の<b>境目</b>を見極めろ！`},
  {id:24,q:"How many times do (    ) you to clean your room?",p:[{l:"ア",t:"to"},{l:"イ",t:"have"},{l:"ウ",t:"I"},{l:"エ",t:"tell"}],a:["ウ","イ","ア","エ"],g:"have to / must",ex:`<b>正解：ウ→イ→ア→エ</b><br>How many times do <b>I have to tell</b> you?<br><br>📝 「何回言わなきゃいけないの！部屋を片付けなさい！」<br>👀 <b>何を問われてる？</b><br>→ <b>have to～</b>の疑問文での語順！<br><br>🔍 do I → have to → tell<br>→ do I <b>have to tell</b>（言わなきゃいけないのか）<br><br>📌 <b>have toの3パターン</b><br><span class="tip">肯定：I <b>have to</b> study.<br>疑問：<b>Do</b> I <b>have to</b> study?<br>否定：I <b>don't have to</b> study.</span>`},
  {id:25,q:"It is the best cake (    ) eaten.",p:[{l:"ア",t:"ever"},{l:"イ",t:"I"},{l:"ウ",t:"have"},{l:"エ",t:"that"}],a:["エ","イ","ウ","ア"],g:"現在完了（経験）",ex:`<b>正解：エ→イ→ウ→ア</b><br>the best cake <b>that I have ever</b> eaten.<br><br>📝 「今まで食べた中で一番おいしいケーキだ」<br>👀 <b>何を問われてる？</b><br>→ <b>最上級＋関係代名詞＋現在完了</b>の3段コンボ！難問中の難問！<br><br>🔍 <b>解き方（順番に考えよう）</b><br>① the best cake（最上級）→次に<b>that</b>（関係代名詞）<br>② I have ever eaten（私が今まで食べた）→<b>現在完了の経験</b>！<br>③ the best cake / that I have ever eaten.<br><br>📌 <b>丸暗記パターン</b><br><span class="tip"><b>the + 最上級 + 名詞 + that + 主語 + have ever + 過去分詞</b><br>＝「今まで～した中で一番の…」<br>the best cake <b>that I have ever eaten</b>（食べた中で一番おいしい）<br>the most beautiful city <b>that I have ever seen</b>（見た中で一番美しい）</span><br><br>⚡ このパターンは沖縄入試の<b>超頻出</b>！文ごと丸暗記すると最強！`},
  {id:26,q:"This is one of the famous books (    ) in Japan.",p:[{l:"ア",t:"many"},{l:"イ",t:"people"},{l:"ウ",t:"by"},{l:"エ",t:"read"}],a:["エ","ウ","ア","イ"],g:"分詞の後置修飾",ex:`<b>正解：エ→ウ→ア→イ</b><br>books <b>read by many people</b> in Japan.<br><br>📝 「日本でたくさんの人に<b>読まれている</b>有名な本のひとつ」<br>👀 <b>何を問われてる？</b><br>→ <b>過去分詞の後置修飾</b>！名詞の後から「～された」と説明する！<br><br>🔍 <b>解き方</b><br>① books（名詞）の後に(　)→<b>後置修飾</b>！<br>② 「多くの人に<b>読まれている</b>」→受け身→<b>過去分詞</b>！<br>③ read（過去分詞）+ by（～によって）+ many people<br>→ books <b>read by many people</b><br><br>📌 <b>readの特殊変化！</b><br><span class="tip">read→read→<b>read</b>（AAA型：スペルが全部同じ！）<br>※ 発音が違う！現在「リード」/ 過去・過去分詞「レッド」</span><br><br>📌 <b>後置修飾＋byの超頻出パターン</b><br><span class="tip">名詞 + 過去分詞 + by～<br>a picture <b>taken by</b> him / a song <b>sung by</b> her<br>books <b>read by</b> many people</span><br><br>⚡ <b>後置修飾の見分け</b>：〜ing→「～している○○」/ 過去分詞→「～された○○」`},
  {id:27,q:"B: This book (    ).",p:[{l:"ア",t:"written"},{l:"イ",t:"in"},{l:"ウ",t:"is"},{l:"エ",t:"Japanese"}],a:["ウ","ア","イ","エ"],g:"分詞の後置修飾",ex:`<b>正解：ウ→ア→イ→エ</b><br>This book <b>is written in Japanese</b>.<br><br>📝 「この本は<b>日本語で書かれている</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>受動態</b>の語順！<br><br>🔍 This book→<b>is</b>(be動詞)→<b>written</b>(過去分詞)→<b>in Japanese</b><br><br>📌 <b>「～語で書かれている」の定型！</b><br><span class="tip"><b>be written in + 言語</b><br>written <b>in Japanese</b> / written <b>in English</b></span><br><br>⚡ 受動態＝<b>be動詞+過去分詞</b>！write→wrote→<b>written</b>`},
  {id:28,q:"A: What (    ) Mary's plan?",p:[{l:"ア",t:"do"},{l:"イ",t:"of"},{l:"ウ",t:"think"},{l:"エ",t:"you"}],a:["ア","エ","ウ","イ"],g:"熟語・連語",ex:`<b>正解：ア→エ→ウ→イ</b><br>What <b>do you think of</b> Mary's plan?<br><br>📝 「メアリーの計画を<b>どう思う</b>？」<br>👀 <b>何を問われてる？</b><br>→ <b>定型表現</b>の語順。丸暗記が一番！<br><br>🔍 thinkとofが見えたら→<b>What do you think of～?</b>確定！<br><br>📌 <b>感想を聞く表現</b><br><span class="tip"><b>What do you think of～?</b>＝「～をどう思う？」<br><b>How do you like～?</b>＝「～はどう？」</span><br><br>⚡ think <b>of</b> のofを忘れるのが<b>最多ミス</b>！<br>✕ What do you think Mary's plan?<br>○ What do you think <b>of</b> Mary's plan?`},
  {id:29,q:"B: You (    ) 4:00 p.m.",p:[{l:"ア",t:"stay"},{l:"イ",t:"until"},{l:"ウ",t:"may"},{l:"エ",t:"here"}],a:["ウ","ア","エ","イ"],g:"助動詞",ex:`<b>正解：ウ→ア→エ→イ</b><br>You <b>may stay here until</b> 4:00 p.m.<br><br>📝 「4時まで<b>ここにいてもいい</b>よ」<br>👀 <b>何を問われてる？</b><br>→ <b>助動詞may</b>と<b>untilの使い方</b>！<br><br>🔍 may(助動詞)→stay(原形)→here(場所)→until 4:00(時間)<br><br>📌 <b>mayの2つの意味</b><br><span class="tip"><b>may</b>＝①してもよい（<b>許可</b>）/ ②～かもしれない（<b>推量</b>）</span><br><br>⚡ <b>until</b>＝「～まで（ずっと）」<br>until 4:00 / until tomorrow / until next week`},

,{id:30,q:"I (　) with my homework. She is good at science.",p:[{l:"ア",t:"my sister"},{l:"イ",t:"to"},{l:"ウ",t:"me"},{l:"エ",t:"help"},{l:"オ",t:"asked"}],a:["オ","ア","イ","エ","ウ"],g:"tell/ask/want＋人＋to",ex:`<b>正解：オ→ア→イ→エ→ウ</b><br>I <b>asked my sister to help me</b> with my homework.<br><br>📝 「姉に宿題を手伝ってくれるよう頼んだ」<br>👀 <b>何を問われてる？</b><br>→ <b>ask+人+to+動詞</b>構文！<br><br>🔍 askedとtoがある→<b>ask 人 to ～</b>確定！<br>📌 asked → my sister(人) → to → help(動詞) → me<br><br>⚡ tell/ask/want+人+to～ の3セットは<b>毎年出る</b>！<br>「姉に宿題を手伝ってくれるよう<b>頼んだ</b>」`}
,{id:31,q:"(　) really interesting.",p:[{l:"ア",t:"recommended"},{l:"イ",t:"which"},{l:"ウ",t:"was"},{l:"エ",t:"the book"},{l:"オ",t:"you"}],a:["エ","イ","オ","ア","ウ"],g:"関係代名詞（目的格）",ex:`<b>正解：エ→イ→オ→ア→ウ</b><br><b>The book which you recommended was</b> really interesting.<br><br>📝 「あなたが勧めてくれた本はとても<b>面白かった</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>目的格の関係代名詞which</b>＋<b>本文の動詞の場所</b>！<br><br>🔍 <b>解き方</b><br>① the book（名詞）→ モノ→<b>which</b>（関係代名詞）<br>② which + you(主語) + recommended(動詞)→<b>目的格</b>！<br>③ 関係代名詞節が終わったら→<b>was</b>（本文の動詞）に戻る！<br><br>📌 <b>整序で一番難しいポイント</b><br><span class="tip">the book [which you recommended] / <b>was</b> really interesting<br>「あなたが勧めた本（←長い主語）」→ is/was（動詞）</span><br><br>⚡ <b>関係代名詞節と本文の動詞の境目を見極めろ！</b><br>節が終わる＝次に本文の動詞！主語が長くても焦るな！`}
,{id:32,q:"I (　) like him.",p:[{l:"ア",t:"play"},{l:"イ",t:"wish"},{l:"ウ",t:"could"},{l:"エ",t:"I"},{l:"オ",t:"the piano"}],a:["イ","エ","ウ","ア","オ"],g:"仮定法過去",ex:`<b>正解：イ→エ→ウ→ア→オ</b><br>I <b>wish I could play the piano</b> like him.<br><br>📝 「彼のようにピアノが弾けたらいいのになぁ」<br>👀 <b>何を問われてる？</b><br>→ <b>I wish+仮定法</b>！「～できたらなぁ」<br><br>🔍 wishとcouldがある→<b>I wish I could～</b>確定！<br>📌 I wish + I could + <b>動詞の原形</b><br>→ wish → I → could → play → the piano<br><br>⚡ 「ピアノが彼のように弾けたらいいのになぁ」<br><b>I wish I could～</b>は入試の<b>超頻出パターン</b>！丸暗記！`}];

const kaiwaQ = [
  {id:0,ctx:"A: May I help you?\nB: ( ① )\nA: That's wonderful! ( ② )\nB: He likes blue, so can I see that blue one?\nA: ( ③ )\nB: I like it! Thank you very much.",ch:["ア What is his favorite color?","イ I have a problem.","ウ Yes, I want to get a T-shirt for Father's Day.","エ No, I can't find it.","オ OK. Here you are."],a:["ウ","ア","オ"],s:3,g:"買い物の会話",ex:`<b>正解：ウ→ア→オ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ Yes, I want to get a T-shirt for Father's Day.<br>ア What is his favorite color?<br>オ OK. Here you are.</span><br>📝 「父の日にTシャツを買いたい」→「好きな色は？」→「はいどうぞ」<br>📌 <b>会話の流れを読もう！</b><br>A: いらっしゃいませ<br>①<b>ウ</b> 父の日にTシャツを買いたいんです ← 店に来た目的！<br>A: すばらしい！<br>②<b>ア</b> お父さんの好きな色は？ ← 店員が色を聞く<br>B: 青が好き。あの青いの見せて<br>③<b>オ</b> はい、どうぞ ← 商品を渡す<br><br>🧠 <b>暗記！買い物の定型表現</b><br><span class="tip">・May I help you?（いらっしゃいませ）<br>・I'm looking for～（～を探してます）<br>・Can I try it on?（試着していい？）<br>・Here you are.（はい、どうぞ）<br>・I'll take it.（これにします）</span>`},
  {id:1,ctx:"Did you finish your English homework for summer vacation?",ch:["ア No. The last question is very difficult.","イ Sounds good. We can go to the library.","ウ I agree. Let's try to finish it together."],a:["ア","ウ","イ"],s:3,g:"日常会話",ex:`<b>正解：ア→ウ→イ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ア No. The last question is very difficult.<br>ウ I agree. Let's try to finish it together.<br>イ Sounds good. We can go to the library.</span><br>📝 「宿題終わった？」→「まだ。難しい」→「一緒にやろう」→「いいね！図書館行こう」<br>👀 <b>何を問われてる？</b><br>→ 会話の<b>自然な流れ</b>を読む問題！<br><br>🔍 <b>会話の流れを読もう</b><br>「宿題終わった？」と聞かれて→<br>①<b>ア</b>「まだ。最後の問題が難しい」← <b>状況説明（困ってる）</b><br>→ 困ってると聞いたら次は「一緒にやろう」という提案が自然！<br>②<b>ウ</b>「そうだね。一緒にやろう」← <b>同意＋提案</b><br>→ 提案に賛成するなら具体案を出すのが自然！<br>③<b>イ</b>「いいね。図書館に行こう」← <b>承諾＋具体案</b><br><br>📌 <b>会話問題の解き方</b><br><span class="tip">💡 「困り事→提案→賛成+具体案」の流れが<b>超定番</b>！<br>① 問題文（困り事）② 提案 ③ 承諾 の3ステップで考える！</span><br><br>⚡ <b>Sounds good.</b>＝「いいね！」承諾の超定番表現！ = That's a good idea.`},
  {id:2,ctx:"May I help you?",ch:["ア No problem. Can I try it on?","イ Yes. I'm looking for a black jacket.","ウ Let me see. We have only a large size."],a:["イ","ウ","ア"],s:3,g:"買い物の会話",ex:`<b>正解：イ→ウ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ Yes. I'm looking for a black jacket.<br>ウ Let me see. We have only a large size.<br>ア No problem. Can I try it on?</span><br>📝 「黒いジャケット探してます」→「Lサイズしかない」→「試着していい？」<br>👀 <b>何を問われてる？</b><br>→ <b>買い物の会話パターン</b>！<br><br>🔍 <b>会話の流れを読もう！</b><br>A: いらっしゃいませ<br>①<b>イ</b> 黒いジャケットを探してます ← <b>目的</b><br>②<b>ウ</b> Lサイズしかないです ← <b>情報提供</b><br>③<b>ア</b> 大丈夫。試着していい？ ← <b>反応</b><br><br>📌 <b>買い物の3ステップ</b><br><span class="tip">①目的→②情報→③反応<br>Can I try it on?＝「試着していいですか？」</span>`},
  {id:3,ctx:"You look sad. What's wrong?",ch:["ア You're right. Thanks. I will.","イ You should go to the police.","ウ I have lost my bag. Everything is in it."],a:["ウ","イ","ア"],s:3,g:"日常会話",ex:`<b>正解：ウ→イ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ I have lost my bag. Everything is in it.<br>イ You should go to the police.<br>ア You're right. Thanks. I will.</span><br>📝 「悲しそうだけどどうしたの？」→「カバン失くした」→「警察に届けるべき」→「そうだね」<br>🔍 「悲しそうだけど、どうしたの？」→<br>① <b>ウ</b> カバンを失くした ← 困り事を<b>説明</b><br>② <b>イ</b> 警察に届けるべき ← <b>アドバイス</b><br>③ <b>ア</b> そうだね ← <b>受け入れ</b><br><br>⚡ You should～（すべき）→ You're right.（そうだね）はペアで覚えろ！`},
  {id:4,ctx:"Have you seen that movie yet?",ch:["ア How about going to see it together next Sunday?","イ That sounds good. See you then.","ウ No, but I want to."],a:["ウ","ア","イ"],s:3,g:"日常会話",ex:`<b>正解：ウ→ア→イ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ No, but I want to.<br>ア How about going to see it together next Sunday?<br>イ That sounds good. See you then.</span><br>📝 「映画もう観た？」→「まだだけど観たい」→「一緒にどう？」→「いいね！」<br>👀 <b>何を問われてる？</b><br>→ <b>状況説明→誘い→承諾</b>の定番パターン！<br><br>🔍 <b>会話の流れ</b><br>①<b>ウ</b> まだだけど観たい ← <b>状況</b><br>②<b>ア</b> 日曜に一緒にどう？ ← <b>誘い</b><br>③<b>イ</b> いいね！じゃあまた ← <b>承諾</b><br><br>📌 <span class="tip">How about～?（～はどう？）→ Sounds good!（いいね！）</span>`},
  {id:5,ctx:"It's almost noon. I'm hungry.",ch:["ア Shall we go there?","イ Me, too. There is a good restaurant near here.","ウ Yes, let's go!"],a:["イ","ア","ウ"],s:3,g:"日常会話",ex:`<b>正解：イ→ア→ウ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ Me, too. There is a good restaurant near here.<br>ア Shall we go there?<br>ウ Yes, let's go!</span><br>📝 「お腹すいた」→「私も。近くにいい店ある」→「行こうか？」→「行こう！」<br>👀 <b>何を問われてる？</b><br>→ <b>共感→提案→承諾</b>の定番パターン！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> 私も。いいお店あるよ ← <b>共感＋情報</b><br>②<b>ア</b> 行こうか？ ← <b>提案</b><br>③<b>ウ</b> 行こう！ ← <b>承諾</b><br><br>📌 <b>Shall we～?</b>＝「一緒に～しませんか？」（≒Let's）`},
  {id:6,ctx:"What are you doing, Mary?",ch:["ア Oh, I found it. Thank you.","イ I'm looking for my pen, Dad.","ウ I saw it under the desk."],a:["イ","ウ","ア"],s:3,g:"日常会話",ex:`<b>正解：イ→ウ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ I'm looking for my pen, Dad.<br>ウ I saw it under the desk.<br>ア Oh, I found it. Thank you.</span><br>📝 「何してるの？」→「ペン探してる」→「机の下にあった」→「ありがとう！」<br>👀 <b>何を問われてる？</b><br>→ <b>困り事→解決→感謝</b>の超定番パターン！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> ペンを探してるの ← <b>困り事</b><br>②<b>ウ</b> 机の下にあったよ ← <b>解決</b><br>③<b>ア</b> あった！ありがとう ← <b>感謝</b><br><br>📌 <b>I'm looking for～</b>＝「～を探しています」万能表現！`},
  {id:7,ctx:"Who's that boy in your class?",ch:["ア I said Leonard. We always call him Leo.","イ That's Leonard.","ウ Sorry?"],a:["イ","ウ","ア"],s:3,g:"日常会話",ex:`<b>正解：イ→ウ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ That's Leonard.<br>ウ Sorry?<br>ア I said Leonard. We always call him Leo.</span><br>📝 「あの男の子誰？」→「レオナルドだよ」→「え？」→「レオナルド。いつもレオって呼んでる」<br>👀 <b>何を問われてる？</b><br>→ <b>名前を聞く→答え→聞き返し→もう一度</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> レオナルドだよ ← <b>名前を答える</b><br>②<b>ウ</b> え？（聞き返し） ← <b>聞き取れなかった</b><br>③<b>ア</b> レオナルド。いつもレオって呼んでる ← <b>もう一度説明</b><br><br>📌 <b>聞き返しの定型表現を丸暗記！</b><br><span class="tip"><b>Sorry?</b> / <b>Pardon?</b> / <b>Excuse me?</b><br>すべて「もう一回言って？」の意味！入試超頻出！</span>`},
  {id:8,ctx:"Good morning. This is ABC Language School.",ch:["ア Please tell him to call me this afternoon.","イ He's out now. Can I take a message?","ウ May I speak to Mr. Jones?"],a:["ウ","イ","ア"],s:3,g:"電話の会話",ex:`<b>正解：ウ→イ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ May I speak to Mr. Jones?<br>イ He's out now. Can I take a message?<br>ア Please tell him to call me this afternoon.</span><br>📝 「ジョーンズ先生と話せますか」→「外出中です」→「午後に電話するよう伝えて」<br>👀 <b>何を問われてる？</b><br>→ <b>電話の会話の流れ</b>！<br><br>① <b>ウ</b> ジョーンズ先生と話せますか？ ← <b>目的</b><br>② <b>イ</b> 外出中です。伝言しましょうか？ ← <b>応対</b><br>③ <b>ア</b> 午後に電話するよう伝えて ← <b>伝言</b><br><br>⚡ <b>電話の定型を暗記！</b><br><span class="tip">May I speak to～? / He's out now. / Can I take a message? / I'll call back later.</span>`},
  {id:9,ctx:"You look very tired.",ch:["ア Well, I have been sick since this morning.","イ OK. I will.","ウ Really? You can go home right now."],a:["ア","ウ","イ"],s:3,g:"日常会話",ex:`<b>正解：ア→ウ→イ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ア Well, I have been sick since this morning.<br>ウ Really? You can go home right now.<br>イ OK. I will.</span><br>📝 「疲れて見えるよ」→「朝から体調悪い」→「帰っていいよ」→「わかった」<br>👀 <b>何を問われてる？</b><br>→ <b>心配→理由→提案→承諾</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>ア</b> 朝から体調が悪い ← <b>理由</b><br>②<b>ウ</b> すぐ帰っていいよ ← <b>提案</b><br>③<b>イ</b> わかった、そうする ← <b>承諾</b><br><br>📌 <b>体調の定型表現</b><br><span class="tip">I have been sick since～（～から体調が悪い）→<b>継続</b>用法！</span>`},
  {id:10,ctx:"When is your birthday, Ken?",ch:["ア Yes. That's right.","イ It's November 25th.","ウ Wow, it's just one month before Christmas!"],a:["イ","ウ","ア"],s:3,g:"日常会話",ex:`<b>正解：イ→ウ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ It's November 25th.<br>ウ Wow, it's just one month before Christmas!<br>ア Yes. That's right.</span><br>📝 「誕生日いつ？」→「11月25日」→「クリスマスの1ヶ月前！」→「そうだよ」<br>👀 <b>何を問われてる？</b><br>→ <b>質問→答え→感想→同意</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> 11月25日 ← <b>答え</b><br>②<b>ウ</b> クリスマスの1ヶ月前だね！ ← <b>感想</b><br>③<b>ア</b> うん、そうだよ ← <b>同意</b><br><br>📌 <b>That's right.</b>＝「その通り」同意の定型表現！`},
  {id:11,ctx:"Hi. Can I help you?",ch:["ア Sounds good. Can I try them on?","イ Well, we have three kinds of white ones.","ウ Yes, please. I'm looking for white tennis shoes."],a:["ウ","イ","ア"],s:3,g:"買い物の会話",ex:`<b>正解：ウ→イ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ Yes, please. I'm looking for white tennis shoes.<br>イ Well, we have three kinds of white ones.<br>ア Sounds good. Can I try them on?</span><br>📝 「白いテニスシューズ探してます」→「3種類あります」→「試着していい？」<br>👀 <b>何を問われてる？</b><br>→ <b>買い物パターン</b>！<br><br>🔍 <b>会話の流れ</b><br>①<b>ウ</b> 白いテニスシューズを探してます ← <b>目的</b><br>②<b>イ</b> 白は3種類あります ← <b>情報提供</b><br>③<b>ア</b> いいね。試着していい？ ← <b>反応</b><br><br>📌 靴は2つで1足→<b>them</b>で受ける！try <b>them</b> on!`},
  {id:12,ctx:"Mike, don't go outside. It'll rain soon.",ch:["ア No! You should stay inside.","イ Well, may I play video games then?","ウ But it's not raining now. Can I go out?"],a:["ウ","ア","イ"],s:3,g:"日常会話",ex:`<b>正解：ウ→ア→イ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ But it's not raining now. Can I go out?<br>ア No! You should stay inside.<br>イ Well, may I play video games then?</span><br>📝 「外に出るな」→「まだ降ってない」→「ダメ！」→「じゃあゲーム」<br>👀 <b>何を問われてる？</b><br>→ <b>反論→拒否→代案</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>ウ</b> まだ降ってないよ。出ていい？ ← <b>反論</b><br>②<b>ア</b> ダメ！中にいなさい ← <b>拒否</b><br>③<b>イ</b> じゃあゲームしていい？ ← <b>代案</b><br><br>📌 <b>You should stay inside.</b>＝「中にいるべき」アドバイス表現！`},
  {id:13,ctx:"(会話の最初から並べ替え)",ch:["ア It's math. Help me, please.","イ Oh really? What subject is it?","ウ Dad, I have a lot of homework today.","エ No. You must do it by yourself."],a:["ウ","イ","ア","エ"],s:4,g:"日常会話",ex:`<b>正解：ウ→イ→ア→エ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ Dad, I have a lot of homework today.<br>イ Oh really? What subject is it?<br>ア It's math. Help me, please.<br>エ No. You must do it by yourself.</span><br>📝 「パパ宿題いっぱいある」→「何の教科？」→「数学。手伝って」→「自分でやりなさい」<br>👀 <b>最初から並べ替える問題のコツ</b><br>→ まず<b>「話を切り出す人」</b>を探せ！相手の反応が来る前に何か言う人が最初！<br><br>🔍 <b>4つを分析</b><br><b>ウ</b>「パパ、宿題いっぱい」← 誰かに話しかけている→<b>最初</b>！<br><b>イ</b>「何の教科？」← ウへの反応（質問）→ 2番目<br><b>ア</b>「数学。手伝って！」← イへの返事→ 3番目<br><b>エ</b>「ダメ。自分でやりなさい」← アへの返事→ 最後<br><br>📌 <b>「最初から」問題の解き方</b><br><span class="tip">① 話を<b>始める</b>文を探す（呼びかけや状況説明）<br>② 前の文への<b>反応</b>の流れを追う<br>③ 「了承・拒否」で<b>会話が終わる</b></span><br><br>⚡ <b>You must do it by yourself.</b>＝「自分でやりなさい」<br>by yourself＝「自分で・一人で」`},
  {id:14,ctx:"(会話の最初から並べ替え)",ch:["ア You should see a doctor.","イ You don't look well, Amy. What's wrong?","ウ I have a fever and a headache.","エ OK. I will."],a:["イ","ウ","ア","エ"],s:4,g:"日常会話",ex:`<b>正解：イ→ウ→ア→エ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ You don't look well, Amy. What's wrong?<br>ウ I have a fever and a headache.<br>ア You should see a doctor.<br>エ OK. I will.</span><br>📝 「顔色悪いよ」→「熱がある」→「医者に行くべき」→「そうする」<br>👀 <b>何を問われてる？</b><br>→ <b>心配→症状→アドバイス→承諾</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> 顔色悪いけどどうしたの？ ← <b>心配</b><br>②<b>ウ</b> 熱と頭痛がある ← <b>症状</b><br>③<b>ア</b> 医者に行くべき ← <b>アドバイス</b><br>④<b>エ</b> そうする ← <b>承諾</b><br><br>📌 <b>You should～</b>＝「～すべき」（アドバイスの定型表現！）`},
  {id:15,ctx:"(会話の最初から並べ替え)",ch:["ア No problem. Here you are.","イ Can I borrow your guide book?","ウ Sure. What is it?","エ Hi Ken, can I ask you a favor?"],a:["エ","ウ","イ","ア"],s:4,g:"日常会話",ex:`<b>正解：エ→ウ→イ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">エ Hi Ken, can I ask you a favor?<br>ウ Sure. What is it?<br>イ Can I borrow your guide book?<br>ア No problem. Here you are.</span><br>📝 「お願いがあるんだけど」→「いいよ、何？」→「ガイドブック貸して」→「いいよ、はいどうぞ」<br>👀 <b>何を問われてる？</b><br>→ 「お願いをする」定型会話の流れ！<br><br>🔍 <b>4つを分析</b><br><b>エ</b>「ケン、お願いがあるんだけど」← 呼びかけ→<b>最初</b>！<br><b>ウ</b>「いいよ。何？」← エへの返事（お願いの中身を聞く）→ 2番目<br><b>イ</b>「ガイドブック貸して」← お願いの中身→ 3番目<br><b>ア</b>「いいよ、はいどうぞ」← イへの返事（承諾）→ 最後<br><br>📌 <b>超頻出！お願いの定型パターン</b><br><span class="tip"><b>Can I ask you a favor?</b>＝「お願いがあるんだけど」<br>Sure. What is it?＝「いいよ、何？」← セットで覚える！</span><br><br>⚡ <b>Here you are.</b>＝「はいどうぞ」物を手渡すときの定型表現！<br>≒ Here you go. / There you are.`},
  {id:16,ctx:"Wake up! You'll miss the bus to school.",ch:["ア Thank you, mom! I'll never do it again.","イ Oh, no! It's already too late.","ウ Then, I'll take you to school this time."],a:["イ","ウ","ア"],s:3,g:"日常会話",ex:`<b>正解：イ→ウ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ Oh, no! It's already too late.<br>ウ Then, I'll take you to school this time.<br>ア Thank you, mom! I'll never do it again.</span><br>📝 「起きなさい！バスに遅れるよ」→「もう遅い！」→「車で送る」→「ありがとう！」<br>👀 <b>何を問われてる？</b><br>→ <b>問題発生→解決策→感謝</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> やばい！もう遅すぎる！ ← <b>問題</b><br>②<b>ウ</b> 今回は車で送るよ ← <b>解決策</b><br>③<b>ア</b> ありがとう！もう二度としない！ ← <b>感謝＋反省</b><br><br>⚡ <b>I'll never do it again.</b>＝「もう二度としません」`},
  {id:17,ctx:"Welcome back, Miyuki! How was your homestay in Hawaii?",ch:["ア Would you like to go to Hawaii again?","イ It was great. My host family was friendly.","ウ Yes, I'd love to."],a:["イ","ア","ウ"],s:3,g:"日常会話",ex:`<b>正解：イ→ア→ウ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ It was great. My host family was friendly.<br>ア Would you like to go to Hawaii again?<br>ウ Yes, I'd love to.</span><br>📝 「ホームステイどうだった？」→「最高！」→「また行きたい？」→「ぜひ！」<br>👀 <b>何を問われてる？</b><br>→ <b>感想→質問→返答</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> 最高だった！ホストファミリーが優しかった ← <b>感想</b><br>②<b>ア</b> また行きたい？ ← <b>質問</b><br>③<b>ウ</b> ぜひ！ ← <b>返答</b><br><br>📌 <b>I'd love to.</b>＝「ぜひそうしたい！」超丁寧な承諾表現！`},
  {id:18,ctx:"You got the most points in this class, Sayaka!",ch:["ア Well, there is one mistake here, but you did a good job.","イ I see. I'll be more careful next time.","ウ I'm so happy! What question did I miss?"],a:["ウ","ア","イ"],s:3,g:"日常会話",ex:`<b>正解：ウ→ア→イ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ I'm so happy! What question did I miss?<br>ア Well, there is one mistake here, but you did a good job.<br>イ I see. I'll be more careful next time.</span><br>📝 「クラスで一番の点数！」→「嬉しい！どこ間違えた？」→「1つミスだけ」→「次は気をつける」<br>👀 <b>何を問われてる？</b><br>→ <b>喜び→質問→回答→決意</b>の流れ！<br><br>🔍 <b>会話の流れ</b><br>①<b>ウ</b> 嬉しい！どこ間違えた？ ← <b>喜び＋質問</b><br>②<b>ア</b> 1つミスがあるけど上出来 ← <b>回答</b><br>③<b>イ</b> 次はもっと気をつける ← <b>決意</b><br><br>⚡ <b>I'll be more careful.</b>＝「もっと気をつけます」`},
  {id:19,ctx:"(会話の最初から並べ替え)",ch:["ア OK. I'll call back later.","イ This is Tom Smith. Can I speak to Mr. Brown?","ウ Hello. Mr. Brown's office.","エ I'm sorry, he is busy now."],a:["ウ","イ","エ","ア"],s:4,g:"電話の会話",ex:`<b>正解：ウ→イ→エ→ア</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">ウ Hello. Mr. Brown's office.<br>イ This is Tom Smith. Can I speak to Mr. Brown?<br>エ I'm sorry, he is busy now.<br>ア OK. I'll call back later.</span><br>📝 「電話の会話パターン！」<br>👀 <b>何を問われてる？</b><br>→ <b>電話の定型表現の流れ</b>！<br><br>🔍 <b>会話の流れ</b><br>①<b>ウ</b> ブラウンさんのオフィスです ← <b>受付</b><br>②<b>イ</b> トムです。ブラウンさんと話せますか ← <b>名乗り＋目的</b><br>③<b>エ</b> すみません、今忙しいです ← <b>応対</b><br>④<b>ア</b> 後でかけ直します ← <b>了解</b><br><br>📌 <b>I'll call back later.</b>＝「後でかけ直します」電話の超定型！`},
  {id:20,ctx:"(会話の最初から並べ替え)",ch:["ア I've been sick since yesterday.","イ How are you feeling today?","ウ Please wait here. Go to Room 7.","エ Thank you."],a:["イ","ア","ウ","エ"],s:4,g:"病院の会話",ex:`<b>正解：イ→ア→ウ→エ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ How are you feeling today?<br>ア I've been sick since yesterday.<br>ウ Please wait here. Go to Room 7.<br>エ Thank you.</span><br>📝 「病院での会話パターン！」<br>👀 <b>何を問われてる？</b><br>→ <b>病院の定型表現の流れ</b>！<br><br>🔍 <b>会話の流れ</b><br>①<b>イ</b> 調子はどうですか？ ← <b>問診</b><br>②<b>ア</b> 昨日から体調が悪い ← <b>症状</b><br>③<b>ウ</b> こちらでお待ちを。7番の部屋へ ← <b>指示</b><br>④<b>エ</b> ありがとう ← <b>お礼</b><br><br>📌 <b>I've been sick since～</b>＝「～から体調が悪い」現在完了の<b>継続</b>用法！`},
  {id:21,ctx:"(会話の最初から並べ替え)",ch:["ア Because I want to wear my own clothes.","イ I'm afraid I don't agree with you.","ウ Why do you think so?","エ I think we should stop wearing school uniforms."],a:["エ","ウ","ア","イ"],s:4,g:"ディスカッション",ex:`<b>正解：エ→ウ→ア→イ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">エ I think we should stop wearing school uniforms.<br>ウ Why do you think so?<br>ア Because I want to wear my own clothes.<br>イ I'm afraid I don't agree with you.</span><br>📝 「制服廃止すべきだ」→「なぜ？」→「自分の服を着たい」→「賛成できない」<br>👀 <b>何を問われてる？</b><br>→ <b>ディスカッション（意見→理由→反論）</b>の流れ！<br><br>🔍 <b>4つを分析</b><br><b>エ</b>「制服をやめるべきだと思う」← <b>意見を述べる</b>→最初！<br><b>ウ</b>「なぜそう思うの？」← エへの反応（理由を聞く）→2番目<br><b>ア</b>「自分の服を着たいから」← ウへの答え（理由）→3番目<br><b>イ</b>「残念だけど賛成できない」← 反論→最後<br><br>📌 <b>ディスカッションの定型表現を丸暗記！</b><br><span class="tip"><b>I think we should ～.</b>＝「～すべきだと思う」（意見）<br><b>Why do you think so?</b>＝「なぜそう思うの？」（理由を聞く）<br><b>Because ～.</b>＝「～だから」（理由）<br><b>I'm afraid I don't agree with you.</b>＝「残念ですが賛成できません」（丁寧な反論）<br><b>I agree with you.</b>＝「賛成です」</span><br><br>⚡ <b>I'm afraid ～.</b>は「残念ながら～」という丁寧な前置き表現。入試頻出！`},
  {id:22,ctx:"(会話の最初から並べ替え)",ch:["ア I'm sorry, but she is out now.","イ Hello, may I speak to Jane?","ウ O.K. I will.","エ Would you ask her to call me later?"],a:["イ","ア","エ","ウ"],s:4,g:"電話の会話",ex:`<b>正解：イ→ア→エ→ウ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ Hello, may I speak to Jane?<br>ア I'm sorry, but she is out now.<br>エ Would you ask her to call me later?<br>ウ O.K. I will.</span><br>📝 「ジェーンいますか？」→「外出中です」→「電話するよう伝えて」→「わかりました」<br>👀 <b>何を問われてる？</b><br>→ <b>電話の定型表現の流れ</b>！絶対に覚える！<br><br>🔍 <b>4つを分析</b><br><b>イ</b>「ジェーンと話せますか？」← 電話をかけた目的→<b>最初</b>！<br><b>ア</b>「すみません、外出中です」← イへの返事→ 2番目<br><b>エ</b>「後で電話するよう伝えてくれますか？」← 伝言を頼む→ 3番目<br><b>ウ</b>「わかりました」← 了解の返事→ 最後<br><br>📌 <b>電話の定型表現を丸暗記！</b><br><span class="tip"><b>May I speak to ～?</b>＝「～さんをお願いします」<br><b>I'm sorry, he/she is out now.</b>＝「外出しております」<br><b>Can I take a message?</b>＝「伝言しましょうか？」<br><b>Would you ask him/her to call me?</b>＝「電話するよう伝えてください」<br><b>I'll call back later.</b>＝「後でかけ直します」</span><br><br>⚡ 電話の問題は<b>毎年出る</b>！この5つを丸暗記しておけば完璧！`},
  {id:23,ctx:"(会話の最初から並べ替え)",ch:["ア Why do you want to be a doctor?","イ What do you want to be in the future?","ウ I want to be a doctor.","エ I want to save people."],a:["イ","ウ","ア","エ"],s:4,g:"日常会話",ex:`<b>正解：イ→ウ→ア→エ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">イ What do you want to be in the future?<br>ウ I want to be a doctor.<br>ア Why do you want to be a doctor?<br>エ I want to save people.</span><br>📝 「将来何になりたい？」→「医者になりたい」→「なぜ？」→「人を助けたいから」<br>👀 <b>何を問われてる？</b><br>→ <b>質問→答え→理由を聞く→理由</b>の超定番パターン！<br><br>🔍 <b>4つを分析</b><br><b>イ</b>「将来何になりたい？」← 質問→<b>最初</b>！<br><b>ウ</b>「医者になりたい」← イへの答え→ 2番目<br><b>ア</b>「なぜ医者に？」← 理由を聞く→ 3番目<br><b>エ</b>「人を助けたいから」← アへの答え（理由）→ 最後<br><br>📌 <b>将来の夢の定型表現</b><br><span class="tip"><b>What do you want to be in the future?</b>＝「将来何になりたい？」<br><b>I want to be a ～.</b>＝「～になりたい」<br><b>Why do you want to be a ～?</b>＝「なぜ～になりたいの？」<br><b>I want to save people.</b>＝「人を助けたいから」</span><br><br>⚡ <b>会話問題の鉄則</b>：「質問→答え→さらに質問→答え」の繰り返し！`},
  {id:24,ctx:"(会話の最初から並べ替え)",ch:["ア No, I don't have anything to do.","イ Sure!","ウ I'm going to the beach. Do you want to come?","エ Do you have any plans tomorrow?"],a:["エ","ア","ウ","イ"],s:4,g:"日常会話",ex:`<b>正解：エ→ア→ウ→イ</b><br><br>✏️ <span style="font-size:12px;color:#555;line-height:2">エ Do you have any plans tomorrow?<br>ア No, I don't have anything to do.<br>ウ I'm going to the beach. Do you want to come?<br>イ Sure!</span><br>📝 「明日予定ある？」→「特にない」→「ビーチ行かない？」→「もちろん！」<br>👀 <b>何を問われてる？</b><br>→ <b>誘いの定番会話パターン</b>。超頻出！<br><br>🔍 <b>4つを分析</b><br><b>エ</b>「明日予定ある？」← 予定確認→<b>最初</b>！（誘いの前振り）<br><b>ア</b>「特にない」← エへの返事（空いてる）→ 2番目<br><b>ウ</b>「ビーチ行くんだけど来ない？」← 誘いの本題→ 3番目<br><b>イ</b>「もちろん！」← 承諾→ 最後<br><br>📌 <b>誘いの定型表現</b><br><span class="tip"><b>Do you have any plans?</b>＝「何か予定ある？」（前振り）<br><b>No, I don't have anything to do.</b>＝「特に何もない」<br><b>Do you want to come?</b>＝「一緒に来ない？」<br><b>Sure! / Of course! / Sounds good!</b>＝「もちろん！いいね！」</span><br><br>⚡ <b>なぜこの順番？</b><br>まず「予定が空いてるか確認→空いてたら誘う」が自然な流れ！<br>いきなり「ビーチ行かない？」ではなく、まず「予定ある？」と聞くのが日本語でも英語でも同じ！`},

,{id:25,q:"Mr. Brown: (\u3000①)\nSaki: I want to be a doctor.\nMr. Brown: That's a great goal! Can you tell me the reason?\nSaki: (\u3000②) When I was a child, I was saved by a kind doctor.\nMr. Brown: I think that's a wonderful reason. (\u3000③)\nSaki: I will study hard to go to college.",ch:["ア Why do you want to work at the hospital?","イ I want to help sick people, especially children.","ウ What will you do to make your dream come true?","エ Working with students is a lot of fun.","オ What do you want to be in the future?"],a:["オ","イ","ウ"],g:"日常会話",ex:`<b>正解：①オ ②イ ③ウ</b><br><br>📝 「将来医者になりたい」→「病気の人を助けたい」→「夢のために何をする？」→「大学に行くため勉強する」<br>👀 <b>何を問われてる？</b><br>→ <b>会話の流れ</b>を読んで空欄に入るセリフを選ぶ！<br><br>🔍 <b>解き方：答えの文から逆算！</b><br><br><b>①</b>→次のSakiが「医者に<b>なりたい</b>」と答えてる<br>→ 将来の夢を聞いてる→<b>オ What do you want to be in the future?</b><br><br><b>②</b>→直前で「理由は？」と聞かれてる。直後に「子どもの頃、医者に助けられた」<br>→ 理由＝<b>イ 病気の人を助けたい</b><br><br><b>③</b>→次のSakiが「大学に行くために勉強する」と答えてる<br>→ 夢の実現方法を聞いてる→<b>ウ What will you do to make your dream come true?</b><br><br>⚡ <b>鉄則</b>：空欄の<b>直後の答え</b>を先に読め！答えから逆算すれば正解がわかる！`}];

{gr:"中1",t:"be動詞（am/is/are）",d:"<b>「〜です」「〜にいる/ある」</b>。主語と後の語句を<b>イコールで結ぶ</b>。<table class=\"gref-tbl\"><tr><th>主語</th><th>現在</th><th>過去</th><th>否定(現在)</th></tr><tr><td>I</td><td><b>am</b></td><td>was</td><td>am not</td></tr><tr><td>you/複数</td><td><b>are</b></td><td>were</td><td>aren't</td></tr><tr><td>he/she/it/単数</td><td><b>is</b></td><td>was</td><td>isn't</td></tr></table><span class=\"gref-tip\">💡 短縮形：I'm / He's / You're / wasn't / weren't</span>",e:"I <b>am</b> a student.（私は学生です）\nShe <b>is</b> kind.（彼女は親切です）\nWe <b>are</b> in Okinawa.（私たちは沖縄にいます）"},
{gr:"中1",t:"一般動詞",d:"be動詞以外の<b>すべての動詞</b>。play, study, eatなど。<b>動作や気持ち</b>を表す。<br>否定：<b>don't+原形</b>。3単現：<b>doesn't+原形</b>。過去：<b>didn't+原形</b><span class=\"gref-warn\">⚠️ be動詞と一般動詞は絶対に混ぜない！ ✕ I am play / ✕ I don't am</span>",e:"I <b>play</b> tennis.（私はテニスをします）\nI <b>don't like</b> math.（私は数学が好きではない）"},
{gr:"中1",t:"be動詞の疑問文",d:"<b>be動詞を文頭に出す</b>だけ！<br>📌 <b>Is</b> he a student? / <b>Are</b> you happy?<br><span class=\"gref-warn\">⚠️ 答えのYes/Noの後は<b>代名詞+be動詞</b>！<br>✕ Yes, Tom is. → ○ Yes, <b>he</b> is.</span><br><span class=\"gref-tip\">💡 入試で狙われる：主語をhe/she/theyに<b>置き換えて</b>答える！</span>",e:"<b>Are</b> you a student? — Yes, I <b>am</b>.（あなたは学生？—はい）\n<b>Is</b> she from Tokyo? — No, she <b>isn't</b>.（彼女は東京出身？—いいえ）"},
{gr:"中1",t:"一般動詞の疑問文（Do/Does）",d:"<b>Do/Does/Did</b>を文頭に、動詞は<b>原形に戻す</b>！<table class=\"gref-tbl\"><tr><th>主語</th><th>現在</th><th>過去</th></tr><tr><td>I/you/複数</td><td><b>Do</b> you play?</td><td rowspan=\"2\"><b>Did</b> you play?</td></tr><tr><td>3人称単数</td><td><b>Does</b> he play?</td></tr></table><span class=\"gref-warn\">⚠️ Does/Didがあったら動詞の<b>sもedも消える</b>！<br>✕ Does she <b>plays</b> → ○ Does she <b>play</b></span>",e:"<b>Do</b> you like music?（音楽好き？）\n<b>Does</b> he play soccer?（彼はサッカーする？）"},
{gr:"中1",t:"疑問詞（What/Who/Where/When/Why/How）",d:"疑問詞は文の<b>先頭</b>に置く。<table class=\"gref-tbl\"><tr><th>疑問詞</th><th>意味</th><th>答え方の例</th></tr><tr><td><b>What</b></td><td>何</td><td>モノ・事</td></tr><tr><td><b>Who</b></td><td>誰</td><td>人</td></tr><tr><td><b>Where</b></td><td>どこ</td><td>場所</td></tr><tr><td><b>When</b></td><td>いつ</td><td>時</td></tr><tr><td><b>Why</b></td><td>なぜ</td><td>Because〜</td></tr><tr><td><b>How</b></td><td>どう</td><td>方法・様子</td></tr></table><span class=\"gref-tip\">💡 How many（いくつ）/ How much（いくら）/ How long（期間）/ How old（年齢）</span>",e:"<b>What</b> do you want?（何がほしい？）\n<b>Where</b> does he live?（彼はどこに住んでる？）\n<b>How old</b> are you?（何歳？）"},
{gr:"中1",t:"人称代名詞と所有代名詞",d:"<table class=\"gref-tbl\"><tr><th></th><th>主格<br>(〜は)</th><th>所有格<br>(〜の)</th><th>目的格<br>(〜を)</th><th>所有代名詞<br>(〜のもの)</th></tr><tr><td>私</td><td><b>I</b></td><td>my</td><td>me</td><td>mine</td></tr><tr><td>あなた</td><td><b>you</b></td><td>your</td><td>you</td><td>yours</td></tr><tr><td>彼</td><td><b>he</b></td><td>his</td><td>him</td><td>his</td></tr><tr><td>彼女</td><td><b>she</b></td><td>her</td><td>her</td><td>hers</td></tr><tr><td>それ</td><td><b>it</b></td><td>its</td><td>it</td><td>-</td></tr><tr><td>私たち</td><td><b>we</b></td><td>our</td><td>us</td><td>ours</td></tr><tr><td>彼ら</td><td><b>they</b></td><td>their</td><td>them</td><td>theirs</td></tr></table><span class=\"gref-tip\">💡 <b>his</b>だけ所有格と所有代名詞が同じ形！ <b>her</b>は所有格と目的格が同じ形！</span>",e:"<b>I</b> like <b>him</b>.（私は彼が好き）\nIt's <b>mine</b>.（それは私のものです）\nThis is <b>her</b> bag.（これは彼女のカバン）"},
{gr:"中1",t:"指示代名詞（this/that/these/those）",d:"<table class=\"gref-tbl\"><tr><th></th><th>単数</th><th>複数</th></tr><tr><td>近い</td><td><b>this</b>（これ）</td><td><b>these</b>（これら）</td></tr><tr><td>遠い</td><td><b>that</b>（あれ）</td><td><b>those</b>（あれら）</td></tr></table>",e:"<b>This</b> is my book.（これは私の本です）\n<b>Those</b> are his shoes.（あれらは彼の靴です）"},
{gr:"中1",t:"命令文・Let's",d:"<b>主語を省略</b>して動詞の原形で始める。<br>📌 <b>Open</b> the window. / <b>Don't</b> run.（否定はDon't+原形）<br>📌 <b>Be</b> quiet.（be動詞も原形！）/ <b>Let's</b> go.（提案）<br><span class=\"gref-tip\">💡 頻出：<b>Let's ～, shall we?</b> / <b>命令文, will you?</b>（付加疑問文とセット）</span>",e:"<b>Open</b> the window.（窓を開けなさい）\n<b>Don't</b> be late.（遅れるな）\n<b>Let's</b> play soccer!（サッカーしよう！）"},
{gr:"中1",t:"助動詞 can/will",d:"助動詞の後は<b>必ず動詞の原形</b>！主語が何でも形は変わらない。<table class=\"gref-tbl\"><tr><th>助動詞</th><th>意味</th><th>否定</th></tr><tr><td><b>can</b></td><td>～できる</td><td>can't</td></tr><tr><td><b>will</b></td><td>～するだろう/つもり</td><td>won't</td></tr><tr><td><b>may</b></td><td>～してもよい/かもしれない</td><td>may not</td></tr><tr><td><b>shall</b></td><td>～しましょうか</td><td></td></tr></table><span class=\"gref-warn\">⚠️ 助動詞+<b>be</b>！ ✕ will is → ○ will <b>be</b></span>",e:"I <b>can</b> speak English.（英語を話せる）\nShe <b>will</b> come tomorrow.（彼女は明日来るだろう）"},
{gr:"中1",t:"一般動詞の過去形",d:"規則動詞→<b>-ed</b>。不規則動詞→暗記！<br>疑問文：<b>Did</b>+原形? / 否定文：<b>didn't</b>+原形<br>📝 edの付け方：ふつう→ed / eで終わる→d / 子音+y→yをiにしてed / 短母音+子音→子音を重ねてed<span class=\"gref-warn\">⚠️ Did/didn'tのあとは<b>必ず原形</b>！ ✕ Did you went → ○ Did you <b>go</b></span>",e:"I <b>played</b> soccer yesterday.（昨日サッカーをした）\n<b>Did</b> you <b>eat</b> lunch?（昼ごはん食べた？）"},
{gr:"中1",t:"be動詞の過去形（was/were）",d:"<table class=\"gref-tbl\"><tr><th>主語</th><th>過去形</th><th>否定</th></tr><tr><td>I/he/she/it/単数</td><td><b>was</b></td><td>wasn't</td></tr><tr><td>you/we/they/複数</td><td><b>were</b></td><td>weren't</td></tr></table><span class=\"gref-tip\">💡 <b>過去のサイン</b>を見つけたらwas/wereに！<br>yesterday / last～ / ～ago / when I was～ / then</span><br><span class=\"gref-warn\">⚠️ 仮定法では主語に関係なく<b>were</b>！</span>",e:"I <b>was</b> happy.（私はうれしかった）\nThey <b>were</b> in the park.（彼らは公園にいた）"},
{gr:"中1",t:"現在進行形（be+〜ing）",d:"「今〜しているところ」。<b>be動詞+ing形</b>。<br>📝 ingの付け方4パターン：<br>ふつう→ing(playing) / eで終わる→e消す(making) / 短母音+子音→重ねる(running,swimming) / ieで終わる→yingに(die→dying)<span class=\"gref-tip\">💡 study→studying（yはそのまま！edの時だけyをiに変える）</span>",e:"I <b>am studying</b> English now.（今英語を勉強している）\n<b>Is</b> he <b>playing</b> soccer?（彼はサッカーしてる？）"},
{gr:"中1",t:"過去進行形（was/were+〜ing）",d:"「あの時～していた」＝<b>was/were+～ing</b><br><span class=\"gref-tip\">💡 <b>超頻出パターン</b>：<br>I was sleeping <b>when</b> he called.<br>→ 過去進行形+<b>when</b>+過去形のセット！<br>「電話が来た<b>とき</b>、寝て<b>いた</b>」</span><br><span class=\"gref-warn\">⚠️ 過去形＝終わった動作 / 過去進行形＝その時まさに<b>途中だった</b></span>",e:"I <b>was studying</b> at that time.（その時勉強していた）\nThey <b>were watching</b> TV when I came.（私が来た時、彼らはテレビを見ていた）"},
{gr:"中1",t:"未来表現（will/be going to）",d:"<b>will</b>＝その場の判断 / <b>be going to</b>＝前からの予定<table class=\"gref-tbl\"><tr><th></th><th>肯定</th><th>否定</th><th>疑問</th></tr><tr><td>will</td><td>I will go.</td><td>I won't go.</td><td>Will you go?</td></tr><tr><td>be going to</td><td>I am going to go.</td><td>I'm not going to go.</td><td>Are you going to go?</td></tr></table><span class=\"gref-tip\">💡 入試では<b>書き換え</b>で出る！will = be going to</span>",e:"I <b>will</b> call you later.（あとで電話するよ）\nWe <b>are going to</b> have a party.（パーティーをする予定だ）"},
{gr:"中1",t:"三人称単数現在形（3単現のs）",d:"I/you<b>以外の単数</b>が主語→現在形の動詞に<b>s/es</b>。<br>📝 ふつう→<b>s</b> / s,sh,ch,x,o→<b>es</b> / 子音+y→<b>ies</b> / have→<b>has</b><br><span class=\"gref-warn\">⚠️ Doesがあったらsは<b>消える</b>！<br>She <b>plays</b>. → Does she <b>play</b>?</span><br><span class=\"gref-tip\">💡 人名/my father/the dog/it/this →全部<b>3人称単数</b>！</span>",e:"She <b>plays</b> tennis.（彼女はテニスをする）\n<b>Does</b> he <b>like</b> music?（彼は音楽が好き？）"},
{gr:"中2",t:"接続詞 when/if/that",d:"<b>when</b>＝「～のとき」/ <b>if</b>＝「もし～なら」/ <b>that</b>＝「～ということ」<br><span class=\"gref-warn\">⚠️ <b>超重要（毎年出る！）</b>：<br>when/if節の中は<b>未来でも現在形</b>！<br>✕ when I <b>will</b> arrive → ○ when I <b>arrive</b><br>✕ if it <b>will</b> rain → ○ if it <b>rains</b></span><br><span class=\"gref-tip\">💡 thatは<b>省略できる</b>！ I think (that) he is right.</span>",e:"<b>When</b> I got home, mother was cooking.（帰宅した時、母が料理していた）\n<b>If</b> you are free, let's play.（暇なら遊ぼう）\nI think <b>that</b> English is fun.（英語は楽しいと思う）"},
{gr:"中2",t:"接続詞 because/while",d:"<b>because</b>＝「なぜなら」（理由）/ <b>while</b>＝「～の間に」（同時進行）<br><span class=\"gref-warn\">⚠️ <b>because</b>+<b>文</b>(主語+動詞) / <b>because of</b>+<b>名詞</b><br>because it rained ≠ because of the rain</span><br><span class=\"gref-tip\">💡 Why～? → <b>Because～.</b>で返す！並べ替え超頻出！</span>",e:"I stayed home <b>because</b> it was raining.（雨だったから家にいた）\n<b>While</b> I was sleeping, he came.（私が寝ている間に彼が来た）"},
{gr:"中2",t:"There is/are〜",d:"「〜がある/いる」。<b>後の名詞</b>が単数か複数かで決まる！<table class=\"gref-tbl\"><tr><th></th><th>単数</th><th>複数</th></tr><tr><td>現在</td><td>There <b>is</b></td><td>There <b>are</b></td></tr><tr><td>過去</td><td>There <b>was</b></td><td>There <b>were</b></td></tr></table>",e:"There <b>is</b> a park near here.（この近くに公園がある）\nThere <b>are</b> many students.（たくさんの生徒がいる）"},
{gr:"中2",t:"不定詞の名詞的用法（to+動詞＝〜すること）",d:"to+原形で「〜すること」。主語にも目的語にもなる！<br>📌 <b>To study</b> is important.（主語）/ I want <b>to play</b>.（目的語）<br>📌 頻出動詞：want/like/try/start/need/hope/begin/decide + to〜<br><span class=\"gref-warn\">⚠️ <b>3用法の見分け</b>が入試で問われる！<br>名詞的＝「〜すること」/ 形容詞的＝「〜するための」/ 副詞的＝「〜するために」</span><br><span class=\"gref-tip\">💡 enjoy/finish/stopの後は不定詞✕→動名詞！</span>",e:"I want <b>to be</b> a doctor.（医者になりたい）\nHe began <b>to run</b>.（彼は走り始めた）"},
{gr:"中2",t:"不定詞の形容詞的用法",d:"「<b>～するための/すべき</b>」名詞を<b>後ろから</b>修飾。<br>📌 something <b>to eat</b>（食べるもの）/ time <b>to study</b>（勉強する時間）<br><span class=\"gref-tip\">💡 <b>something/anything + 形容詞 + to～</b> の語順注意！<br>something <b>cold</b> to drink ← coldが名詞の後！</span><br><span class=\"gref-warn\">⚠️ 3用法見分け：名詞のすぐ後にto～→<b>形容詞的</b></span>",e:"I have homework <b>to do</b>.（やるべき宿題がある）\nGive me something <b>to eat</b>.（何か食べるものをちょうだい）"},
{gr:"中2",t:"不定詞の副詞的用法",d:"①<b>目的</b>「～するために」②<b>原因</b>「～して（嬉しい等）」<br>📌 目的：I went to the library <b>to study</b>.<br>📌 原因：I'm glad <b>to hear</b> that.<br><span class=\"gref-tip\">💡 <b>感情の形容詞</b>(happy/glad/sad/sorry/surprised)+to～ →<b>副詞的用法（原因）</b>！</span><br><span class=\"gref-warn\">⚠️ Why～?に<b>To+動詞</b>で答えられる→目的の副詞的用法！</span>",e:"I came <b>to see</b> you.（目的）\nI was surprised <b>to hear</b> the news.（原因）"},
{gr:"中2",t:"動名詞（〜ing＝〜すること）",d:"動詞にingをつけて名詞化。主語・目的語・前置詞の後で使う。<span class=\"gref-warn\">⚠️ enjoy/finish/stop/mindの後は<b>必ず動名詞</b>！ ✕ enjoy to play → ○ enjoy <b>playing</b></span><span class=\"gref-tip\">💡 前置詞(for/at/in/of/about/without)の後も必ず〜ing！<br>Thank you for <b>helping</b> me. / be good at <b>playing</b></span>",e:"<b>Reading</b> books is important.（読書は大切だ）\nI enjoy <b>playing</b> tennis.（テニスを楽しむ）\nThank you for <b>inviting</b> me.（招待ありがとう）"},
{gr:"中2",t:"比較級（-er than / more〜than）",d:"2つを比べて「〜の方が…」。短い語→<b>-er</b>。長い語(famous,interesting等)→<b>more</b>。<br>📝 erの付け方：ふつう→er / eで終わる→r / 子音+y→yをiにしてer / 短母音+子音→重ねてer<span class=\"gref-warn\">⚠️ 不規則：good→<b>better</b> / bad→<b>worse</b> / many/much→<b>more</b></span>",e:"Tom is <b>taller than</b> Ken.（トムはケンより背が高い）\nThis is <b>more interesting than</b> that.（これはあれよりおもしろい）"},
{gr:"中2",t:"最上級（the -est / the most）",d:"3つ以上で「<b>一番</b>～」。<b>the</b>忘れずに！<br>📌 場所→<b>in</b>(in Japan) / 数→<b>of</b>(of all / of the three)<br><span class=\"gref-tip\">💡 <b>最上級の目印3点セット</b>：<br>① <b>the</b>がある ② -est/most ③ <b>in～/of～</b><br>→3つ揃ったら最上級確定！</span><br><span class=\"gref-warn\">⚠️ 不規則：good→<b>best</b> / bad→<b>worst</b> / many/much→<b>most</b></span>",e:"<b>The best</b> food <b>of</b> all.（全部の中で一番おいしい料理）\n<b>The highest</b> mountain <b>in</b> Japan.（日本で一番高い山）"},
{gr:"中2",t:"原級比較（as〜as）",d:"「〜と<b>同じくらい</b>…」。2つのasの間に<b>原級</b>を入れる。<br>📌 否定：<b>not as〜as</b>＝「…ほど〜でない」<br><span class=\"gref-tip\">💡 <b>書き換え超頻出</b>！<br>He is <b>not as tall as</b> Ken. = Ken is <b>taller than</b> him.<br>→ 主語が入れ替わる！</span><br><span class=\"gref-warn\">⚠️ asとasの間は<b>必ず原級</b>！-erや-estを入れるな！</span>",e:"She is <b>as tall as</b> her mother.（彼女は母と同じくらい背が高い）\nHe is <b>not as fast as</b> Ken.（彼はケンほど速くない）"},
{gr:"中2",t:"SVOO（第4文型：人にモノを）",d:"<b>動詞+人+モノ</b>＝「人にモノを～」<br>📌 give/show/teach/tell/send/buy/make<br><span class=\"gref-tip\">💡 <b>書き換え超頻出</b>！<br>give <b>him</b> a book = give a book <b>to him</b><br>buy <b>her</b> a bag = buy a bag <b>for her</b></span><br><span class=\"gref-warn\">⚠️ <b>to</b>：give/show/teach/tell/send<br><b>for</b>：buy/make/cook/get → toかforかで出る！</span>",e:"She <b>gave me a present</b>.（彼女は私にプレゼントをくれた）\nPlease <b>show me your ticket</b>.（チケットを見せてください）"},
{gr:"中2",t:"SVOC（第5文型：OをCにする）",d:"<b>動詞+O+C</b>＝「OをCにする/呼ぶ」。<b>O=C</b>の関係が成り立つ！<br>📌 <b>call</b> him Ken（him=Ken）/ <b>make</b> me happy（me=happy）<br>📌 <b>name</b> the dog Pochi / <b>keep</b> the room clean<br><span class=\"gref-tip\">💡 O=Cの確認が入試での見分けポイント！</span>",e:"We <b>call</b> him <b>Ken</b>.（私たちは彼をケンと呼ぶ）\nThis song <b>makes</b> me <b>happy</b>.（この歌は私を幸せにする）"},
{gr:"中2",t:"受動態（be動詞+過去分詞）",d:"「〜される/された」。<b>be動詞+過去分詞</b>（+by〜）。<br>過去分詞は受動態・現在完了・名詞修飾で使う超重要な形！<span class=\"gref-tip\">💡 頻出連語丸暗記：be interested <b>in</b> / be surprised <b>at</b> / be known <b>to</b> / be made <b>of</b>(材料) / be made <b>from</b>(原料) / be covered <b>with</b> / be filled <b>with</b> / be born</span>",e:"English <b>is spoken</b> in many countries.（英語は多くの国で話されている）\nI <b>am interested in</b> manga.（私は漫画に興味がある）"},
{gr:"中2",t:"感嘆文（What a〜! / How〜!）",d:"<table class=\"gref-tbl\"><tr><th>パターン</th><th>構造</th><th>例</th></tr><tr><td><b>What</b></td><td>What (a)+形容詞+名詞!</td><td>What a nice day!</td></tr><tr><td><b>How</b></td><td>How+形容詞/副詞!</td><td>How beautiful!</td></tr></table><span class=\"gref-tip\">💡 名詞があればWhat / なければHow</span>",e:"<b>What a</b> beautiful flower<b>!</b>（なんて美しい花！）\n<b>How</b> fast<b>!</b>（なんて速いの！）"},
{gr:"中3",t:"現在完了：経験（have+過去分詞）",d:"「〜したことがある」。<table class=\"gref-tbl\"><tr><th>用法</th><th>キーワード</th><th>意味</th></tr><tr><td><b>⭐経験</b></td><td>ever/never/once/twice/before</td><td>～したことがある</td></tr><tr><td>完了</td><td>just/already/yet</td><td>もう～した</td></tr><tr><td>継続</td><td>for/since</td><td>ずっと～している</td></tr></table><span class=\"gref-warn\">⚠️ have <b>been to</b>〜＝行ったことがある(今ここにいる)<br>have <b>gone to</b>〜＝行ってしまった(もうここにいない)<br>→ 意味が全然違う！入試超頻出の引っかけ！</span>",e:"I have <b>never been</b> to Hokkaido.（北海道に一度も行ったことがない）\nHave you <b>ever</b> eaten soba?（そばを食べたことある？）"},
{gr:"中3",t:"現在完了：完了（have+過去分詞）",d:"「<b>もう～した/ちょうど～したところ</b>」<br>📌 キーワード：<b>just</b>（ちょうど）/ <b>already</b>（もう・肯定文）/ <b>yet</b>（疑問文＝もう / 否定文＝まだ）<br><span class=\"gref-tip\">💡 <b>yetの使い分け</b>が出る！<br>疑問：Have you finished <b>yet</b>?（<b>もう</b>終わった？）<br>否定：I haven't finished <b>yet</b>.（<b>まだ</b>終わってない）</span><br><span class=\"gref-warn\">⚠️ alreadyの位置：have <b>already</b> done（haveと過去分詞の間！）</span>",e:"The bus has <b>just</b> left.（バスがちょうど出たところ）\nHave you finished <b>yet</b>?（もう終わった？）"},
{gr:"中3",t:"現在完了：継続（have+過去分詞）",d:"「<b>ずっと～している</b>」<br>📌 <b>for+期間</b>（for 3 years）/ <b>since+起点</b>（since 2020）/ <b>How long ～?</b><br><span class=\"gref-tip\">💡 <b>forとsince</b>の見分け：<br>for＋<b>数字を含む期間</b>（for 3 years / for a long time）<br>since＋<b>始まりの時点</b>（since 2020 / since I was a child）</span><br><span class=\"gref-warn\">⚠️ 状態動詞(know/live/be)→現在完了<br>動作動詞(study/run)→<b>現在完了進行形</b>！</span>",e:"I have lived here <b>for</b> ten years.（ここに10年住んでいる）\nFriends <b>since</b> 2020.（2020年からの友達）"},
{gr:"中3",t:"現在完了進行形（have been〜ing）",d:"「<b>ずっと〜し続けている</b>」。<b>動作</b>の継続に使う。<br>📌 I have <b>been studying</b> for 3 hours.<br><span class=\"gref-tip\">💡 使い分け：<b>状態</b>動詞(know/live/be)→現在完了 / <b>動作</b>動詞(study/run)→現在完了進行形</span><br><span class=\"gref-warn\">⚠️ for/sinceと一緒に使う点は継続用法と同じ！</span>",e:"I have <b>been studying</b> for 3 hours.（3時間ずっと勉強している）\nIt has <b>been raining</b> since morning.（朝からずっと雨が降っている）"},
{gr:"中3",t:"現在分詞の後置修飾（〜ing）",d:"名詞を後ろから「<b>〜している○○</b>」と説明。<br>📌 the boy <b>playing</b> tennis / the girl <b>singing</b> on the stage<br><span class=\"gref-warn\">⚠️ 進行形と間違えるな！<br>進行形：The boy <b>is playing</b> tennis.（文の動詞）<br>後置修飾：The boy <b>playing</b> tennis <b>is</b> my friend.（名詞を修飾）</span><br><span class=\"gref-tip\">💡 〜ing（している）vs 過去分詞（された）の使い分けが入試に出る！</span>",e:"The man <b>playing</b> the guitar is my brother.（ギターを弾いている男の人は私の兄だ）"},
{gr:"中3",t:"過去分詞の後置修飾",d:"名詞を後ろから「<b>～された○○</b>」と説明。<br>📌 a book <b>written</b> in English / the picture <b>taken</b> by him / the city <b>called</b> Naha<br><span class=\"gref-tip\">💡 超頻出パターン丸暗記！<br><b>made in</b>～（～製）/ <b>written in</b>～（～語で書かれた）/ <b>spoken in</b>～ / <b>called</b>～（～と呼ばれる）</span><br><span class=\"gref-warn\">⚠️ <b>by</b>があったら過去分詞の後置修飾か受動態！</span>",e:"a book <b>written</b> in English（英語で書かれた本）\nthe city <b>called</b> the Big Apple（ビッグアップルと呼ばれる都市）"},
{gr:"中3",t:"関係代名詞の主格（who/which/that）",d:"<table class=\"gref-tbl\"><tr><th></th><th>人</th><th>モノ・動物</th><th>両方OK</th></tr><tr><td><b>主格</b></td><td>who</td><td>which</td><td>that</td></tr><tr><td><b>目的格</b></td><td>whom</td><td>which</td><td>that(省略可)</td></tr><tr><td><b>所有格</b></td><td colspan=\"3\">whose</td></tr></table>名詞を後ろから文で説明。(　)の直後に<b>動詞</b>が来たら→<b>主格</b>。<br>人→<b>who</b> / モノ・動物→<b>which</b> / どちらでもOK→<b>that</b><span class=\"gref-tip\">💡 見分けテク：(　)の後が動詞→主格 / (　)の後が主語+動詞→目的格</span>",e:"a friend <b>who speaks</b> English（英語を話す友達）\nthe cat <b>which was</b> born last week（先週生まれた猫）"},
{gr:"中3",t:"関係代名詞の目的格（省略可能）",d:"(　)の後に<b>主語+動詞</b>→<b>目的格</b>！<b>省略できる</b>！<br>📌 the book (which) <b>I bought</b> / the girl (whom) <b>he likes</b><br><span class=\"gref-tip\">💡 <b>省略の見分け</b>：名詞のすぐ後に主語+動詞→関係代名詞が省略！<br>This is the cake <b>my mother made</b>.</span><br><span class=\"gref-warn\">⚠️ 整序で最頻出！関係代名詞節の後に<b>本文の動詞</b>が来る！</span>",e:"the camera <b>(which) my father gave</b> me（父がくれたカメラ）"},
{gr:"中3",t:"関係代名詞の所有格（whose）",d:"<b>whose</b>＝「～の」。人にもモノにも使える。<br>📌 the boy <b>whose</b> father is a doctor / the house <b>whose</b> roof is red<br><span class=\"gref-tip\">💡 見分け：(　)の後に<b>名詞</b>→<b>whose</b>！<br>who→後に動詞 / which→後に動詞 / <b>whose→後に名詞</b></span><br><span class=\"gref-warn\">⚠️ whose ≠ who's(=who is) 音は同じで意味が違う！</span>",e:"a boy <b>whose</b> father is a doctor（父親が医者の男の子）"},
{gr:"中3",t:"It is (for人) to〜（形式主語構文）",d:"「人にとって〜するのは…だ」＝<b>It is+形容詞+for+人+to+動詞</b><br><span class=\"gref-tip\">💡 <b>整序の超頻出</b>！語順丸暗記：<br>It is→形容詞→for→人→to→動詞の原形<br>forとtoが選択肢にあったらこの構文！</span><br><span class=\"gref-warn\">⚠️ 人の性格→forが<b>of</b>に！ It is kind <b>of</b> you to help me.</span>",e:"It is <b>difficult for me to</b> write English.（私にとって英語を書くのは難しい）"},
{gr:"中3",t:"too〜to…（〜すぎて…できない）",d:"<b>too+形容詞+to+動詞</b>＝「〜<b>すぎて</b>…<b>できない</b>」<br>📌 too tired <b>to</b> study<br><span class=\"gref-tip\">💡 <b>書き換え超頻出！</b><br>too〜to… = <b>so〜that can't…</b><br>too tired to study = so tired that I can't study</span><br><span class=\"gref-warn\">⚠️ not〜enough to…も書き換えパターン！</span>",e:"I'm <b>too tired to</b> study.（疲れすぎて勉強できない）"},
{gr:"中3",t:"原形不定詞（help/make/let+人+原形）",d:"<b>make/let/help+人+動詞の原形</b>（toなし！）<table class=\"gref-tbl\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td><b>make</b></td><td>～させる（強制）</td><td>make him clean</td></tr><tr><td><b>let</b></td><td>～させてあげる（許可）</td><td>let me go</td></tr><tr><td><b>help</b></td><td>～を手伝う</td><td>help me carry</td></tr></table><span class=\"gref-warn\">⚠️ tell/ask/wantは<b>to必要</b>！ make/let/helpは<b>toなし</b>！</span>",e:"Please <b>help me carry</b> this.（これを運ぶのを手伝って）\nMy mother <b>made me clean</b> my room.（母に部屋を掃除させられた）"},
{gr:"中3",t:"tell/ask/want 人 to〜",d:"<b>tell/ask/want+人+to+動詞</b><table class=\"gref-tbl\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td><b>tell</b></td><td>〜しろと言う</td><td>told me <b>to</b> study</td></tr><tr><td><b>ask</b></td><td>〜してと頼む</td><td>asked me <b>to</b> help</td></tr><tr><td><b>want</b></td><td>〜してほしい</td><td>wants me <b>to</b> come</td></tr></table><span class=\"gref-warn\">⚠️ この3つは<b>to必要</b>！make/let/helpは<b>toなし</b>！整序で<b>毎年出る</b>！</span>",e:"Mother <b>told me to</b> come home.（母に帰って来なさいと言われた）\nShe <b>asked me to</b> help her.（彼女に手伝ってと頼まれた）"},
{gr:"中3",t:"間接疑問文",d:"疑問の内容を文中に入れる。<b>疑問詞+主語+動詞</b>（普通の語順に戻す！）<br>📌 I know <b>where he lives</b>. / Tell me <b>what you want</b>.<br><span class=\"gref-warn\">⚠️ <b>語順ひっくり返る</b>のが最大のポイント！<br>普通：Where <b>does</b> he live?<br>間接：where he <b>lives</b> ← doesが消えてsが戻る！</span><br><span class=\"gref-tip\">💡 疑問詞+to+動詞もセット！<br>what to buy / how to get there / where to go<br>⚠️ <b>why to～は存在しない</b>！</span>",e:"Do you know <b>where he lives</b>?（彼がどこに住んでいるか知ってる？）"},
{gr:"中3",t:"疑問詞＋不定詞（how to / what to）",d:"<b>疑問詞＋to＋動詞の原形</b>＝「何を・どこで・いつ・どうやって～すべきか」<table class=\"gref-tbl\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td><b>how to</b></td><td>～の<b>しかた</b></td><td>how to make a cake</td></tr><tr><td><b>what to</b></td><td><b>何を</b>～すべきか</td><td>what to buy</td></tr><tr><td><b>where to</b></td><td><b>どこで</b>～すべきか</td><td>where to go</td></tr><tr><td><b>when to</b></td><td><b>いつ</b>～すべきか</td><td>when to start</td></tr></table><span class=\"gref-warn\">⚠️ <b>why to～は存在しない</b>！whyだけは使えない！</span>",e:"I don't know <b>how to</b> get there.（そこへの行き方がわからない）\nPlease tell me <b>what to</b> do.（何をすべきか教えて）"},
{gr:"中3",t:"付加疑問文",d:"「～ですよね？」と確認。<b>肯定→否定の付加 / 否定→肯定の付加</b><br>📌 You are a student, <b>aren't you</b>?<br>📌 He can't swim, <b>can he</b>?<br><span class=\"gref-tip\">💡 <b>作り方3ステップ</b>：<br>①肯定文→付加は<b>否定</b>。否定文→付加は<b>肯定</b><br>②主語を<b>代名詞</b>に(Tom→he)<br>③be動詞/助動詞をそのまま。一般動詞→do/does/did</span><br><span class=\"gref-warn\">⚠️ Let's→<b>shall we</b>? / 命令文→<b>will you</b>?</span>",e:"You are a student, <b>aren't you</b>?（あなたは学生ですよね？）"},
{gr:"中3",t:"have to/must/don't have to/must not",d:"<table class=\"gref-tbl\"><tr><th></th><th>意味</th></tr><tr><td><b>must</b></td><td>～しなければならない</td></tr><tr><td><b>have to</b></td><td>～しなければならない</td></tr><tr><td><b>must not</b></td><td>～しては<b>いけない（禁止！）</b></td></tr><tr><td><b>don't have to</b></td><td>～する<b>必要はない（自由）</b></td></tr></table><span class=\"gref-warn\">⚠️ must notとdon't have toは意味が<b>真逆</b>！</span>",e:"You <b>don't have to</b> come.（来なくてもいい）\nYou <b>must not</b> run here.（走るな！）"},
{gr:"中3",t:"仮定法過去",d:"「もし～なら…だろうに」＝<b>現実と反対</b>を想像。<br>📌 <b>If+過去形, 主語+would/could+原形</b><br><span class=\"gref-warn\">⚠️ be動詞は主語に関係なく<b>were</b>！<br>✕ If I was → ○ If I <b>were</b></span><br><span class=\"gref-tip\">💡 見分け：過去形なのに「今の話」→<b>仮定法</b>！<br>If I <b>had</b> money, I <b>could</b> buy it.<br>→hadは過去形だけど「今」の話→仮定法！</span>",e:"If I had money, I <b>could</b> buy it.（お金があれば買えるのに）\nIf I <b>were</b> you, I <b>would</b> study harder.（もし私があなたなら、もっと勉強するのに）"},
{gr:"中3",t:"I wish+仮定法",d:"<b>I wish+主語+過去形</b>＝「～だったら<b>いいのになぁ</b>」（現実は違う）<br>📌 I wish I <b>could</b> fly.（飛べたらいいのに）<br>📌 I wish I <b>were</b> taller.（背が高かったらなぁ）<br><span class=\"gref-tip\">💡 <b>I wish I could～</b>は整序の超頻出！丸暗記！</span><br><span class=\"gref-warn\">⚠️ hope（実現可能）≠ wish（実現不可能）<br>I <b>hope</b> it will be sunny. / I <b>wish</b> I were a bird.</span>",e:"I wish I <b>could</b> fly.（飛べたらいいのに）\nI wish I <b>were</b> taller.（もっと背が高ければなぁ）"},
];

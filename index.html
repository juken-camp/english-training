<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JUKEN CAMP | 沖縄県立高校入試 英語特訓</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FF6B9D;--pink-l:#FFD1E0;--pink-bg:#FFF2F6;
  --purple:#A07CE8;--purple-l:#DDD0FF;--purple-bg:#F5F0FF;
  --mint:#4ECDA5;--mint-l:#C5F5E3;--mint-bg:#EDFFF7;
  --orange:#FFA15C;--orange-l:#FFD9B8;--orange-bg:#FFF5EC;
  --sky:#5CB8FF;--sky-l:#BDE3FF;--sky-bg:#EDF6FF;
  --yellow:#FFD644;--yellow-l:#FFF0B8;--yellow-bg:#FFFCF0;
  --bg:#FFF8FC;--card:#FFFFFF;--surface:#F5F0FA;
  --text:#3D2E50;--dim:#7A6F8A;--muted:#B0A8C0;
  --ok:#3CC88F;--ok-bg:#E2FBEF;--ng:#FF5A7E;--ng-bg:#FFE8EE;
  --border:#E0D8F0;--accent:#A07CE8;
  --r:18px;--rs:12px;
  --sh:0 2px 10px rgba(160,124,232,.1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#DDD0FF;border-radius:3px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(255,248,252,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(160,124,232,.08);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{font-size:22px}
.logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-stats{display:flex;gap:6px}
.badge{display:flex;align-items:center;gap:4px;background:var(--surface);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;color:var(--dim)}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,248,252,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(160,124,232,.08);display:flex;padding:4px 8px;padding-bottom:max(4px,env(safe-area-inset-bottom));touch-action:manipulation}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border-radius:14px;border:none;background:none;color:var(--muted);font-size:10px;font-family:'Noto Sans JP';font-weight:600;cursor:pointer;transition:.2s}
.nav-i.on{color:var(--pink);background:var(--pink-bg)}
.nav-i svg{width:22px;height:22px}

/* PAGES */
.pg{display:none;padding:16px;padding-bottom:100px;max-width:480px;margin:0 auto}.pg.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
.hero{background:linear-gradient(135deg,#FFD1E0 0%,#DDD0FF 50%,#BDE3FF 100%);border-radius:var(--r);padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,.7),transparent 70%);border-radius:50%}
.hero-badge{display:inline-block;background:var(--pink);color:#fff;font-weight:700;font-size:11px;padding:3px 12px;border-radius:20px;margin-bottom:10px;position:relative}
.hero h2{font-family:'Outfit',sans-serif;font-weight:900;font-size:22px;line-height:1.3;margin-bottom:6px;position:relative}
.hero p{font-size:13px;color:var(--dim);position:relative}
.stitle{font-weight:700;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.mcard{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:16px 14px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;box-shadow:var(--sh)}
.mcard:active{transform:scale(.97)}
.mcard:nth-child(1){border-color:var(--pink-l)}.mcard:nth-child(2){border-color:var(--mint-l)}.mcard:nth-child(3){border-color:var(--purple-l)}.mcard:nth-child(4){border-color:var(--sky-l)}
.mcard .ico{font-size:28px;margin-bottom:8px}.mcard .nm{font-weight:700;font-size:14px;margin-bottom:3px}.mcard .ds{font-size:11px;color:var(--dim);line-height:1.4}
.mcard .cnt{position:absolute;top:10px;right:10px;background:var(--surface);padding:2px 8px;border-radius:10px;font-size:10px;color:var(--dim);font-weight:600}

.ggrid{display:grid;gap:8px;margin-bottom:24px}
.gchip{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1.5px solid var(--surface);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.gchip:active{transform:scale(.98)}
.gchip-l{display:flex;align-items:center;gap:10px}
.gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gchip-n{font-weight:600;font-size:13px}
.gchip-c{font-size:11px;color:var(--dim);font-weight:500}

/* QUIZ */
.qhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.qback{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--dim);font-size:13px;font-family:'Noto Sans JP';cursor:pointer;padding:8px 0}
.qbar{width:100%;height:6px;background:var(--surface);border-radius:3px;margin-bottom:18px;overflow:hidden}
.qfill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:3px;transition:width .4s}
.qcnt{font-size:12px;color:var(--dim);font-weight:700}

.qcard{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.qtag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.qtag-g{background:var(--purple-bg);color:var(--purple)}
.qtag-t{background:var(--orange-bg);color:var(--orange);margin-left:6px}
.qtxt{font-size:15px;line-height:1.8;white-space:pre-wrap}

/* CHOICES */
.choices{display:grid;gap:8px;margin-bottom:16px}
.cbtn{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--surface);border-radius:var(--rs);padding:14px 16px;cursor:pointer;font-family:'Noto Sans JP';font-size:15px;color:var(--text);text-align:left;transition:.2s;width:100%;box-shadow:var(--sh)}
.cbtn:active:not(.dis){transform:scale(.98)}
.clbl{width:30px;height:30px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:var(--dim);transition:.2s}
.cbtn.ok{background:var(--ok-bg);border-color:var(--ok)}.cbtn.ok .clbl{background:var(--ok);color:#fff}
.cbtn.ng{background:var(--ng-bg);border-color:var(--ng)}.cbtn.ng .clbl{background:var(--ng);color:#fff}
.cbtn.dis{cursor:default;opacity:.4}.cbtn.dis.ok,.cbtn.dis.ng{opacity:1}

/* EXPLANATION */
.ebox{background:linear-gradient(135deg,#FFF8F0,#FFF0F6,#F0F0FF);border:1.5px solid #F0E0F0;border-radius:var(--r);padding:18px;margin-top:12px;margin-bottom:16px;display:none;animation:su .3s ease}
.result-banner{text-align:center;padding:12px;border-radius:var(--r);margin-top:12px;margin-bottom:12px;font-weight:900;font-size:18px;display:none;animation:su .3s ease}
.result-banner.show{display:block}
.result-banner.ok-banner{background:#E8F8EE;border:2px solid #48BB78;color:#22543D}
.result-banner.ng-banner{background:#FFF0F0;border:2px solid #F56565;color:#C53030}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ebox.show{display:block}
.ebox-h{font-size:13px;font-weight:800;color:var(--pink);margin-bottom:10px}
.ebox-t{font-size:13px;line-height:2;color:var(--text)}
.ebox-t b,.ebox-t strong{color:var(--pink)}
.ebox-t .tip{display:block;background:var(--purple-bg);border-left:3px solid var(--purple);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:12px;line-height:1.7;color:#6B54B8}
.ebox-t .related{display:block;background:var(--mint-bg);border-left:3px solid var(--mint);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:12px;line-height:1.7;color:#2E8A6A}

.nbtn{width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:var(--rs);padding:16px;color:#fff;font-family:'Noto Sans JP';font-size:15px;font-weight:700;cursor:pointer;display:none;margin-top:8px;box-shadow:0 4px 16px rgba(255,107,157,.2)}
.nbtn.show{display:block}.nbtn:active{transform:scale(.98)}
.peekbtn{width:100%;background:none;border:1.5px solid var(--border);border-radius:var(--rs);padding:14px;color:var(--dim);font-family:'Noto Sans JP';font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;margin-bottom:8px;transition:.2s}
.peekbtn:active{background:var(--surface);transform:scale(.98)}
.peekbtn.hide{display:none}

/* ORDER */
.oslots{display:flex;flex-wrap:wrap;gap:8px;min-height:50px;padding:14px;background:var(--card);border-radius:var(--rs);margin-bottom:12px;border:2.5px dashed #D8D0E8;box-shadow:var(--sh)}
.ochoices{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.ochip{padding:10px 16px;background:var(--card);border:1.5px solid #D8D0E8;border-radius:10px;font-size:14px;cursor:pointer;transition:.2s;user-select:none;font-family:'Noto Sans JP';color:var(--text);box-shadow:var(--sh)}
.ochip:active{transform:scale(.95)}.ochip.placed{opacity:.2;pointer-events:none}
.ochip.ins{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 2px 8px rgba(160,124,232,.3)}
.oslots.ok{border-color:var(--ok);background:var(--ok-bg)}.oslots.ng{border-color:var(--ng);background:var(--ng-bg)}
.chkbtn{width:100%;background:var(--purple);border:none;border-radius:var(--rs);padding:14px;color:#fff;font-family:'Noto Sans JP';font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 12px rgba(160,124,232,.2)}
.chkbtn:disabled{opacity:.3}

/* CONV */
.cslots{display:grid;gap:8px;margin-bottom:16px}
.cslot{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--card);border-radius:var(--rs);min-height:48px;border:2px solid var(--surface);cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.cslot.act{border-color:var(--pink);background:var(--pink-bg)}
.csnum{width:24px;height:24px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--dim)}
.cstxt{font-size:13px;color:var(--muted);line-height:1.5}
.cslot.filled .cstxt{color:var(--text)}.cslot.filled .csnum{background:var(--pink);color:#fff}
.cchoices{display:grid;gap:6px;margin-bottom:16px}
.ccbtn{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1.5px solid var(--surface);border-radius:var(--rs);padding:12px 14px;cursor:pointer;font-family:'Noto Sans JP';font-size:13px;color:var(--text);text-align:left;transition:.2s;width:100%;line-height:1.5;box-shadow:var(--sh)}
.ccbtn.used{opacity:.2;pointer-events:none}

/* RESULTS */
.rcard{background:linear-gradient(135deg,#FFD1E0,#DDD0FF,#BDE3FF);border-radius:var(--r);padding:32px 20px;text-align:center;margin-bottom:20px}
.rscore{font-family:'Outfit';font-size:64px;font-weight:900;color:var(--text);line-height:1;margin-bottom:4px}
.rlbl{font-size:14px;color:var(--dim);margin-bottom:20px}
.rbd{display:flex;justify-content:center;gap:24px}
.rst{text-align:center}.rst-n{font-family:'Outfit';font-size:24px;font-weight:800}.rst-l{font-size:11px;color:var(--dim)}
.rst-n.g{color:var(--ok)}.rst-n.r{color:var(--ng)}
.retbtn{width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:var(--rs);padding:16px;color:#fff;font-family:'Noto Sans JP';font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.hmbtn{width:100%;background:var(--surface);border:none;border-radius:var(--rs);padding:16px;color:var(--text);font-family:'Noto Sans JP';font-size:15px;font-weight:600;cursor:pointer}

/* GRAMMAR REF */
.gref{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
.gref-t{font-weight:700;font-size:14px;margin-bottom:8px;color:var(--purple)}
.gref-d{font-size:13px;line-height:1.8;color:var(--dim);margin-bottom:10px}
.gref-e{background:var(--purple-bg);border-radius:10px;padding:12px;font-size:13px;line-height:1.7;border-left:3px solid var(--purple)}
.gref-grade{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;margin-right:6px}
.gref-grade.g1{background:#FFE0EC;color:#D4507A}
.gref-grade.g2{background:#D9E8FF;color:#4A7FD4}
.gref-grade.g3{background:#DCF5E8;color:#2E8A5A}
.gref-tbl{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.gref-tbl th,.gref-tbl td{border:1px solid #ddd;padding:4px 6px;text-align:center}
.gref-tbl th{background:#f0f4ff;font-weight:700;color:#4a5568}
.gref-tbl td:first-child{background:#f7f8fc;font-weight:600;text-align:left}
.gref-tbl b{color:#e53e3e}
.speak-btn{background:none;border:1px solid #cbd5e0;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;transition:all .15s}
.speak-btn:active{background:#edf2f7;transform:scale(0.9)}
.gref-tip{display:block;background:var(--orange-bg);border-left:3px solid var(--orange);padding:8px 12px;border-radius:0 8px 8px 0;margin:4px 0 0;font-size:12px;line-height:1.7;color:#B07030}
.gref-rel{display:block;background:var(--mint-bg);border-left:3px solid var(--mint);padding:8px 12px;border-radius:0 8px 8px 0;margin:4px 0 0;font-size:12px;line-height:1.7;color:#2E8A6A}
.gref-warn{display:block;background:var(--pink-bg);border-left:3px solid var(--pink);padding:8px 12px;border-radius:0 8px 8px 0;margin:4px 0 0;font-size:12px;line-height:1.7;color:#C04060}

/* VOCAB */
.vcard{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.vcard:active{transform:scale(.98)}
.vw{font-weight:700;font-size:15px}
.vcard>div:first-child{display:flex;align-items:center;gap:8px;width:100%}
.vm{font-size:14px;color:var(--accent);margin-top:6px;opacity:0;transition:opacity .3s}
.vcard.rev .vm{opacity:1}
.vcat{font-weight:700;font-size:14px;color:var(--pink);margin:16px 0 10px;padding-left:4px}
.vcat-item{background:var(--card);border:1.5px solid var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s;box-shadow:var(--sh)}
.vcat-item:active{transform:scale(.98)}
.vcat-item .vci-name{font-weight:700;font-size:14px}
.vcat-item .vci-count{font-size:12px;color:var(--dim);background:var(--surface);padding:2px 10px;border-radius:12px}
.vcat-group{font-weight:700;font-size:13px;color:var(--dim);margin:18px 0 8px;padding-left:2px}
.vback-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-family:'Noto Sans JP';color:var(--dim);cursor:pointer;margin-bottom:12px}
.vback-btn:active{background:var(--surface)}

/* SEARCH */
.sbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--surface);border-radius:var(--rs);padding:10px 14px;margin-bottom:16px;box-shadow:var(--sh)}
.sbar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Noto Sans JP';font-size:14px}
.sbar input::placeholder{color:var(--muted)}
.sbar svg{color:var(--muted);flex-shrink:0;width:18px;height:18px}

.ftabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:12px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:7px 14px;border-radius:20px;background:var(--surface);border:none;color:var(--dim);font-family:'Noto Sans JP';font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.ftab.on{background:var(--pink);color:#fff}

/* GOKEI INPUT */
.wbl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.wbank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--purple-bg);border-radius:var(--rs);margin-bottom:12px}
.wchip{padding:6px 14px;background:var(--card);border:1.5px solid var(--purple-l);border-radius:8px;font-size:14px;color:var(--purple);font-weight:600}
.ainput{width:100%;background:var(--card);border:2px solid var(--surface);border-radius:var(--rs);padding:14px 16px;font-family:'Noto Sans JP';font-size:16px;color:var(--text);outline:none;transition:border-color .2s}
.ainput:focus{border-color:var(--pink)}.ainput.ok{border-color:var(--ok);background:var(--ok-bg)}.ainput.ng{border-color:var(--ng);background:var(--ng-bg)}
.subbtn{width:100%;background:var(--purple);border:none;border-radius:var(--rs);padding:14px;color:#fff;font-family:'Noto Sans JP';font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;margin-bottom:4px}
.subbtn:disabled{opacity:.3}
.corr{padding:10px 14px;background:var(--ok-bg);border:1.5px solid var(--ok);border-radius:var(--rs);font-size:14px;color:var(--ok);font-weight:700;margin-top:12px;margin-bottom:12px;display:none}
.corr.show{display:block}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo" onclick="goHome()" style="cursor:pointer"><span class="logo-icon"></span><span class="logo-text">JUKEN CAMP</span></div>
  <div class="hdr-stats"><div class="badge">🔥<span id="streakCount">0</span></div><div class="badge">⭐<span id="totalCorrect">0</span></div></div>
</header>

<div class="pg on" id="homePage">
  <div class="hero">
    <div class="hero-badge">沖縄県立高校入試</div>
    <h2>英文法トレーニング</h2>
    <p>実戦問題147問 ＋ 文法47項目 ＋ 単語・熟語571語</p>
  </div>
  <div class="stitle">📝 英文法トレーニング</div>
  <div class="mgrid">
    <div class="mcard" onclick="startQuiz('tekigo')"><div class="cnt" id="tc">--問</div><div class="ico">🎯</div><div class="nm">適語選択</div><div class="ds">4択から正解を選ぼう</div></div>
    <div class="mcard" onclick="startQuiz('gokei')"><div class="cnt" id="gc">--問</div><div class="ico">✏️</div><div class="nm">語形変化</div><div class="ds">正しい形に変えよう</div></div>
    <div class="mcard" onclick="startQuiz('seijoEisaku')"><div class="cnt" id="sc">--問</div><div class="ico">🧩</div><div class="nm">整序英作文</div><div class="ds">正しい順に並べよう</div></div>
    <div class="mcard" onclick="startQuiz('kaiwa')"><div class="cnt" id="kc">--問</div><div class="ico">💬</div><div class="nm">会話文の完成</div><div class="ds">会話を自然につなげよう</div></div>
  </div>
  <div class="stitle">🏷️ 文法別トレーニング</div>
  <div class="ggrid" id="grammarList"></div>
</div>

<div class="pg" id="quizPage">
  <div class="qhdr"><button class="qback" onclick="goHome()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>戻る</button><div class="qcnt" id="quizCounter"></div></div>
  <div class="qbar"><div class="qfill" id="qfill" style="width:0%"></div></div>
  <div id="quizContent"></div>
</div>

<script>
// ============================================================
// SOUND ENGINE (Web Audio API - no external files needed)
// ============================================================
var SFX=(function(){
  var ctx=null;
  function init(){if(!ctx)try{ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  function play(type){
    init();if(!ctx)return;
    if(ctx.state==='suspended')ctx.resume();
    var now=ctx.currentTime;
    if(type==='correct'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='sine';o1.frequency.setValueAtTime(523,now);o1.frequency.setValueAtTime(659,now+0.08);
      o1.frequency.setValueAtTime(784,now+0.16);
      g1.gain.setValueAtTime(0.25,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.4);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.4);
      var o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.type='sine';o2.frequency.setValueAtTime(1047,now+0.1);
      g2.gain.setValueAtTime(0.12,now+0.1);g2.gain.exponentialRampToValueAtTime(0.01,now+0.35);
      o2.connect(g2);g2.connect(ctx.destination);o2.start(now+0.1);o2.stop(now+0.35);
    }
    else if(type==='wrong'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='square';o1.frequency.setValueAtTime(300,now);o1.frequency.setValueAtTime(200,now+0.15);
      g1.gain.setValueAtTime(0.15,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.3);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.3);
    }
    else if(type==='click'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='sine';o1.frequency.setValueAtTime(880,now);
      g1.gain.setValueAtTime(0.08,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.06);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.06);
    }
    else if(type==='perfect'){
      [523,659,784,1047].forEach(function(f,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.setValueAtTime(f,now+i*0.12);
        g.gain.setValueAtTime(0.2,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.4);
        o.connect(g);g.connect(ctx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.4);
      });
    }
    else if(type==='done'){
      [440,523,659].forEach(function(f,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.setValueAtTime(f,now+i*0.15);
        g.gain.setValueAtTime(0.18,now+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.15+0.35);
        o.connect(g);g.connect(ctx.destination);o.start(now+i*0.15);o.stop(now+i*0.15+0.35);
      });
    }
    else if(type==='flip'){
      var o1=ctx.createOscillator(),g1=ctx.createGain();
      o1.type='triangle';o1.frequency.setValueAtTime(600,now);o1.frequency.setValueAtTime(900,now+0.05);
      g1.gain.setValueAtTime(0.1,now);g1.gain.exponentialRampToValueAtTime(0.01,now+0.1);
      o1.connect(g1);g1.connect(ctx.destination);o1.start(now);o1.stop(now+0.1);
    }
  }
  return{play:play,init:init};
})();
// Speech synthesis for vocab pronunciation
function speakEn(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  // Clean text for speech: replace symbols with speakable equivalents
  var clean=text
    .replace(/→/g,', ')           // arrows become pauses
    .replace(/\//g,' or ')         // slash becomes "or"
    .replace(/～ing/g,'ing')       // ～ing → just "ing"
    .replace(/〜ing/g,'ing')
    .replace(/～/g,'')             // remaining tilde → remove
    .replace(/〜/g,'')
    .replace(/（[^）]*）/g,'')     // remove Japanese parenthetical
    .replace(/[＝※]/g,'')
    .replace(/[^\x00-\x7F,.'!? -]/g,'')  // remove remaining non-ASCII
    .replace(/\s+/g,' ').trim();
  if(!clean)return;
  var u=new SpeechSynthesisUtterance(clean);
  u.lang='en-US';u.rate=0.85;u.pitch=1.1;
  // Try to pick a female English voice
  var voices=window.speechSynthesis.getVoices();
  var female=voices.find(v=>v.lang.startsWith('en')&&/female|samantha|karen|victoria|zira|google.*us/i.test(v.name));
  if(!female)female=voices.find(v=>v.lang.startsWith('en'));
  if(female)u.voice=female;
  window.speechSynthesis.speak(u);
}
// Preload voices
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices()}}

   ex:`<b>正解：who</b><br><br>✏️ A: I have a friend <b>who</b> speaks English very well. He studied English in Australia when he was little.<br>B: Ah, I know him.<br>📝 「英語を話す友達がいるんだ」<br>👀 <b>何を問われてる？</b><br>→ 関係代名詞の選択。「空欄の<b>前の名詞</b>」と「空欄の<b>直後</b>」を見る！<br><br>🔍 <b>どこを見る？</b><br>①前の名詞：a <b>friend</b>（友達）＝<b>人</b>！<br>②直後：<b>speaks</b>（動詞がいきなり来てる！）<br><br>📌 <b>公式</b><br><span class="tip">前が<b>人</b>＋直後が<b>動詞</b>→ <b>who</b>（主格）<br>前が<b>モノ</b>＋直後が<b>動詞</b>→ <b>which</b>（主格）</span><br><br>⚡ <b>見分けテク</b><br>直後に動詞→<b>主格</b>(who/which)<br>直後に「主語+動詞」→<b>目的格</b>(whom/which/省略可)`},
  {id:2,q:"A: I have a friend who speaks English very well. He (    ) English in Australia when he was little.\nB: Ah, I know him.", ch:["studied","has studied","who","whose","which","how"], a:"studied", g:"一般動詞の過去形",
   ex:`<b>正解：studied</b><br><br>✏️ A: I have a friend who speaks English very well. He <b>studied</b> English in Australia when he was little.<br>B: Ah, I know him.<br>📝 「彼は子どもの頃にオーストラリアで英語を勉強した」<br>👀 <b>何を問われてる？</b><br>→ 動詞の<b>時制</b>を選ぶ問題。<b>「過去のサイン」を探せ</b>！<br><br>🔍 <b>どこを見る？</b><br>文中に「when he <b>was</b> little」→ wasは<b>過去形</b>！<br>→ 過去の話だから動詞も<b>過去形</b>にする！<br><br>📌 <b>公式</b><br><span class="tip">過去のサインを見つけたら→動詞を<b>過去形</b>に！<br>サイン：yesterday / last～ / ～ago / when I was～ / was/were</span><br><br>⚡ <b>引っかけ注意！</b><br>has studied（現在完了）を選びたくなるけど、「when he was little」は<b>明確な過去の1点</b>→現在完了は使えない！<b>過去の時点が明確→過去形</b>！`},
  {id:3,q:"A: What did you do last weekend?\nB: I went to a temple and (    ) a lot of pictures.", ch:["take","taken","taking","took"], a:"took", g:"一般動詞の過去形",

   ex:`<b>正解：yours</b><br><br>✏️ A: Look at the cookies on the table! Can I eat them?<br>B: They are for Nancy's birthday. They are not <b>yours</b>.<br>📝 「クッキー食べていい？」「ナンシーの誕生日用。あなたの<b>じゃないよ</b>」<br>👀 <b>何を問われてる？</b><br>→ your vs yours。<b>後ろに名詞があるかないか</b>で決まる！<br><br>🔍 <b>どこを見る？</b><br>「They are not (　).」→ 後に<b>名詞がない</b>！→<b>所有代名詞</b>！→<b>yours</b><br>※ They are not <b>your</b> cookies.なら所有格yourが正解<br><br>📌 <b>所有格 vs 所有代名詞</b><br><span class="tip"><b>所有格</b>（後に名詞あり）：my/your/his/her<br><b>所有代名詞</b>（名詞なし）：mine/<b>yours</b>/his/hers</span><br><br>⚡ 後ろに<b>名詞あり</b>→所有格 / <b>名詞なし</b>→所有代名詞`},
  {id:11,q:"A: I think young people should eat more vegetables.\nB: (    ). Having fruits is also good for them.", ch:["Thank you","I agree","I'm sorry","Let's go"], a:"I agree", g:"会話表現",
   ex:`<b>正解：I agree.</b><br><br>✏️ A: I think young people should eat more vegetables.<br>B: <b>I agree</b>. Having fruits is also good for them.<br>📝 「若者はもっと野菜を食べるべきだと思う」「賛成です」<br>👀 <b>何を問われてる？</b><br>→ 会話の定型表現。<b>前後の流れ</b>から賛成か反対かを判断！<br><br>🔍 <b>どこを見る？</b><br>Bの後半で「フルーツもいいよね」と<b>話を広げてる</b><br>→ 話に乗っかってる＝<b>賛成</b>！<br><br>📌 <b>賛成の定型表現を丸暗記</b><br><span class="tip">I agree. / That's a good idea. / I think so, too. / Sounds good.</span>`},
  {id:12,q:"A: Do you know the new students from America?\nB: Yes. Sam and Andy (    ) in my class.", ch:["be","am","is","are"], a:"are", g:"be動詞",
   ex:`<b>正解：are</b><br><br>✏️ A: Do you know the new students from America?<br>B: Yes. Sam and Andy <b>are</b> in my class.<br>📝 「アメリカからの転校生知ってる？」「うん。サムとアンディは私のクラスに<b>いるよ</b>」<br>👀 <b>何を問われてる？</b><br>→ be動詞の選択。<b>主語が複数か</b>がカギ！<br><br>🔍 <b>どこを見る？</b><br>Sam <b>and</b> Andy → 2人＝<b>複数</b>！→<b>are</b><br><br>📌 <b>公式</b><br><span class="tip"><b>A and B</b>は<b>常に複数扱い</b>！<br>Tom and I <b>are</b>～ / He and she <b>are</b>～</span><br><br>⚡ <b>be動詞の選び方</b>：I→am / 単数→is / <b>複数・you</b>→are`},
  {id:13,q:"A: This is a great picture!\nB: I (    ) this picture.\nA: Did you? I like it very much.", ch:["heard","wrote","drew","understood"], a:"drew", g:"一般動詞の過去形",
   ex:`<b>正解：drew</b><br><br>✏️ A: This is a great picture!<br>B: I <b>drew</b> this picture.<br>A: Did you? I like it very much.<br>📝 「この絵すごい！」「私が<b>描いた</b>んだ」「そうなの！すごく好き」<br>👀 <b>何を問われてる？</b><br>→ 文脈に合う<b>過去形の動詞</b>を選ぶ問題。<br><br>🔍 <b>どこを見る？</b><br>①「Did you?」→ 過去の話<br>②「この絵すごい！」→「描いた」が自然<br>→ draw(描く)の過去形＝<b>drew</b><br><br>⚡ 意味で消去法！heard(聞いた)・wrote(書いた)・understood(理解した)→どれも「絵」には合わない！`},
  {id:14,q:"A: Whose pencil is this?\nB: It's not mine but I think it's (    ).", ch:["he","his","she","her"], a:"his", g:"人称代名詞",
   ex:`<b>正解：his</b><br><br>✏️ A: Whose pencil is this?<br>B: It's not mine but I think it's <b>his</b>.<br>📝 「この鉛筆は誰の？」「私のじゃないけど<b>彼の</b>だと思う」<br>👀 <b>何を問われてる？</b><br>→ 代名詞の<b>格</b>の使い分け。<br><br>🔍 <b>どこを見る？</b><br>I think it's (　). → 後に<b>名詞がない</b>！→<b>所有代名詞</b>！→<b>his</b><br><br>📌 <b>hisは特殊！</b><br><span class="tip"><b>所有格</b>：<b>his</b> pencil（彼の鉛筆）<br><b>所有代名詞</b>：It's <b>his</b>.（彼のもの）<br>※ <b>hisだけ形が同じ</b>！her→<b>hers</b> / my→<b>mine</b></span><br><br>⚡ <b>heの変化を完全暗記！</b><br>主格<b>he</b> / 所有格<b>his</b> / 目的格<b>him</b> / 所有代名詞<b>his</b>`},
  {id:15,q:"A: Excuse me, I'm (    ) for the City Hall.\nB: Turn right at the next corner. It's on your left.", ch:["looking","watching","finding","seeing"], a:"looking", g:"熟語・連語",
   ex:`<b>正解：looking</b><br><br>✏️ A: Excuse me, I'm <b>looking</b> for the City Hall.<br>B: Turn right at the next corner. It's on your left.<br>📝 「すみません、市役所を探しているのですが」<br>👀 <b>何を問われてる？</b><br>→ 熟語の知識。「探す」の英語は？<br><br>📌 <b>lookの熟語は入試の宝庫！</b><br><span class="tip">look <b>at</b>（見る）/ look <b>for</b>（探す）/ look <b>after</b>（世話する）/ look <b>like</b>（似てる）/ look <b>forward to</b>（楽しみにする）</span><br><br>⚡ 「市役所を探してるんですが」→ look <b>for</b>！<br>watch(じっと見る)/find(見つける)とは違う！`},
  {id:16,q:"Let's play baseball (    ) the weather is nice tomorrow.", ch:["or","if","so","but"], a:"if", g:"接続詞",
   ex:`<b>正解：if</b><br><br>✏️ Let's play baseball <b>if</b> the weather is nice tomorrow.<br>📝 「もし天気がよかったら、野球をしよう」<br>👀 <b>何を問われてる？</b><br>→ 接続詞の選択。<b>2つの文の関係</b>を考える！<br><br>🔍 「(　)天気がよかったら → 野球しよう」<br>→ <b>条件</b>を出してる！条件＝<b>if</b>！<br><br>⚡ <b>超重要ルール（毎年出る！）</b><br><span class="tip">if/when節の中は<b>未来のことでも現在形</b>！<br>✕ if it <b>will be</b> nice → ○ if it <b>is</b> nice</span>`},
  {id:17,q:"When I went to the park last Sunday, there (    ) any children there.", ch:["isn't","wasn't","aren't","weren't"], a:"weren't", g:"There is/are構文",
   ex:`<b>正解：weren't</b><br><br>✏️ When I went to the park last Sunday, there <b>weren't</b> any children there.<br>📝 「先週の日曜に公園に行ったら、子どもが<b>いなかった</b>」<br>👀 <b>何を問われてる？</b><br>→ There is構文の否定・過去形。<b>3つの情報を拾え！</b><br><br>🔍 <b>どこを見る？</b><br>① <b>last Sunday</b>→<b>過去</b>！→was/were<br>② <b>children</b>→<b>複数</b>！→were<br>③ <b>any</b>→<b>否定文</b>のサイン！→weren't<br>→ 過去＋複数＋否定＝<b>weren't</b>！<br><br>📌 <b>anyの使い方</b><br><span class="tip"><b>some</b>→肯定文 / <b>any</b>→否定文・疑問文<br>anyが文中にあったら→<b>否定文</b>の可能性大！</span>`},
  {id:18,q:"My father is a doctor. (    ) sick people is his job.", ch:["Help","Helps","Helped","Helping"], a:"Helping", g:"動名詞",
   ex:`<b>正解：Helping</b><br><br>✏️ My father is a doctor. <b>Helping</b> sick people is his job.<br>📝 「病気の人を助けることは彼の仕事です」<br>👀 <b>何を問われてる？</b><br>→ 動詞を<b>主語にする方法</b>。<br><br>🔍 (　) sick people <b>is</b> his job. → isの前が<b>主語</b>。<br>動詞を主語にするには→<b>～ing（動名詞）</b>！<br><br>📌 <b>Helping</b> sick people is his job.＝「病気の人を<b>助けること</b>は彼の仕事」<br><br>⚡ 文頭の(　)＋be動詞→<b>動名詞が主語</b>のパターン！`},
  {id:19,q:"A: Do you know that tall boy?\nB: Yes. He (    ) my friend, Ken.", ch:["be","am","is","are"], a:"is", g:"be動詞",
   ex:`<b>正解：is</b><br><br>✏️ A: Do you know that tall boy?<br>B: Yes. He <b>is</b> my friend, Ken.<br>📝 「あの背の高い男の子知ってる？」「うん、<b>彼は</b>友達のケンだよ」<br>👀 <b>何を問われてる？</b><br>→ be動詞の選択。<b>主語は何か</b>を判定！<br><br>🔍 <b>どこを見る？</b><br><b>He</b> (　) my friend → Heは<b>3人称単数</b>！→<b>is</b><br><br>📌 <b>be動詞の選び方</b><br><span class="tip">I→<b>am</b> / He/She/It/単数→<b>is</b> / You/We/They/複数→<b>are</b></span><br><br>⚡ 基本中の基本！<b>確実に得点</b>しよう！`},
  {id:20,q:"A: What did you do after school?\nB: I (    ) school and went home.", ch:["will leave","leave","leaves","left"], a:"left", g:"一般動詞の過去形",
   ex:`<b>正解：left</b><br><br>✏️ A: What did you do after school?<br>B: I <b>left</b> school and went home.<br>📝 「放課後何した？」「学校を<b>出て</b>家に帰った」<br>👀 <b>何を問われてる？</b><br>→ <b>andの前後で時制をそろえる</b>ルール！<br><br>🔍 <b>どこを見る？</b><br>I (　) school <b>and went</b> home → andの後が<b>went（過去形）</b><br>→前も<b>過去形</b>に！leave→<b>left</b><br><br>📌 <b>leaveの変化</b><br><span class="tip">leave（出発する）→ <b>left</b> → <b>left</b><br>leave school＝学校を出る / leave home＝家を出る</span><br><br>⚡ <b>andの鉄則！</b>前後は<b>必ず同じ時制</b>！`},
  {id:21,q:"A: Look at the stars in the sky!\nB: Wow! (    ) are beautiful.", ch:["You","Its","They","There"], a:"They", g:"人称代名詞",
   ex:`<b>正解：They</b><br><br>✏️ A: Look at the stars in the sky!<br>B: Wow! <b>They</b> are beautiful.<br>📝 「空の星を見て！」「わぁ！<b>それらは</b>美しいね！」<br>👀 <b>何を問われてる？</b><br>→ 代名詞の選択。<b>何を指しているか</b>を確認！<br><br>🔍 <b>どこを見る？</b><br>(　) are beautiful. → <b>主語</b>の位置！<br>前の文の「the <b>stars</b>」→星<b>たち</b>＝<b>複数</b>！→<b>They</b><br><br>📌 <b>代名詞の選び方</b><br><span class="tip">① 何を指してる？→ stars（複数のモノ）<br>② 文のどの位置？→ 主語（areの前）<br>→ 複数＋主格＝<b>They</b></span><br><br>⚡ You/Its/There→文脈に合わない！消去法も使える！`},
  {id:22,q:"A: (    ) bag is this?\nB: It's mine.", ch:["Which","Where","When","Whose"], a:"Whose", g:"疑問詞",
   ex:`<b>正解：Whose</b><br><br>✏️ A: <b>Whose</b> bag is this?<br>B: It's mine.<br>📝 「このカバンは<b>誰の</b>？」「私のです」<br>👀 <b>何を問われてる？</b><br>→ 疑問詞の選択。<b>答えの文から逆算</b>！<br><br>🔍 <b>どこを見る？</b><br>答え：「It's <b>mine</b>.」＝「<b>私のもの</b>」<br>→「<b>誰の</b>カバン？」と聞いてる→<b>Whose</b><br><br>📌 <b>Whoseの使い方</b><br><span class="tip"><b>Whose + 名詞</b>＝「誰の○○？」<br>Whose bag is this? / Whose pen is that?</span><br><br>⚡ <b>Whose</b>(誰の) ≠ <b>Who's</b>(=Who is)　音は同じだけど意味が違う！`},
  {id:23,q:"A: I don't know (    ) to buy for Michiko's birthday present.\nB: Why don't you buy some flowers?", ch:["who","what","when","where"], a:"what", g:"疑問詞＋不定詞",
   ex:`<b>正解：what</b><br><br>✏️ A: I don't know <b>what</b> to buy for Michiko's birthday present.<br>B: Why don't you buy some flowers?<br>📝 「ミチコへの誕生日プレゼントに何を買えばいいかわからない」<br>👀 <b>何を問われてる？</b><br>→ <b>疑問詞+to+動詞</b>の選択。<br><br>🔍 「(　) to buy」→「<b>何を</b>買えばいいか」→<b>what</b><br><br>📌 <span class="tip">what to ～（何を）/ how to ～（やり方）/ where to～（どこで）/ when to～（いつ）<br>⚠️ <b>why to～は存在しない！</b></span>`},
  {id:24,q:"A: I have so many bags to carry!\nB: (    ) I help you?", ch:["Does","Have","Shall","Did"], a:"Shall", g:"助動詞",
   ex:`<b>正解：Shall</b><br><br>✏️ A: I have so many bags to carry!<br>B: <b>Shall</b> I help you?<br>📝 「荷物が多い！」「手伝い<b>ましょうか</b>？」<br>👀 <b>何を問われてる？</b><br>→ <b>申し出の表現</b>。「～しましょうか？」の言い方！<br><br>🔍 Aが困ってる→ Bが<b>申し出る</b><br>→「手伝いましょうか？」＝<b>Shall I</b> help you?<br><br>📌 <b>Shallの2パターン</b><br><span class="tip"><b>Shall I ～?</b>＝「～しましょうか？」（申し出）<br><b>Shall we ～?</b>＝「～しませんか？」（≒Let's）</span><br><br>⚡ <b>似た表現と区別！</b><br>Shall I～?（<b>申し出</b>）/ Will you～?（<b>お願い</b>）/ Can I～?（<b>許可</b>）`},
  {id:25,q:"A: Nancy, (    ) your music class start at ten?\nB: No, at eleven.", ch:["do","does","is","are"], a:"does", g:"三人称単数現在形",
   ex:`<b>正解：does</b><br><br>✏️ A: Nancy, <b>does</b> your music class start at ten?<br>B: No, at eleven.<br>📝 「ナンシー、音楽の授業は10時に始まる？」「ううん、11時」<br>👀 <b>何を問われてる？</b><br>→ 疑問文の作り方。<b>主語が何か</b>を判定！<br><br>🔍 <b>どこを見る？</b><br>① your music class <b>start</b>→ 一般動詞<br>② your music class＝<b>3人称単数</b>→<b>Does</b>！<br><br>📌 <b>Do/Doesの使い分け</b><br><span class="tip"><b>Do</b> I/you/we/they ～?<br><b>Does</b> he/she/it/単数名詞 ～?</span><br><br>⚡ Does＋主語＋<b>原形</b>！sは消える！<br>✕ Does she <b>starts</b> → ○ Does she <b>start</b>`},
  {id:26,q:"A: Richard, have you finished your homework (    )?\nB: Yes, I have. Can I watch TV now?", ch:["never","ever","just","yet"], a:"yet", g:"現在完了（完了）",
   ex:`<b>正解：yet</b><br><br>✏️ A: Richard, have you finished your homework <b>yet</b>?<br>B: Yes, I have. Can I watch TV now?<br>📝 「もう宿題は終わった？」<br>👀 <b>何を問われてる？</b><br>→ 現在完了のキーワード。<b>肯定文か疑問文か</b>で使い分け！<br><br>🔍 「Have you finished ～ ?」→<b>疑問文</b>！<br>疑問文の「もう」＝<b>yet</b>（文末に置く）<br><br>📌 <span class="tip"><b>just/already</b>→肯定文に使う<br><b>yet</b>→疑問文（もう）・否定文（まだ）に使う</span><br><br>⚡ 3用法の見分けもセットで！<br>ever/never→<b>経験</b> / just/already/yet→<b>完了</b> / for/since→<b>継続</b>`},
  {id:27,q:"I don't know (    ) to get to the museum. I have to ask someone.", ch:["which","where","how","what"], a:"how", g:"疑問詞＋不定詞",
   ex:`<b>正解：how</b><br><br>✏️ I don't know <b>how</b> to get to the museum. I have to ask someone.<br>📝 「博物館への<b>行き方</b>がわからない。誰かに聞かなきゃ」<br>👀 <b>何を問われてる？</b><br>→ <b>疑問詞+to+動詞</b>の選択！<br><br>🔍 (　) to get to the museum → 「<b>行き方</b>」＝<b>how to</b>～！<br><br>📌 <b>疑問詞＋to＋動詞を丸暗記！</b><br><span class="tip"><b>how to</b>～＝～の<b>しかた</b><br><b>what to</b>～＝<b>何を</b>～すべきか<br><b>where to</b>～＝<b>どこで</b>～すべきか<br><b>when to</b>～＝<b>いつ</b>～すべきか<br>⚠️ <b>why to～は存在しない</b>！</span><br><br>⚡ how to＋動詞は<b>入試超頻出</b>！`},
  {id:28,q:"My family has three cats. This is the cat (    ) was born last week.", ch:["which","it","whose","and"], a:"which", g:"関係代名詞（主格）",
   ex:`<b>正解：which</b><br><br>✏️ My family has three cats. This is the cat <b>which</b> was born last week.<br>📝 「うちは猫が3匹。これが先週<b>生まれた</b>猫だよ」<br>👀 <b>何を問われてる？</b><br>→ 関係代名詞の選択。<b>前の名詞が人かモノか</b>で判断！<br><br>🔍 <b>どこを見る？</b><br>① 前の名詞：<b>cat</b>（猫）＝動物→モノ扱い→<b>which</b><br>② 直後：<b>was</b>（動詞）→<b>主格</b>の関係代名詞！<br><br>📌 <b>関係代名詞の選び方</b><br><span class="tip">前が<b>人</b>→<b>who</b> / 前が<b>モノ・動物</b>→<b>which</b><br>前が<b>どちらでも</b>→<b>that</b>（万能！）</span><br><br>⚡ 直後に<b>動詞</b>→主格 / 直後に<b>主語+動詞</b>→目的格（省略可）`},
  {id:29,q:"A: What time will the next bus come here?\nB: (    ) 3:15", ch:["On","In","To","At"], a:"At", g:"前置詞",
   ex:`<b>正解：At</b><br><br>✏️ A: What time will the next bus come here?<br>B: <b>At</b> 3:15<br>📝 「次のバスは何時に来る？」「<b>3時15分に</b>」<br>👀 <b>何を問われてる？</b><br>→ 時の前置詞。<b>時刻？日？月？</b>で即判定！<br><br>🔍 3:15は<b>時刻</b>→<b>at</b>！<br><br>📌 <span class="tip"><b>at</b>→時刻(at 3:15 / at noon / at night)<br><b>on</b>→日・曜日(on Monday / on May 5)<br><b>in</b>→月・年・季節(in May / in 2024 / in summer)</span>`},

,{id:30,q:"A: Excuse me. (\u3000) can I go to Midori City Park?\nB: You can take a bus. The bus stop is over there.",ch:["What","How","When","Where"],a:"How",g:"疑問詞",ex:`<b>正解：How</b><br><br>✏️ A: Excuse me. <b>How</b> can I go to Midori City Park?<br>B: You can take a bus. The bus stop is over there.<br>📝 「すみません、みどり市民公園へは<b>どうやって</b>行けますか？」<br>👀 <b>何を問われてる？</b><br>→ 疑問詞の選択。<b>答えの文を見て逆算</b>！<br><br>🔍 <b>どこを見る？</b><br>Bの答え：「You can <b>take a bus</b>.」＝<b>交通手段</b>を答えてる<br>→ 手段・方法を聞く＝<b>How</b>！<br><br>📌 <b>How can I go to～?</b>＝「～へはどうやって行けますか？」<br><br>⚡ Whereを選びたくなるけど、Whereなら答えは「場所」になるはず。答えがバス(手段)だから<b>How</b>！`}
,{id:31,q:"A: Are you OK? You look very (\u3000).\nB: I'm not feeling well. I need some rest.",ch:["tired","happy","nice","beautiful"],a:"tired",g:"形容詞の選択",ex:`<b>正解：tired</b><br><br>✏️ A: Are you OK? You look very <b>tired</b>.<br>B: I'm not feeling well. I need some rest.<br>📝 「大丈夫？とても<b>疲れて</b>見えるよ」「具合が良くないんだ。休息が必要」<br>👀 <b>何を問われてる？</b><br>→ <b>文脈から適切な形容詞</b>を選ぶ問題。<br><br>🔍 <b>Bの答えを先に読む！（鉄則）</b><br>Bが「具合が良くない（not feeling well）」「休息が必要（need rest）」と言ってる<br>→ 体調が悪い！<br>→ Aはその前に「<b>疲れて</b>見えるよ」と言ったはず→ <b>tired</b>！<br><br>⚡ <b>消去法も使え！</b><br>happy（嬉しそう）→ 体調悪い文脈に合わない！<br>nice（素敵）/ beautiful（美しい）→ 体調の話に使わない！<br>→ 残るのは<b>tired</b>だけ！<br><br>📌 <b>You look＋形容詞</b>＝「～に見える」連結動詞<br><span class="tip">You look <b>tired</b>.（疲れて見えるよ）<br>You look <b>sick</b>.（具合悪そうだね）<br>You look <b>happy</b>.（嬉しそうだね）</span>`}

   ex:`<b>正解：playing</b><br><br>✏️ B: Yes. I love <b>playing</b> soccer with my friends!<br>📝 「友達とサッカーを<b>するのが</b>大好き！」<br>👀 <b>何を問われてる？</b><br>→ 動名詞。<b>love/like/enjoyの後の形</b>を問う問題！<br><br>🔍 <b>どこを見る？</b><br>I <b>love</b> (　) → loveの後は<b>～ing</b>か<b>to～</b>が来る<br>→ playを<b>playing</b>に変換！<br><br>📌 <b>動名詞しか使えない動詞を暗記！</b><br><span class="tip">✕ enjoy <b>to play</b> → ○ enjoy <b>playing</b><br>✕ finish <b>to read</b> → ○ finish <b>reading</b><br>覚え方：<b>「楽しみ終えたらやめる」</b>（enjoy/finish/stop）</span><br><br>⚡ love/likeは<b>ingもto～もOK</b>！`},
  {id:15,q:"B: OK. I'll try to speak more (    ).", bank:["sing","slow","good","know","eat","play"], a:"slowly", g:"副詞",
   ex:`<b>正解：slowly</b><br><br>✏️ B: OK. I'll try to speak more <b>slowly</b>.<br>📝 「もっと<b>ゆっくり</b>話すようにするね」<br>👀 <b>何を問われてる？</b><br>→ 形容詞から<b>副詞</b>への変換！<br><br>🔍 <b>どこを見る？</b><br>speak more (　) → speakは<b>動詞</b>！<br>動詞を修飾するのは<b>副詞</b>！<br>slow→<b>slowly</b>（-lyをつけて副詞に！）<br><br>📌 <b>副詞のつくり方</b><br><span class="tip">形容詞 + <b>ly</b> → 副詞<br>slow→slow<b>ly</b> / quick→quick<b>ly</b> / careful→careful<b>ly</b></span><br><br>⚡ <b>形容詞 vs 副詞の見分け</b><br>名詞を修飾→<b>形容詞</b>（a slow car）<br>動詞を修飾→<b>副詞</b>（speak slowly）`},
  {id:16,q:"B: Well, someone (    ) the book yesterday.", bank:["early","come","hard","borrow","do","drink"], a:"borrowed", g:"一般動詞の過去形",
   ex:`<b>正解：borrowed</b><br><br>✏️ B: Well, someone <b>borrowed</b> the book yesterday.<br>📝 「昨日誰かがその本を<b>借りた</b>よ」<br>👀 <b>何を問われてる？</b><br>→ 動詞の<b>時制</b>と<b>語の選択</b>。過去のサインを探せ！<br><br>🔍 <b>どこを見る？</b><br><b>yesterday</b>→ 昨日＝<b>過去</b>！→ borrow→<b>borrowed</b><br><br>📌 <b>超重要！borrowとlendの違い</b><br><span class="tip"><b>borrow</b>＝（自分が）<b>借りる</b><br><b>lend</b>＝（相手に）<b>貸す</b><br>Can I <b>borrow</b> your pen?（借りてもいい？）<br>Can you <b>lend</b> me your pen?（貸してくれる？）</span>`},
  {id:17,q:"B: I tried to get up 30 minutes (    ) than usual today.", bank:["early","come","hard","borrow","do","drink"], a:"earlier", g:"比較（比較級）",
   ex:`<b>正解：earlier</b><br><br>✏️ B: I tried to get up 30 minutes <b>earlier</b> than usual today.<br>📝 「今日はいつもより30分<b>早く</b>起きようとした」<br>👀 <b>何を問われてる？</b><br>→ 比較級への変換。<b>than</b>があったら比較級！<br><br>🔍 <b>どこを見る？</b><br>30 minutes (　) <b>than</b> usual → <b>比較級</b>！<br>early→<b>earlier</b>（yをiに変えて-er）<br><br>📌 <b>子音+yで終わる語の変化</b><br><span class="tip">early→earli<b>er</b> / busy→busi<b>er</b> / easy→easi<b>er</b> / happy→happi<b>er</b><br>（<b>yをiに変えて</b>er/est！）</span><br><br>⚡ earlyは<b>形容詞にも副詞にも</b>なる！`},
  {id:18,q:"B: Look at this baby (    ) milk in this picture.", bank:["early","come","hard","borrow","do","drink"], a:"drinking", g:"分詞の後置修飾",
   ex:`<b>正解：drinking</b><br><br>✏️ B: Look at this baby <b>drinking</b> milk in this picture.<br>📝 「この写真でミルクを<b>飲んでいる</b>赤ちゃんを見て」<br>👀 <b>何を問われてる？</b><br>→ <b>現在分詞の後置修飾</b>。名詞の後から「～している」と説明！<br><br>🔍 <b>どこを見る？</b><br>this baby (　) milk → babyの<b>後</b>に(　)<br>「ミルクを<b>飲んでいる</b>赤ちゃん」→ <b>～ing</b>！→<b>drinking</b><br><br>📌 <b>後置修飾の2パターン</b><br><span class="tip">名詞+<b>～ing</b>→「～<b>している</b>○○」（the boy <b>running</b>）<br>名詞+<b>過去分詞</b>→「～<b>された</b>○○」（a book <b>written</b>）</span><br><br>⚡ 「<b>している</b>」→～ing / 「<b>された</b>」→過去分詞 で判断！`},
  {id:19,q:"A: I see. But have you (    ) your homework?", bank:["early","come","hard","borrow","do","drink"], a:"done", g:"現在完了（完了）",
   ex:`<b>正解：done</b><br><br>✏️ A: I see. But have you <b>done</b> your homework?<br>📝 「なるほど。でも宿題は<b>やった</b>の？」<br>👀 <b>何を問われてる？</b><br>→ 現在完了形。<b>have + 過去分詞</b>の形を作れ！<br><br>🔍 <b>どこを見る？</b><br><b>have</b> you (　) → haveの後＝<b>過去分詞</b>！<br>do→did→<b>done</b><br><br>📌 <b>doの変化（超重要！）</b><br><span class="tip">do → <b>did</b>（過去形）→ <b>done</b>（過去分詞）<br>⚠️ did ≠ done！</span><br><br>⚡ <b>have + did は絶対NG！</b>haveの後は必ず<b>過去分詞</b>！`},
  {id:20,q:"B: I am (    ) for my English test.", bank:["become","catch","good","many","sing","spend","stand","study"], a:"studying", g:"現在進行形",
   ex:`<b>正解：studying</b><br><br>✏️ B: I am <b>studying</b> for my English test.<br>📝 「英語のテストのために<b>勉強している</b>ところ」<br>👀 <b>何を問われてる？</b><br>→ 現在進行形。<b>be動詞 + ～ing</b>の形を作れ！<br><br>🔍 <b>どこを見る？</b><br>I <b>am</b> (　) → am + ? → <b>進行形</b>！→<b>studying</b><br><br>📌 <b>ingのつけ方</b><br><span class="tip">・普通：play→play<b>ing</b> / study→study<b>ing</b><br>・eで終わる：make→mak<b>ing</b>（eを消す！）<br>・短母音+子音→重ねる：run→runn<b>ing</b></span><br><br>⚡ <b>studyの注意！</b><br>-ing→ study<b>ing</b>（yそのまま）/ -ed→ studi<b>ed</b>（yをiに変える）`},
  {id:21,q:"Takeshi is the (    ) baseball player in our team.", bank:["become","catch","good","many","sing","spend","stand","study"], a:"best", g:"比較（最上級）",
   ex:`<b>正解：best</b><br><br>✏️ Takeshi is the <b>best</b> baseball player in our team.<br>📝 「タケシはチームで一番<b>うまい</b>野球選手だ」<br>👀 <b>何を問われてる？</b><br>→ 不規則変化の最上級。<b>the + ? + in</b>がサイン！<br><br>🔍 <b>どこを見る？</b><br><b>the</b> (　) player <b>in</b> our team → theとin→<b>最上級</b>確定！<br>good→better→<b>best</b>（不規則！）<br><br>📌 <b>最上級のキーワード</b><br><span class="tip"><b>the + 最上級 + in＋場所</b>：the best in our team<br><b>the + 最上級 + of＋範囲</b>：the best of all</span><br><br>⚡ good→<b>best</b>は入試最頻出！丸暗記！`},
  {id:22,q:"Kenichi went fishing and he (    ) five fish.", bank:["become","catch","good","many","sing","spend","stand","study"], a:"caught", g:"一般動詞の過去形",
   ex:`<b>正解：caught</b><br><br>✏️ Kenichi went fishing and he <b>caught</b> five fish.<br>📝 「ケンイチは釣りに行って魚を5匹<b>捕まえた</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>andの前後で時制をそろえる</b>ルール！<br><br>🔍 <b>どこを見る？</b><br><b>went</b> fishing <b>and</b> he (　) → wentは<b>過去形</b>！<br>→ andの後も<b>過去形</b>！catch→<b>caught</b>（発音は「コート」）<br><br>📌 <b>andの鉄則</b><br><span class="tip">andの前後は<b>必ず同じ時制</b>！<br>went <b>and</b> caught / ate <b>and</b> drank</span>`},
  {id:23,q:"The song is (    ) by many children all over the world.", bank:["become","catch","good","many","sing","spend","stand","study"], a:"sung", g:"受動態",
   ex:`<b>正解：sung</b><br><br>✏️ The song is <b>sung</b> by many children all over the world.<br>📝 「その歌は世界中の子どもたちに<b>歌われている</b>」<br>👀 <b>何を問われてる？</b><br>→ <b>受動態</b>。be動詞 + 過去分詞の形を作れ！<br><br>🔍 <b>どこを見る？</b><br>The song <b>is</b> (　) <b>by</b> → isの後＋by→<b>受動態</b>確定！<br>sing→sang→<b>sung</b>（ABC型：3つとも形が違う！）<br><br>📌 <b>受動態の見つけ方</b><br><span class="tip">① <b>by～</b>があれば受動態のサイン！<br>② <b>be動詞の後</b>に動詞→受動態！</span><br><br>⚡ <b>ABC型の仲間</b>：sing→sang→sung / begin→began→begun`},
  {id:24,q:"A: Do you know the city (    ) the Big Apple?\nB: It's New York.", bank:["tall","long","visit","call","eat","begin"], a:"called", g:"分詞の後置修飾",
   ex:`<b>正解：called</b><br><br>✏️ A: Do you know the city <b>called</b> the Big Apple?<br>B: It's New York.<br>📝 「ビッグアップルと<b>呼ばれる</b>都市を知ってる？＝ニューヨーク」<br>👀 <b>何を問われてる？</b><br>→ <b>過去分詞の後置修飾</b>。名詞の後から説明！<br><br>🔍 <b>どこを見る？</b><br>the city (　) the Big Apple → cityの<b>後</b>に(　)<br>「ビッグアップルと<b>呼ばれる</b>都市」→ 過去分詞＝<b>called</b><br><br>📌 <b>calledの後置修飾は超頻出！</b><br><span class="tip">a city <b>called</b> Tokyo / a festival <b>called</b> Obon<br>a sport <b>called</b> baseball</span><br><br>⚡ 「○○と呼ばれる△△」→ △△ <b>called</b> ○○`},
  {id:25,q:"I've (    ) walking near my house early in the morning.", bank:["tall","long","visit","call","eat","begin"], a:"begun", g:"現在完了（完了）",
   ex:`<b>正解：begun</b><br><br>✏️ I've <b>begun</b> walking near my house early in the morning.<br>📝 「朝早く家の近くを<b>歩き始めた</b>ところだ」<br>👀 <b>何を問われてる？</b><br>→ 現在完了形。<b>have + 過去分詞</b>の形を作れ！<br><br>🔍 <b>どこを見る？</b><br>I'<b>ve</b> (　) → I've = I <b>have</b>！→ have + 過去分詞<br>begin→began→<b>begun</b>（ABC型！3つとも形が違う！）<br><br>📌 <b>短縮形に注意！</b><br><span class="tip">I've = I have / He's = He has / They've = They have<br>短縮形を見落とすと現在完了だと気づけない！</span>`},
  {id:26,q:"I believe (    ) breakfast is good for our health.", bank:["tall","long","visit","call","eat","begin"], a:"eating", g:"動名詞",
   ex:`<b>正解：eating</b><br><br>✏️ I believe <b>eating</b> breakfast is good for our health.<br>📝 「朝食を<b>食べること</b>は健康にいい」<br>👀 <b>何を問われてる？</b><br>→ 動名詞の<b>主語</b>としての使い方！<br><br>🔍 <b>どこを見る？</b><br>(　) breakfast <b>is</b> good → isの前が<b>主語</b>！<br>動詞を主語にするには→<b>～ing（動名詞）</b>！<br><b>Eating</b> breakfast is good.＝「朝食を食べること<b>は</b>良い」<br><br>📌 <b>動名詞が主語のパターン</b><br><span class="tip"><b>～ing ... is ...</b>＝「～すること<b>は</b>…」<br><b>Playing</b> soccer <b>is</b> fun. / <b>Reading</b> books <b>is</b> important.</span><br><br>⚡ 動名詞が主語の時、be動詞は<b>is</b>（3人称単数扱い）！`},
  {id:27,q:"A: What is the (    ) river in Japan?\nB: It is the Shinano River.", bank:["tall","long","visit","call","eat","begin"], a:"longest", g:"比較（最上級）",
   ex:`<b>正解：longest</b><br><br>✏️ A: What is the <b>longest</b> river in Japan?<br>B: It is the Shinano River.<br>📝 「日本で一番<b>長い</b>川は？」「信濃川です」<br>👀 <b>何を問われてる？</b><br>→ 最上級への変換。<b>the + ? + in</b>がサイン！<br><br>🔍 <b>どこを見る？</b><br><b>the</b> (　) river <b>in Japan</b>? → theとin→<b>最上級</b>確定！<br>long→longer→<b>longest</b><br><br>📌 <b>最上級のつくり方</b><br><span class="tip">・普通：long→long<b>est</b> / tall→tall<b>est</b><br>・eで終わる：large→larg<b>est</b><br>・子音+y→yをiに：easy→easi<b>est</b><br>・長い語：beautiful→<b>most</b> beautiful</span>`},
  {id:28,q:"B: My father has (    ) to New York once.", bank:["want","feel","be","bad","take","cold"], a:"been", g:"現在完了（経験）",
   ex:`<b>正解：been</b><br><br>✏️ B: My father has <b>been</b> to New York once.<br>📝 「父は一度ニューヨークに<b>行ったことがある</b>」<br>👀 <b>何を問われてる？</b><br>→ 現在完了の<b>経験</b>用法。have been to～の形！<br><br>🔍 <b>どこを見る？</b><br>has (　) <b>to</b> New York <b>once</b> → onceは<b>経験のキーワード</b>！<br>→ have <b>been to</b>～＝「～に行ったことがある」<br><br>📌 <b>超重要！been to vs gone to</b><br><span class="tip">have <b>been to</b>～＝行ったことがある（<b>今ここにいる</b>）<br>have <b>gone to</b>～＝行ってしまった（<b>もうここにいない</b>）</span><br><br>⚡ once（1回）/ twice（2回）/ three times（3回）→<b>経験用法</b>のキーワード！`},
  {id:29,q:"A: This is the picture (    ) by my older brother.", bank:["want","feel","be","bad","take","cold"], a:"taken", g:"分詞の後置修飾",
   ex:`<b>正解：taken</b><br><br>✏️ A: This is the picture <b>taken</b> by my older brother.<br>📝 「これは兄に<b>撮られた</b>写真です」<br>👀 <b>何を問われてる？</b><br>→ <b>過去分詞の後置修飾</b>。<b>by</b>があったら受動態のサイン！<br><br>🔍 <b>どこを見る？</b><br>the picture (　) <b>by</b> my brother → 名詞の後＋by→<b>後置修飾</b>！<br>take→took→<b>taken</b><br><br>📌 <b>後置修飾＋byの頻出パターン！</b><br><span class="tip">a picture <b>taken by</b> him / a song <b>sung by</b> her / a book <b>written by</b> her</span>`},

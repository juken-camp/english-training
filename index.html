// APP LOGIC
// ============================================================
let S={mode:null,qs:[],idx:0,score:0,wrong:[],streak:0,total:0,answered:false,convSlot:0,convFilled:[],orderSel:[]};

function init(){
  document.getElementById('tc').textContent=tekigoQ.length+'問';
  document.getElementById('gc').textContent=gokeiQ.length+'問';
  document.getElementById('sc').textContent=seijoQ.length+'問';
  document.getElementById('kc').textContent=kaiwaQ.length+'問';
  try{S.total=parseInt(localStorage.getItem('jc_t')||'0');S.streak=parseInt(localStorage.getItem('jc_s')||'0')}catch(e){}
  updStats();buildGrammarHome();buildGrammarRef();buildVocab();
}

function updStats(){
  document.getElementById('streakCount').textContent=S.streak;
  document.getElementById('totalCorrect').textContent=S.total;
  try{localStorage.setItem('jc_t',S.total);localStorage.setItem('jc_s',S.streak)}catch(e){}
}

function showPage(p){if(p!=='results')SFX.play('click');
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nav-i').forEach(x=>x.classList.remove('on'));
  var m={home:'homePage',grammar:'grammarPage',vocab:'vocabPage',quiz:'quizPage',results:'resultsPage'};
  document.getElementById(m[p]).classList.add('on');
  var b=document.querySelector('.nav-i[data-p="'+p+'"]');if(b)b.classList.add('on');
}

function goHome(){showPage('home')}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function buildGrammarHome(){
  var all=[];
  tekigoQ.forEach(function(q){all.push({g:q.g,orig:q})});
  gokeiQ.forEach(function(q){all.push({g:q.g,orig:q})});
  seijoQ.forEach(function(q){all.push({g:q.g,orig:q})});
  var gm={};all.forEach(function(x){if(!gm[x.g])gm[x.g]=[];gm[x.g].push(x)});
  var gradeMap={"be動詞":"中1","一般動詞の過去形":"中1","疑問詞":"中1","人称代名詞":"中1","三人称単数現在形":"中1","現在進行形":"中1","過去進行形":"中1","助動詞":"中1","前置詞":"中1","接続詞":"中2","There is/are構文":"中2","不定詞の副詞的用法":"中2","不定詞の名詞的用法":"中2","副詞":"中2","動名詞":"中2","比較（比較級）":"中2","比較（最上級）":"中2","比較（原級）":"中2","受動態":"中2","熟語・連語":"中2","会話表現":"中2","日常会話":"中2","買い物の会話":"中2","電話の会話":"中2","病院の会話":"中2","ディスカッション":"中2","現在完了（経験）":"中3","現在完了（完了）":"中3","現在完了（継続）":"中3","分詞の後置修飾":"中3","関係代名詞（主格）":"中3","関係代名詞（目的格）":"中3","仮定法過去":"中3","間接疑問文":"中3","It is for to構文":"中3","have to / must":"中3","tell/ask/want＋人＋to":"中3","疑問詞＋不定詞":"中3"};
  var gradeOrder={"中1":[],"中2":[],"中3":[]};
  Object.keys(gm).forEach(function(tag){
    var gr=gradeMap[tag]||"中3";
    gradeOrder[gr].push({name:tag,count:gm[tag].length});
  });
  var cols=['#FF6B9D','#A07CE8','#4ECDA5','#FFA15C','#5CB8FF','#FFD644','#FF8A9E','#7ECBA1'];
  var h='';var ci=0;
  ['中3','中2','中1'].forEach(function(gr){
    var items=gradeOrder[gr];if(!items||items.length===0)return;
    var gc=gr==='中1'?'g1':gr==='中2'?'g2':'g3';
    h+='<div style="margin-bottom:6px;margin-top:14px"><span class="gref-grade '+gc+'" style="font-size:12px;padding:3px 12px">'+gr+'</span></div>';
    items.forEach(function(item){
      h+='<div class="gchip" onclick="startGrammarQ(\''+item.name.replace(/'/g,"\\'")+'\')">';
      h+='<div class="gchip-l"><div class="gdot" style="background:'+cols[ci%cols.length]+'"></div>';
      h+='<span class="gchip-n">'+item.name+'</span></div>';
      h+='<span class="gchip-c">'+item.count+'問</span></div>';
      ci++;
    });
  });
  document.getElementById('grammarList').innerHTML=h;
}

function startGrammarQ(g){
  var all=[];
  tekigoQ.forEach(function(q){if(q.g===g)all.push(q)});
  gokeiQ.forEach(function(q){if(q.g===g)all.push(q)});
  seijoQ.forEach(function(q){if(q.g===g)all.push(q)});
  kaiwaQ.forEach(function(q){if(q.g===g)all.push(q)});
  if(all.length===0)return;
  S.mode=all[0].bank?'gokei':(all[0].p?'seijoEisaku':(all[0].ctx!==undefined?'kaiwa':'tekigo'));
  S.qs=shuffle(all.slice());S.idx=0;S.score=0;S.wrong=[];S.answered=false;
  showPage('quiz');renderQ();
}


function startQuiz(mode){
  S.mode=mode;
  var qs;
  if(mode==='tekigo')qs=tekigoQ.slice();
  else if(mode==='gokei')qs=gokeiQ.slice();
  else if(mode==='seijoEisaku')qs=seijoQ.slice();
  else if(mode==='kaiwa')qs=kaiwaQ.slice();
  S.qs=shuffle(qs);S.idx=0;S.score=0;S.wrong=[];S.answered=false;
  showPage('quiz');renderQ();
}

function retryQuiz(){
  S.qs=shuffle(S.qs.slice());S.idx=0;S.score=0;S.wrong=[];S.answered=false;
  showPage('quiz');renderQ();
}

function renderQ(){
  var q=S.qs[S.idx],tot=S.qs.length,n=S.idx+1;
  document.getElementById('quizCounter').textContent=n+' / '+tot;
  document.getElementById('qfill').style.width=(n/tot*100)+'%';
  S.answered=false;
  if(q.ch&&!q.p&&!q.ctx) renderTekigo(q);
  else if(q.bank) renderGokei(q);
  else if(q.p) renderSeijo(q);
  else if(q.ctx) renderKaiwa(q);
}

// TEKIGO
function renderTekigo(q){
  var lbl=['ア','イ','ウ','エ','オ','カ','キ','ク'];
  // Shuffle choices
  var shuffled=q.ch.slice();
  for(var i=shuffled.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=shuffled[i];shuffled[i]=shuffled[j];shuffled[j]=t}
  var qt=q.q.replace(/\(    \)/g,'<span style="color:var(--pink);font-weight:700;border-bottom:2.5px dashed var(--pink);padding:0 8px">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  var h='<div class="qcard"><span class="qtag qtag-g">'+q.g+'</span><span class="qtag qtag-t">適語選択</span><div class="qtxt">'+qt+'</div></div><div class="choices" id="chC">';
  shuffled.forEach(function(c,i){
    h+='<button class="cbtn" data-v="'+c.replace(/"/g,'&quot;')+'"><span class="clbl">'+lbl[i]+'</span><span>'+c+'</span></button>';
  });
  h+='</div><div class="result-banner" id="rbanner"></div><div class="ebox" id="ebox"><div class="ebox-h">先生の解説</div><div class="ebox-t">'+(q.ex||'<b>正解は「'+q.a+'」</b>✨<br>文法：'+q.g)+'</div></div>';
  h+='<button class="peekbtn" id="peekbtn" onclick="peekAnswer()">💡 答えを見る</button><button class="nbtn" id="nbtn" onclick="nextQ()">次の問題 →</button>';
  document.getElementById('quizContent').innerHTML=h;
  document.querySelectorAll('#chC .cbtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(S.answered)return;S.answered=true;
      var val=this.dataset.v;var ok=val===q.a;
      if(ok){this.classList.add('ok');S.score++;S.streak++;S.total++;SFX.play('correct')}
      else{this.classList.add('ng');S.streak=0;S.wrong.push(q);SFX.play('wrong');
        document.querySelectorAll('#chC .cbtn').forEach(function(b){if(b.dataset.v===q.a)b.classList.add('ok')});
      }
      document.querySelectorAll('#chC .cbtn').forEach(function(b){b.classList.add('dis')});
      var rb=document.getElementById('rbanner');
      if(ok){rb.textContent='⭕ 正解！';rb.className='result-banner show ok-banner'}
      else{rb.textContent='❌ 不正解…';rb.className='result-banner show ng-banner'}
      document.getElementById('ebox').classList.add('show');
      document.getElementById('peekbtn').classList.add('hide');
      document.getElementById('nbtn').classList.add('show');
      updStats();
    });
  });
}

// GOKEI
function renderGokei(q){
  var qt=q.q.replace(/\(    \)/g,'<span style="color:var(--pink);font-weight:700;border-bottom:2.5px dashed var(--pink);padding:0 8px">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  var h='<div class="qcard"><span class="qtag qtag-g">'+q.g+'</span><span class="qtag qtag-t">語形変化</span><div class="qtxt">'+qt+'</div></div>';
  h+='<div><div class="wbl">語群：</div><div class="wbank">';
  q.bank.forEach(function(w){h+='<span class="wchip">'+w+'</span>'});
  h+='</div><input type="text" class="ainput" id="gi" placeholder="答えを入力..." autocomplete="off" autocapitalize="off" spellcheck="false">';
  h+='<button class="subbtn" id="gsub">回答する</button></div>';
  h+='<div class="corr" id="corr">正解：'+q.a+'</div>';
  h+='<div class="result-banner" id="rbanner"></div><div class="ebox" id="ebox"><div class="ebox-h">先生の解説</div><div class="ebox-t">'+(q.ex||'<b>正解は「'+q.a+'」</b>✨<br>文法：'+q.g)+'</div></div>';
  h+='<button class="peekbtn" id="peekbtn" onclick="peekAnswer()">💡 答えを見る</button><button class="nbtn" id="nbtn" onclick="nextQ()">次の問題 →</button>';
  document.getElementById('quizContent').innerHTML=h;
  var inp=document.getElementById('gi'),sub=document.getElementById('gsub');
  function doCheck(){
    if(S.answered)return;S.answered=true;
    var v=inp.value.trim().toLowerCase(),ok=v===q.a.toLowerCase();
    if(ok){inp.classList.add('ok');S.score++;S.streak++;SFX.play('correct');S.total++}
    else{inp.classList.add('ng');S.streak=0;S.wrong.push(q);SFX.play('wrong');document.getElementById('corr').classList.add('show')}
    inp.disabled=true;sub.disabled=true;
    var rb=document.getElementById('rbanner');
    if(ok){rb.textContent='⭕ 正解！';rb.className='result-banner show ok-banner'}
    else{rb.textContent='❌ 不正解…';rb.className='result-banner show ng-banner'}
    document.getElementById('ebox').classList.add('show');document.getElementById('peekbtn').classList.add('hide');document.getElementById('nbtn').classList.add('show');updStats();
  }
  sub.addEventListener('click',doCheck);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')doCheck()});
}

// SEIJO
function renderSeijo(q){
  var qt=q.q.replace(/\(    \)/g,'<span style="color:var(--pink);font-weight:700;border-bottom:2.5px dashed var(--pink);padding:0 8px">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  S.orderSel=[];
  var h='<div class="qcard"><span class="qtag qtag-g">'+q.g+'</span><span class="qtag qtag-t">整序英作文</span><div class="qtxt">'+qt+'</div></div>';
  h+='<div class="oslots" id="osl"></div><div class="ochoices" id="och">';
  q.p.forEach(function(p,i){h+='<div class="ochip" data-i="'+i+'">'+p.l+' '+p.t+'</div>'});
  h+='</div><button class="chkbtn" id="chkb" disabled>回答する</button>';
  h+='<div class="corr" id="corr">正解：'+q.a.join('→')+'</div>';
  var defEx='<b>正解：'+q.a.join('→')+'</b>✨<br>（'+q.a.map(function(l){var pp=q.p.find(function(x){return x.l===l});return pp?pp.t:''}).join(' ')+'）<br>文法：<b>'+q.g+'</b>';
  h+='<div class="result-banner" id="rbanner"></div><div class="ebox" id="ebox"><div class="ebox-h">先生の解説</div><div class="ebox-t">'+(q.ex||defEx)+'</div></div>';
  h+='<button class="peekbtn" id="peekbtn" onclick="peekAnswer()">💡 答えを見る</button><button class="nbtn" id="nbtn" onclick="nextQ()">次の問題 →</button>';
  document.getElementById('quizContent').innerHTML=h;
  document.querySelectorAll('#och .ochip').forEach(function(el){
    el.addEventListener('click',function(){
      if(S.answered)return;
      var i=parseInt(this.dataset.i);
      if(this.classList.contains('placed')){S.orderSel=S.orderSel.filter(function(x){return x!==i});this.classList.remove('placed')}
      else{S.orderSel.push(i);this.classList.add('placed')}
      updSlots(q);
    });
  });
  document.getElementById('chkb').addEventListener('click',function(){
    if(S.answered)return;S.answered=true;
    var ua=S.orderSel.map(function(i){return q.p[i].l});
    var ok=JSON.stringify(ua)===JSON.stringify(q.a);
    var sl=document.getElementById('osl');
    if(ok){sl.classList.add('ok');S.score++;S.streak++;SFX.play('correct');S.total++}
    else{sl.classList.add('ng');S.streak=0;S.wrong.push(q);SFX.play('wrong');document.getElementById('corr').classList.add('show')}
    document.getElementById('chkb').disabled=true;
    var rb=document.getElementById('rbanner');
    if(ok){rb.textContent='⭕ 正解！';rb.className='result-banner show ok-banner'}
    else{rb.textContent='❌ 不正解…';rb.className='result-banner show ng-banner'}
    document.getElementById('ebox').classList.add('show');document.getElementById('peekbtn').classList.add('hide');document.getElementById('nbtn').classList.add('show');updStats();
  });
}

function updSlots(q){
  var sl=document.getElementById('osl');
  sl.innerHTML=S.orderSel.map(function(i){var p=q.p[i];return'<div class="ochip ins" data-ri="'+i+'">'+p.l+' '+p.t+'</div>'}).join('');
  sl.querySelectorAll('.ochip').forEach(function(el){
    el.addEventListener('click',function(){
      if(S.answered)return;
      var ri=parseInt(this.dataset.ri);
      S.orderSel=S.orderSel.filter(function(x){return x!==ri});
      document.querySelectorAll('#och .ochip').forEach(function(c){if(parseInt(c.dataset.i)===ri)c.classList.remove('placed')});
      updSlots(q);
    });
  });
  document.getElementById('chkb').disabled=S.orderSel.length!==q.p.length;
}

// KAIWA
function renderKaiwa(q){
  S.convFilled=new Array(q.s).fill(null);S.convSlot=0;
  let h=`<div class="qcard"><span class="qtag qtag-g">${q.g}</span><span class="qtag qtag-t">会話文の完成</span><div class="qtxt">${q.ctx}</div></div>
  <div class="stitle" style="font-size:13px">正しい順番に選んでください：</div>
  <div class="cslots" id="csvs">${Array.from({length:q.s},(_,i)=>`<div class="cslot ${i===0?'act':''}" data-si="${i}"><span class="csnum">${i+1}</span><span class="cstxt" id="cst${i}">タップして選択</span></div>`).join('')}</div>
  <div class="cchoices" id="cchs">${q.ch.map((c,i)=>`<button class="ccbtn" data-ci="${i}">${c}</button>`).join('')}</div>
  <button class="chkbtn" id="chkc" disabled>回答する</button>
  <div class="corr" id="corr">正解：${q.a.join(' → ')}</div>
  <div class="result-banner" id="rbanner"></div><div class="ebox" id="ebox"><div class="ebox-h">先生の解説</div><div class="ebox-t">${q.ex||('<b>正解：'+q.a.join(' → ')+'</b><br>'+q.a.map((a,i)=>{const c=q.ch.find(x=>x.charAt(0)===a);return '<b>'+(i+1)+'.</b> '+(c||a)}).join('<br>'))}</div></div>
  <button class="peekbtn" id="peekbtn" onclick="peekAnswer()">💡 答えを見る</button><button class="nbtn" id="nbtn" onclick="nextQ()">次の問題 →</button>`;
  document.getElementById('quizContent').innerHTML=h;

  // Slot click - tap filled slot to clear it
  document.querySelectorAll('#csvs .cslot').forEach(el=>{
    el.addEventListener('click',function(){
      if(S.answered)return;
      var si=parseInt(this.dataset.si);
      // If this slot is filled and we tap it again, clear it
      if(S.convFilled[si]!==null){
        var ci=S.convFilled[si];
        S.convFilled[si]=null;
        this.classList.remove('filled');
        document.getElementById('cst'+si).textContent='タップして選択';
        document.querySelectorAll('#cchs .ccbtn')[ci].classList.remove('used');
        document.getElementById('chkc').disabled=true;
      }
      S.convSlot=si;
      document.querySelectorAll('#csvs .cslot').forEach(function(s,i){s.classList.toggle('act',i===si)});
    });
  });
  // Choice click
  document.querySelectorAll('#cchs .ccbtn').forEach(el=>{
    el.addEventListener('click',function(){
      if(S.answered)return;
      const ci=parseInt(this.dataset.ci),si=S.convSlot;
      // Unfill prev
      const prev=S.convFilled[si];
      if(prev!==null)document.querySelectorAll('#cchs .ccbtn')[prev].classList.remove('used');
      // Remove from other slot
      const esi=S.convFilled.indexOf(ci);
      if(esi!==-1){S.convFilled[esi]=null;const s=document.querySelectorAll('#csvs .cslot')[esi];s.classList.remove('filled');document.getElementById('cst'+esi).textContent='タップして選択'}
      // Fill
      S.convFilled[si]=ci;
      const slot=document.querySelectorAll('#csvs .cslot')[si];slot.classList.add('filled');
      document.getElementById('cst'+si).textContent=q.ch[ci];
      this.classList.add('used');
      // Auto next
      const ne=S.convFilled.findIndex(x=>x===null);
      if(ne!==-1){S.convSlot=ne;document.querySelectorAll('#csvs .cslot').forEach((s,i)=>s.classList.toggle('act',i===ne))}
      document.getElementById('chkc').disabled=!S.convFilled.every(x=>x!==null);
    });
  });
  // Check
  document.getElementById('chkc').addEventListener('click',()=>{
    if(S.answered)return;S.answered=true;
    const ua=S.convFilled.map(i=>q.ch[i].charAt(0));
    const ok=JSON.stringify(ua)===JSON.stringify(q.a);
    if(ok){S.score++;S.streak++;S.total++;SFX.play('correct');document.querySelectorAll('#csvs .cslot').forEach(s=>s.style.borderColor='var(--ok)')}
    else{S.streak=0;S.wrong.push(q);SFX.play('wrong');document.querySelectorAll('#csvs .cslot').forEach(s=>s.style.borderColor='var(--ng)');document.getElementById('corr').classList.add('show')}
    document.getElementById('chkc').disabled=true;
    var rb=document.getElementById('rbanner');
    if(ok){rb.textContent='⭕ 正解！';rb.className='result-banner show ok-banner'}
    else{rb.textContent='❌ 不正解…';rb.className='result-banner show ng-banner'}
    document.getElementById('ebox').classList.add('show');document.getElementById('peekbtn').classList.add('hide');document.getElementById('nbtn').classList.add('show');updStats();
  });
}

function peekAnswer(){
  if(S.answered)return;S.answered=true;
  S.streak=0;
  var q=S.qs[S.idx];
  // Mark as wrong (skipped)
  S.wrong.push(q);
  // Show correct answer visually depending on question type
  var chBtns=document.querySelectorAll('#chC .cbtn');
  if(chBtns.length>0){
    chBtns.forEach(function(b){if(b.dataset.v===q.a)b.classList.add('ok');b.classList.add('dis')});
  }
  var inp=document.getElementById('ginp');
  if(inp){inp.disabled=true;inp.value=q.a;inp.classList.add('ok');var sub=document.getElementById('gsub');if(sub)sub.disabled=true;var corr=document.getElementById('corr');if(corr)corr.classList.add('show')}
  var osl=document.getElementById('osl');
  if(osl){osl.classList.add('ng');var chkb=document.getElementById('chkb');if(chkb)chkb.disabled=true;var corr=document.getElementById('corr');if(corr)corr.classList.add('show')}
  var chkc=document.getElementById('chkc');
  if(chkc){chkc.disabled=true;document.querySelectorAll('#csvs .cslot').forEach(function(s){s.style.borderColor='var(--ng)'});var corr=document.getElementById('corr');if(corr)corr.classList.add('show')}
  // Show banner as skipped
  var rb=document.getElementById('rbanner');
  rb.textContent='👀 答えを確認';rb.className='result-banner show ng-banner';
  document.getElementById('ebox').classList.add('show');
  document.getElementById('nbtn').classList.add('show');
  document.getElementById('peekbtn').classList.add('hide');
  SFX.play('wrong');
  updStats();
}
function nextQ(){
  SFX.play('click');
  S.idx++;
  if(S.idx>=S.qs.length)showResults();
  else{renderQ();window.scrollTo(0,0)}
}

function showResults(){
  const t=S.qs.length,p=Math.round((S.score/t)*100);
  document.getElementById('rscore').textContent=p+'%';
  document.getElementById('rcorr').textContent=S.score;
  document.getElementById('rwrong').textContent=t-S.score;
  document.getElementById('rtotal').textContent=t;
  const rv=document.getElementById('wrongReview');
  if(S.wrong.length===0)rv.innerHTML='<div style="text-align:center;color:var(--ok);padding:20px">🎉 全問正解！すばらしい！</div>';
  else{let h='';S.wrong.forEach(q=>{const qt=(q.q||q.ctx||'').substring(0,60);h+=`<div class="gchip" style="cursor:default"><div class="gchip-l"><div class="gdot" style="background:var(--ng)"></div><div><div class="gchip-n" style="font-size:12px">${q.g}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${qt}...</div></div></div></div>`});rv.innerHTML=h}
  if(S.score===S.qs.length)SFX.play('perfect');else SFX.play('done');showPage('results');
}

// GRAMMAR REF
function buildGrammarRef(){
  renderGRefs('all');
}
function renderGRefs(cat){
  var list=cat==='all'?grammarRef:grammarRef.filter(function(g){return g.gr===cat});
  var h='';list.forEach(function(g){
    var gc=g.gr==='中1'?'g1':g.gr==='中2'?'g2':'g3';
    h+='<div class="gref" data-gr="'+g.gr+'"><span class="gref-grade '+gc+'">'+g.gr+'</span>';
    h+='<div class="gref-t">'+g.t+'</div><div class="gref-d">'+g.d+'</div>';
    h+='<div class="gref-e">'+g.e.replace(/\n/g,'<br>')+'</div></div>';
  });
  document.getElementById('grammarRefList').innerHTML=h;
}
function fgCat(btn,cat){
  document.querySelectorAll('#gTabs .ftab').forEach(function(t){t.classList.remove('on')});
  btn.classList.add('on');renderGRefs(cat);
}
function filterGrammar(){
  var q=document.getElementById('gSearch').value.toLowerCase();
  document.querySelectorAll('#grammarRefList .gref').forEach(function(c){c.style.display=c.textContent.toLowerCase().includes(q)?'':'none'});
}

// VOCAB
var vocabGroups={"🔤 基本単語": ["月の名前（January～December）", "序数（first～twelfth）", "曜日（Sunday～Saturday）", "時間・季節・自然", "家族", "スポーツ・教科", "人を表す名詞", "場所・建物", "身近な名詞"], "✍️ 重要動詞": ["重要な基本動詞", "haveのいろいろな意味", "take / getのいろいろな意味", "使い分けに注意する動詞", "セットで覚える動詞", "その他の重要動詞"], "🎨 形容詞・副詞": ["数・量を表す形容詞", "いろいろな形容詞", "頻度を表す副詞", "様子を表す副詞", "その他の重要な副詞"], "🔄 動詞の変化": ["規則動詞の過去形・過去分詞", "be動詞の変化", "3人称単数現在形のつくり方", "動詞のing形のつくり方"], "📦 名詞・代名詞": ["名詞の複数形", "代名詞（主格・所有格・目的格・所有代名詞）"], "🔤 動詞の熟語": ["goを使った熟語", "lookを使った熟語", "takeを使った熟語", "getを使った熟語", "comeを使った熟語", "動詞+up/down/on/off", "動詞+前置詞の熟語", "そのほかの動詞の熟語", "意味の似ている熟語"], "⭐ be動詞・形容詞・副詞の熟語": ["be動詞の熟語（超頻出！）", "数や量を表す熟語", "時・場所を表す熟語", "副詞の働きをする熟語", "形容詞の働きをする熟語", "その他の重要熟語（追加）", "そのほかの熟語"], "💬 会話表現": ["会話表現：あいさつ・お礼", "会話表現：電話", "会話表現：道案内", "会話表現：買い物", "会話表現：誘う・提案する"], "📝 不規則動詞": ["不規則動詞（ABC型：全部違う）", "不規則動詞（ABB型：過去形=過去分詞）", "不規則動詞（ABA型/AAA型）"], "📊 比較変化": ["比較変化（規則）", "比較変化（more/most型）", "比較変化（不規則）"]};
function buildVocab(){showVocabHome()}
function showVocabHome(){
  var cl=document.getElementById('vCatList');
  var el=document.getElementById('vocabList');
  el.innerHTML='';
  var h='';
  for(var grp in vocabGroups){
    h+=`<div class="vcat-group">${grp}</div>`;
    vocabGroups[grp].forEach(function(cat){
      var n=vocabData[cat]?vocabData[cat].length:0;
      h+=`<div class="vcat-item" onclick="SFX.play('click');showVocabCat('${cat.replace(/'/g,"\\'")}')"><span class="vci-name">${cat}</span><span class="vci-count">${n}語</span></div>`;
    });
  }
  h+=`<div class="vcat-group">📖 すべて表示</div>`;
  h+=`<div class="vcat-item" onclick="SFX.play('click');showVocabCat('all')"><span class="vci-name">全カテゴリ一覧</span><span class="vci-count">${Object.values(vocabData).reduce(function(a,b){return a+b.length},0)}語</span></div>`;
  cl.innerHTML=h;
}
function showVocabCat(cat){
  var cl=document.getElementById('vCatList');
  cl.innerHTML='';
  var el=document.getElementById('vocabList');
  var h='<button class="vback-btn" onclick="SFX.play(\'click\');showVocabHome();document.getElementById(\'vocabList\').innerHTML=\'\'">← カテゴリ一覧に戻る</button>';
  var cs=cat==='all'?Object.keys(vocabData):[cat];
  cs.forEach(function(c){
    h+=`<div class="vcat">${c}</div>`;
    vocabData[c].forEach(function(v){
      h+=`<div class="vcard" onclick="this.classList.toggle('rev');SFX.play('flip');speakEn(this.querySelector('.vw').textContent)"><div><div class="vw">${v.w}</div></div><div class="vm">${v.m}</div></div>`;
    });
  });
  el.innerHTML=h;
  window.scrollTo(0,0);
}
function rvList(cat){showVocabCat(cat)}
function fvCat(btn,cat){showVocabCat(cat)}
function filterVocab(){
  var q=document.getElementById('vSearch').value.toLowerCase();
  if(q.length>0){
    var cl=document.getElementById('vCatList');cl.innerHTML='';
    var el=document.getElementById('vocabList');
    var h='<button class="vback-btn" onclick="SFX.play(\'click\');showVocabHome();document.getElementById(\'vocabList\').innerHTML=\'\'">← カテゴリ一覧に戻る</button>';
    Object.keys(vocabData).forEach(function(c){
      var matched=vocabData[c].filter(function(v){return(v.w+v.m).toLowerCase().includes(q)});
      if(matched.length>0){
        h+=`<div class="vcat">${c}</div>`;
        matched.forEach(function(v){
          h+=`<div class="vcard" onclick="this.classList.toggle('rev');SFX.play('flip');speakEn(this.querySelector('.vw').textContent)"><div><div class="vw">${v.w}</div></div><div class="vm">${v.m}</div></div>`;
        });
      }
